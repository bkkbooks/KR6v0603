諸行變易法故說諸所有受悉皆是苦苦是不得自在自主自由的不自在就是無我如雜阿含經卷二大正二七下說世尊告餘五比丘色等五蘊下例非有我若色有我者於色不應病苦生亦不得於色欲令如是不令如是以色無我故於色有病有苦生亦得於色欲令如是不令如是我是主宰的意思印度的神教都想像身心中有一常恆妙樂自在的自我與一般所說的靈性相近或說與身心一或說與身心異有了我為生死流轉中的主體也就是解脫者的主體依佛法說在現實身心世間中那樣的我是沒有的我是自主而宰支配他的沒有我還有什麼是屬於我我所受我支配的呢無我無我所就是空的本義在聖道的修行中能這樣的知苦集也在苦聚中不過空與無我是通於聖道及涅槃的就能斷以愛著為主的集而證滅了佛依無我的緣起成立非常而又不斷的生死流轉觀也就依緣起的無常苦無我觀達成生死的解脫這就是不共世間的如實的中道依無常苦變易法通達無我我所斷薩迦耶見也就突破了愛著自我的生死根源愛樂欣喜阿賴耶斷我我所見能滅我我所愛進而滅除我我所慢就能得究竟解脫所以雜阿含經卷一大正二七一上說無常想者能建立無我想聖弟子住無我想心離我慢順得涅槃佛與聖弟子達到究竟解脫的稱為阿羅漢有慧解脫俱解脫二類依慧得解脫名慧解脫心離煩惱而得解脫名心解脫這二者本是一切阿羅漢所共通的由於心是定的異名所以分為慧解脫及心與慧俱解脫二類佛為須深說慧解脫阿羅漢不得四禪也沒有五神通是以法住智通達緣起而得解脫的俱解脫得四禪無色定滅盡定依禪而引發神通見法涅槃如從離煩惱得漏盡智而解脫來說慧解脫與俱解脫是平等而沒有差別的然慧解脫者沒有根本定眼見耳聞都與常人一樣老病所起的身苦也一樣但不引起心苦俱解脫阿羅漢有深的禪定引發神通見聞覺知都有超常的能力老病所生的身苦因定力而大為輕微在阿羅漢中俱解脫者是少數受到佛弟子的欽仰但得深定發五神通依定力而身苦輕微是共世間的神教徒也有人能修得這樣的所以佛弟子應以般若自證得解脫為要務而以般若得解脫是要從如實知見緣起中對衆生自己身心五蘊六處六界的行動了解為什麼會起愛著為什麼會引生苦痛要怎樣才能解脫依正見緣起的無常無我才能達成解脫生死的目的如不了解道要一心專修禪定或者求神通那是要滑入歧途的第三節人間的正行中道以正見為先修證以定慧為主然對於個人修持佛法的久住世間戒卻是無比重要的戒是人間的正行善行如在家弟子的五戒殺人盜邪淫妄語作假見證等也正是善良風俗所不容國家法律所要制裁的佛出人間為衆生說法是依人間的正行諸惡莫作衆善奉行而引向內淨其意的定慧熏修正行是與解脫道相應的所以如說修說證而不知身在人間所行的卻是放辟淫亂或者類似顛狂那不是知見不正就是修持上出了毛病如狂妄的自以為是那不是釋迦弟子佛為弟子制戒而出家戒的內涵更為深廣出家是離家而入僧伽構成僧伽的每一成員人人是平等的僧伽是法治的僧伽事務由大衆會議來決定的所以是民主的在僧團中彼此互相勉勵互相警策互相教導也互相舉發別人的過失經懺悔而保持清淨這是見解和同解利經濟和同均戒法制和同遵的僧團律典說這樣和樂清淨健全的僧團才能達成正法久住梵行久住的理想當時印度宗教的風尚遠離獨處受到世人的尊敬但釋尊卻漸漸引導使出家者納入有軌律的僧團所以佛曾勸優波離大迦葉住在僧團內並給常樂獨住以有實質意義的新解說當時印度的神職人員依信施而生活的婆羅門及六師沙門流行低級的迷妄行為梵網經列為中戒大戒四分律總名為大小持戒犍度現在依長阿含經二一梵動經録大戒如下瞻相男女吉凶好醜及相畜生召喚鬼神或復驅遣鬼神種種厭禱無數方道恐熱於人能為人安胎出胎衣亦能呪人使作驢馬亦能使人聾盲瘖啞現諸伎術叉手向日月天作諸苦行或為人呪病或誦惡呪或誦善呪或為醫方針灸藥石療治衆疾或呪水火或為鬼呪或誦剎利呪或誦鳥呪或支節呪或安宅符呪或火燒鼠囓能為解呪或誦知死生書或誦解夢書或相手面書或誦天文書或誦一切鳥獸音書瞻相天時言雨不雨穀貴穀賤多病少病恐怖安隱或說地動彗星現月蝕日蝕或言星蝕或言不蝕或言此國當勝彼國不如或言彼國當勝此國不如瞻相吉凶說其盛衰在長部一梵網經中更有火杓子殼粉米熟酥油口血護摩問鏡問童女問天神拜太陽供養大梵天請吉祥天淨地嗽口沐浴舉行供犧牲的祭祀這類迷妄的低級宗教行為在印度盛行但釋尊無如是事也從不稱讚這類行為梵網經所說的小戒是十善十戒及某些物品不得接受等中戒是種植貯畜享受歌舞等娛樂賭博臥室香油等奢侈間談世事諍論義理為國王奔走等大戒是占卜豫言推算咒術護摩供神治病醫藥古代與巫術相關聯純正的醫藥是世間正事也無關於宗教的信行這些低級的宗教行為稱為大戒是佛教出家僧團所嚴重關切的這些宗教行為是否有效為另一事佛法是決不採用的如印度盛行的咒術是佛法所鄙棄的如中阿含經一八一多界經大正一七二四上說若見諦人生極苦甚重苦不可愛不可樂不可思不可念乃至斷命捨離此內佛法更從外求或有沙門梵志或持一句呪二句三句四句多句百千句呪令脫我苦終無是處見諦人是證見四諦的初果以上聖者佛教的聖者如因病而引生極大苦痛面臨死亡威脅也不可能去從那位沙門婆羅門求誦咒語以延續生命的可見咒語是凡愚的事是真正佛弟子所鄙棄的又如出家戒中不知四諦而說我知四諦的沒有見到天龍夜叉等鬼神而說我見這不是為了名聞就是為了利養虛誑的說神說鬼在僧伽中是大妄語戒要逐出僧團取消比丘資格的因為採用咒語等行為妄說見神見鬼會增長社會的迷妄有些人會誇談靈異惑亂人心終將造成僧伽內部及社會文化的禍害釋尊一律嚴格的禁止對印度宗教來說樹立了理性的覺者的形象這才是正見正行正覺者的佛法第二章方便道之施設第一節四不壞淨四證淨中道八支聖道的修行是以正見為先導的從衆生身心自體去觀察通達緣起此有故彼有此生故彼生而苦蘊集此無故彼無此滅故彼滅而苦蘊滅苦蘊集是生死流轉苦蘊滅是解脫涅槃如實知緣起的集滅而修行達到悟入真諦就成為聖者聖者的悟入是遠離塵垢法眼生謂所有集法皆是滅法或說於四諦如實知知見四諦得漏盡於四諦如實現等覺總之於緣起四諦的體悟是初果的預入聖流到阿羅漢究竟解脫如來現正等正覺的不二法門中道正行的修證對一般根性來說到底是難了一些因為衆生無始以來一直繫縛在樂阿賴耶欣阿賴耶喜阿賴耶中成為衆生人的特性核心是自我表現為情感的我我所愛在知識開展中成為我我所見而更根深柢固的是意志的我我所慢要徹悟緣起無我離見愛慢而究竟解脫不能不說是甚深了釋尊大慈悲心不捨衆生所以有方便道的施設契入甚深法的初果名為須陀洹預流意思是預入聖道之流成為聖者佛弟子中確有言下頓悟的但約一般根性來說總是次第漸入的入預流位有必備的條件名為四預流支經中有兩類四預流支有屬於如實道的正見為先的預流支如相應部五五預流相應南傳一六下三一四說諸比丘有四預流支何等為四親近善士聽聞正法如理作意法隨法行預流支是證入預流果的支分先要親近善士佛及聖弟子是善士佛弟子而有正見正行的也是善士從善士佛及弟子聽聞正法不外乎四諦一切法門可統攝於四諦中這是古代情形等到有了書寫印刷的聖典也可以從經典中了知佛法與聽聞一樣所以龍樹說佛法從三處聞從佛聞從弟子聞從經典聞無倒的聽聞正法能成就聞慧如所聞的正法而審正思惟如理作意能成就思慧如法隨順法義而精勤修習法隨法行能成就修慧聞思修三慧的進修能見諦而得預流果這是般若慧為先導的為上一章中道正法的修行階梯經中說到另一預流支就是四證淨如相應部五五預流相應南傳一六下二五三二五四說諸比丘汝等當勸彼等親族朋友修習安住四預流支何等為四謂於佛證淨勸導修習安住於法證淨於僧證淨聖者所樂能發三摩地之戒勸導修習安住證淨在雜阿含經中譯為不壞淨這是脅尊者所傳如阿毗達磨大毗婆沙論卷一三大正二七五三四下說脅尊者曰此應名不壞淨言不壞者不為不信及諸惡戒所破壞故淨謂清淨信是心之清淨相故戒是大種清淨相故佛法僧伽三寶是佛法開展中形成的全體佛法信是以心淨為性的對三寶的證淨是對三寶堅定不變的信心聖者所愛樂戒是佛弟子必不可缺的如法的正常戒行有信與戒為基礎能深入佛法本來這是對三寶的淨信及聖所愛戒成就以後才合名證淨名為四證淨那是證智相應的信與戒不壞淨可通於深淺聖者的證淨即證預流果還沒有證入者的淨信這是以信為主能由淺易而深入的法門預入聖流一定是有慧有信缺一不可經說以信為先或以慧為先只是適應根性的方便不同所以佛法所說的兩類預流支都可以依之而成為聖者經上說佛弟子的根性利鈍不同有隨法行與隨信行二類如雜阿含經卷三三大正二二四上中說聖弟子信於佛言說清淨信法信僧言說清淨於五法增上智慧審諦堪忍謂信精進念定慧是名聖弟子不墮惡趣乃至隨法行聖弟子信於佛言說清淨信法信僧言說清淨乃至五法少慧審諦堪忍謂信精進念定慧是名聖弟子不墮惡趣乃至隨信行隨法行人於信等五法中智慧增上是慧力特強以慧為主而信等為助的隨信行人於五法中是少慧慧力差一些是以信為主而慧等為助的信等五根因根性而可能有所偏重而其實五根都是具足的甚深法是智慧所覺證的以聞思修而入的預流支是利根隨法行人在佛法的開展中方便適應又成立證淨重信的預流支那是鈍根隨信行人所修學了法是若佛出世若不出世法住法界的釋尊在菩提樹下徹悟正法而被尊稱為佛釋尊說法教化出家與在家的很多人從佛修行佛為弟子們制立戒法出家者依戒律而成立僧伽在家與出家弟子中有預流一來不還阿羅漢四果四向的聖者稱出家聖者為聖僧佛法流布人間佛法僧三寶就出現於世間佛法與一般神教有本質上的差異但三寶住世就有類似一般神教的情形佛如一般宗教的最高神或教主法如一般宗教的教義與教規僧如一般宗教的教會教團佛弟子歸依時說歸依佛兩足尊佛是人類兩足的中最偉大最可尊的聖者歸依法離欲尊在離煩惱離罪惡的教義中佛的法是最徹底最可尊的歸依僧衆中尊佛弟子的僧伽在一切教團中是最可尊敬的歸依三寶表示出對三寶的無限信敬這種不離智慧的信清淨的純潔的信心類似一般宗教的信仰在佛教中開展起來成為一般通俗易行的法門對三寶的崇敬是信真正有信心的一定有戒戒不是外道的種種邪戒是人類的德行構成人與人間和諧安樂的行為與生活這是聖者所愛樂離此是不能成為聖者的戒四不壞淨就是依此不離慧的深信及完善的戒行而能契入聖法流的這是佛法時期適應隨信行人的方便近於一般宗教所以是通俗的易行道為出家的鈍根初學說更多的為一般在家的信衆說如雜阿含經說四不壞淨成就於此命終生於天上若墮地獄畜生餓鬼者無有是處如是福德潤澤善潤澤為安樂食四種福德潤澤善法潤澤攝受稱量功德不可稱量是四種諸天天道未淨衆生令淨已淨者重令淨修四不壞淨而深入的能得預流果但重視福德善法不墮惡趣而生於天上表示了趣向解脫而又通於沒有成聖的善道第二節六念法門釋尊安立的方便道是四預流支佛不壞淨法不壞淨僧不壞淨聖所愛戒成就然經中還有二說一佛證淨法證淨僧證淨施捨二佛證淨法證淨僧證淨智慧這二類都名為四預流支可見方便道的四預流支是以佛法僧三寶的淨信為本的在三寶的淨信外加入施捨或者戒或者智慧而後來以加入聖所愛戒成就為定論的以信為基本的修行系列是在佛法開展中次第形成的或重在憶念不忘有六隨念六念是念佛念法念僧念戒念施捨念天法門的次第增多是初修與四不壞淨相關的四念念佛念法念僧念戒其次念五事念佛念法念僧念戒念施捨末後再加入念天就是六念了如綜合佛不壞淨法不壞淨僧不壞淨為淨信而修行那就有信戒施慧四法信戒聞施慧五法的施設四法與五法是為在家弟子說的可說是三類方便道預流支的綜合六隨念法門也是以信為先導的方便說到念是憶念明記不忘是修行特別是修習定慧所必要的依念的專心憶念能趣入定境所以說念為定依依定才能發慧六念的修習繫念三寶而信心清淨如昏夜的明燈荒漠中發見甘泉一樣內心清淨充滿了幸福平安的充實感憶念重自利的所持的戒行清淨憶念重利他的如法施捨的功德有信心有善行無論是成為預流聖者或還是凡夫都會上升天國享受福樂所以能於諸世間若怖若安不起瞋恚我當受持純一滿淨諸天天道在增一阿含中六念以外增列念身念休息寂止念安般念死共為十念但後四念的性質與六念是不同的六念的內容如雜阿含經卷二大正二一四五中說當念佛功德此如來應等正覺明行足善逝世間解無上士調御丈夫天人師佛世尊念法功德於世尊正法律現法離諸熱惱非時通達緣自覺悟念僧功德善向正向直向等向修隨順行謂向須陀洹得須陀洹向斯陀含得斯陀含向阿那含得阿那含向阿羅漢得阿羅漢如是四雙八士是名世尊弟子僧具足戒定慧解脫解脫知見供養恭敬尊重之處堪為世間無上福田念戒功德自持正戒不毀不缺不斷不壞非盜取戒究竟戒可讚歎戒梵行戒不憎惡戒念施功德自念布施心自欣慶捨除慳貪雖在居家解脫心施常施樂施具足施平等施念天功德念四王天三十三天炎摩天兜率陀天化樂天他化自在天清淨信戒聞施慧於此命終生彼天中我亦如是清淨信戒施聞慧生彼天中六念的前三念是三寶功德的憶念如不了解三寶的內容佛法僧所以值得尊敬的所在那就徒有三寶的憶念並不能增長正信的依經上說念佛是憶念佛的十號這些名號從多方面表示了佛的功德如如來是真理的體現者如實的宣說者應阿羅訶是離一切煩惱值得尊敬供養者等正覺是正確而普遍的覺悟者這樣的顧名思義從佛的名號而憶念佛的功德念法是憶念八聖道甚深法依八聖道而如實知見與證得如現法佛說的正法依聖道而可以現見的離諸熱惱是離一切煩惱的非時或作不待時節是說依法修行隨時都可以成就的通達是說依聖道而引導而契入的念僧是憶念聖僧從預流須陀洹向到阿羅漢果四向四果的功德這些聖者善向正向直向等向修隨順行或譯為妙行質直行如理行法隨法行和敬行隨法行表示聖者的持行有戒定慧等功德所以是應受恭敬供養的無上福田施僧得大果念戒是憶念自己的戒行清淨沒有缺失如有所違犯依法懺悔就回復清淨是聖者所稱譽愛樂的念施是憶念自己的施捨雖在居家解脫心施是在家弟子不求世間福樂果報的清淨施如出家行不求名聞利養的法施念天是念六欲天有信有施戒功德的能生天得預流果的死後也上生欲界天六念四不壞淨念佛法僧念佛這一類的行法是適應隨信行人特別是在家弟子的方便道有一般宗教的共通性有安定內心除憂怖的作用一病而到死亡邊緣身體大多數是苦痛逼切而眷屬物欲自我的愛戀會引起內心的焦急憂傷恐怖比身苦更嚴重得多對在家弟子勸他不要戀念眷屬戀念物欲應該修六念四不壞淨如平常念佛念法念僧的不論什麼情況下去世決定上升而不會墮落所以不用為此擔憂二離別即使與釋迦佛別離也不用憂悲修六念就等於與佛及聖弟子同在了三修六念的處凶嶮衆生中無諸罣礙四賈客遠行於曠野中有諸恐怖心驚毛竪的應念佛念法念僧比丘住於空間樹下空舍有時恐怖心驚毛竪的應當念佛並舉一譬喻如雜阿含經卷三五大正二二五五中說帝釋語諸三十三天言諸仁者諸天與阿修羅共鬪戰時若生恐怖心驚毛竪者汝當念我伏敵之幢念彼幢時恐怖即除如是比丘若於空間樹下空舍而生恐怖心驚毛竪者當念如來如來應等正覺乃至佛世尊彼當念時恐怖即除這一譬喻似乎是神話而其實是的確有此情形的伏敵之幢是軍旗在古代如帥旗屹立軍隊望見了奮勇作戰如帥旗倒下那不是主帥被殺被俘就是逃走部隊不見了帥旗當下會士氣喪失而潰敗的如戰鬥中的軍士想到了主將的才能武器精良那部隊會士氣高昂不會驚怖而奮戰的依外在事物而增強自身的心力是確實存在的怕鬼唱山歌也是這種作用雖然聽到外來的聲音其實是出於自己的六念念佛不外乎應用這一意義如能導入預流那就性質不同原則的說這是一般神教所共有的六念等有安定內心除憂怖的作用經文大抵屬於九分教中記說部第三章方便道之發展趨向第一節六念法門的演化四不壞淨與六隨念是適應隨信行特別適應在家弟子的法門這是重信重福德的在信與福德的修行中導向菩提與般若相應以方便道而通甚深行佛法還是一味的與甚深法相通的六隨念是自力的修持如雜阿含經卷三三大正二二三七下說聖弟子念如來事如是念時不起貪欲纏不起瞋恚愚癡心其心正直得如來義得如來正法於如來正法衍文於如來所得隨喜心隨喜心已歡悅歡悅已身猗息輕安身猗息已覺受樂覺受樂已其心定心定已彼聖弟子於凶嶮衆生中無諸罣礙入法流水乃至涅槃六隨念所念境念佛法僧是三寶的功德念戒與捨是自己所有的功德念天是當來果報的殊勝莊嚴念境各不相同而修隨念所起的喜悅安樂定得預法流六念是一樣的雜阿含經所說與增支部說相同法蘊足論解說喜覺支說到六隨念內容也完全一樣因念得定所以清淨道論六念屬於定學中這是聖者所修也是通於凡夫的如病重時別離時恐怖時念三寶的功德等在一般信衆心目中無疑的會引起他力的感覺還有佛法在通俗宏傳中遇著新的情況如佛入涅槃了也就會引起新的問題新的解說影響到修行者隨念的內容也會有多少不同了適於信行人的法門易於通俗普及但也容易適應低級趣味而俗化神化這應該是關心佛教者所應該注意與反省的由於隨念內容的所有演化對佛教的發展起著重要作用所以分別的加以敘述一佛隨念簡稱念佛佛法本是正法中心的法是聖道依聖道而覺證法是佛出世如此佛不出世也如此本來如是釋尊的大覺成佛只是體悟了而不是發明了正法所以佛也是依法而住的釋尊圓滿的覺證了以世間的語文表達出來使多數的在家出家衆也能實現正法的覺證得到解脫自在隨佛修行者是依法而行的這樣佛法是依法不依人佛與隨佛修學者是先覺覺後覺老師與弟子的關係直到現在我們還自稱為佛弟子或三寶弟子大家的心目中也還覺得釋迦佛是我們的本師佛教的學衆有七衆弟子釋尊被稱為大師導師天人師佛弟子的依法而行如長阿含經二遊行經大正一一五上中說如來不言我持於衆我攝於衆豈當於衆有教令乎阿難當自歸依歸依於法勿他歸依對出家的比丘僧衆佛是依法攝僧並不以統攝者自居所以佛要入涅槃比丘們不應該有失去領導者而莫知所從的感覺只要依自己的精進依法而行就得了在傳記中釋尊起初是與比丘僧一起布薩的佛姨母以新衣施佛佛對他說持此衣施比丘衆施比丘衆已便供養我亦供養大衆佛是在僧中的頻婆沙羅王以竹園布施五分律說但以施僧我在僧中赤銅鍱律說以竹園施佛為上首比丘僧四分律說汝今持此竹園施佛及四方僧從施僧施佛為上首的比丘僧到施佛及比丘僧表示了佛與僧伽關係的演化情形佛在比丘僧中當然是比丘衆的上首是佛教的早期形態所以後來有主張佛在僧中的學派到了釋尊晚年一依法攝僧制定戒律成為有組織的僧伽教團依律而行半月布薩說威德波羅提木叉釋尊不再參預了二在佛弟子特別是有所證悟的聖弟子崇仰佛功德的偉大法乳恩深深感佛的慈悲越來越覺得佛是遠超於一般出家聖弟子的這才佛本來也稱為阿羅漢聖弟子阿羅漢也被稱為如來而現在佛不再只是聖弟子正覺而更進稱為無上等正覺了佛法僧鼎立別體應起於釋尊晚年四不壞淨六念等法門也依此成立後起的部派佛教大都是主張佛在僧外三寶別體的佛物或塔物與僧物的嚴格分別就是受了三寶別體思想的影響佛在僧中或佛在僧外成為部派的諍論所在其實是不用諍論的這是佛法流布中的先後階段釋尊的涅槃引起佛弟子內心無比的懷念對佛的憶念深深的存在於內心而表現於事相方面的是佛陀遺體遺跡遺物的崇敬佛的遺體舍利經火化而遺留下來的起初是八王平分舍利建塔供養塔是高顯的意思與中國的墳義相同佛涅槃以後人間的佛是見不到了見佛的舍利與見佛一樣由於佛法的發展教區不斷擴大西元三世紀中阿育王將佛舍利分布到各方建塔供養舍利塔是代表佛的與僧衆及傳誦修持中的法合為三寶表彰人間佛教的具體形相從此因佛教發展而舍利塔的建築更多塔也越建而越是高大佛牙也是佛的遺體所以也受到尊敬佛舍利的崇敬供養因信施而有福德並非神那樣的崇拜小品般若經也還這樣說諸佛舍利亦如是從般若波羅蜜生薩婆若所依止故得供養念佛信敬佛應信念佛的功德佛所有的無邊功德都是依此舍利遺體而成就的所以恭敬供養舍利無非藉此事相來表示佛作為佛弟子信念的對象啓發增進佛弟子內心的憶念而已佛的遺跡如誕生處成佛處菩提樹也受到尊敬轉法輪處入涅槃處四大聖跡其後增多為八大聖地都建塔紀念受到佛弟子的巡禮供養還有佛的遺物最受人重視的是佛所用過的鉢也建築高臺恭敬供養對舍利塔等的供養一切華香伎樂種種衣服飲食盡得供養還有幡幢蓋等也有供養金錢的佛弟子對佛遺體遺跡遺物的信敬供養可說採取當時民間祭祀天神的方式在一般人的心目中多少有點神的意識了不過在部派佛教中似乎還沒有向舍利等祈求保庇的意義這因為佛入涅槃不再對人世間有關係了念佛不能只是事相的紀念應念佛的功德在佛教的發展中佛的功德遠遠的超過了佛的聲聞弟子如大天的五事論諍前四事說明了聲聞弟子功德不圓滿也就反證了佛德的究竟圓滿佛德的所以究竟圓滿由於釋尊未成佛以前菩薩長時間的廣修自利利他功德未成佛以前的菩薩多數是傳說中的古人也可能是民間傳說中的天神鬼畜生菩薩故事紛紛在譬喻意思是光輝的事跡本生教典中流傳出來這些菩薩故事或從內容而類別為六波羅蜜或類別為四波羅蜜十波羅蜜成為菩薩與聲聞弟子的不同方便如妙法蓮華經卷一大正九八下說又諸大聖主知一切世間天人群生類深心之所欲更以異方便助顯第一義異方便是特殊的方便或殊勝的方便這是適應天人有神教信仰的欲求而是佛法本來沒有的方便什麼是異方便依經文所說是修菩薩行的六波羅蜜佛滅後造佛舍利塔造嚴飾的佛像彩畫佛像以華香幡蓋音樂供養佛塔與佛像歌讚佛的功德向佛塔佛像禮拜合掌舉手低頭稱南無佛這些就是成佛的異方便是釋尊涅槃以後佛弟子懷念佛在神教化的氣運中發展起來的懷念佛佛是越來越偉大是聲聞弟子所萬萬不及的了佛的身相在舊傳的三十二相外又有八十種好說佛的功德在十力四無所畏外又有十八佛不共法說對於佛的觀念佛教界分化了上座部系雖也有近於神話的傳說而始終以人間的釋尊為對象而念佛的功德佛出人間與人一樣的身體是業力所感的是有漏的終歸於無常滅壞念佛應念佛的功德佛之所以為佛的功德法身如遺教經說我諸弟子展轉行之則是如來法身常在而不滅也大衆部系對於佛傳中的事實如釋尊有病壽八十歲等認為佛果不可能有這種事所以說諸佛世尊皆是出世一切如來無有漏法佛傳中有病等事只是佛的方便傾向大衆系的法藏部也說今於雙樹間滅我無漏身譬喻者矩摩羅多也以為佛的色身及功德總為佛體重視佛的色身而傾向於理想佛陀觀後來發展到佛無所不在無所不知無所不能佛身不是一般所能見的人間所見的釋尊只是佛的方便示現大乘佛法的菩薩與法身如來是繼承這一思想光大發揚而來無所不在無所不知無所不能神祕不可思議的佛失去人間的親切感卻更適應於神的信仰者理想的佛陀雖說是最高神的佛化而到底經過了佛法的淨化一佛是修行所成者二佛不會懲罰人唯有慈悲三修行成佛佛佛平等不是神教那樣雖永生於神的世界而始終是被統治的比神低一級佛是這樣的超越依此而修持的念佛意境當然要不同了部派佛教時代多數是主張三寶別體的在三寶的信敬憶念中對佛的信念顯然的勝過了法與僧如上所說對佛的事相與理想佛弟子有著無限的懷念尤其是佛為法本法是佛所說的佛制戒律依戒律而後有和樂清淨的僧伽人間三寶的出現佛是在先的所以信念三寶而漸重於信佛念佛雜阿含經已有此情形如五根中的信根經上說信根者當知是四不壞淨而另一經又說何等為信根謂聖弟子於如來所起信心根本堅固這是專於如來菩提而起信了又如雜阿含經祇夜中四位淨居天來各說一偈讚歎雖讚歎比丘僧而末偈說歸依於佛者終不墮惡趣大會經初也有四天所說的同一偈頌這顯然對佛有更好的信心那先比丘經卷下大正三二七一下七二上說彌蘭王又問那先卿曹沙門言人在世間作惡至百歲臨欲死時念佛死後者皆生天上我不信是語復言殺一生死即入泥犁地獄中我不信是也那先問王如人持小石置水上石浮耶沒耶王言其石沒那先言如令持百枚大石置船上其船寧沒不王言不沒那先言船中百枚大石因船故不得沒人雖有本惡一時念佛用是不入泥犁中便生天上其小石沒者如人作惡不知佛經法死後便入泥犁王言善哉善哉彌蘭陀王與那先比丘的問答問題是一生中造作了無數殺生等惡業臨終時歸依佛憶念佛死後就上生天上不會墮落地獄而只殺一衆生的命終就墮地獄似乎難以信受那先以大石在船上不會沈下小石著水就沈作比喻表示惡業要墮落歸依佛念佛功德的偉大這是說從來不知佛法的造作無數惡業臨終時怖畏墮落聽人說起佛法引發對佛純潔而專一的信念才能不墮落而生天這決非平時口頭信佛儘作惡事而想在臨命終時念幾聲佛就可以不墮落的南傳彌蘭王問經說善業如船可見是歸依念佛的善力勝過了衆多的惡業彌蘭陀王是西元前二世紀人那時念佛功德的殊勝已成為佛教界的論題了大智度論說五百位入海的商人遭遇到摩伽羅魚王的厄難有一位佛弟子教大衆稱念南無佛才脫離了魚王的厄難這是因佛聲而引起魚王的悔心免除厄難並非依賴佛力的救濟念佛脫魚王的厄難念佛而不墮地獄並非由於不思議佛力的護持這是不忘佛法本義的論師們的見解在通俗的一般人心中怕已想像為佛力的護持了二法隨念念法念法本是念法八正道緣起四諦等的功德法是佛所說的由弟子憶持在心展轉傳誦佛法是這樣流傳起來佛涅槃後弟子們將憶持傳誦的佛說經大衆集會共同審定分類而編為次第名為結集以後各方面都不斷的傳出佛說所以又一再的共同結集但各處傳來的到底是否佛說以什麼為取捨標準起初是依經依律後來法藏部等說依經依律依法這就是佛語具三相一修多羅相應二不越毗尼三不違法相性前二是與原始集出的經律相順而不相違的第三是不違論究與體悟的法相各派所傳的聖典都有出入這是部派分化的原因之一聖典的不斷傳出說不出來歷不為各派所公認就說是在天上說的從天上來的如南傳的七部阿毗達磨除論事以外傳說是佛在忉利天上說的順正理論說尊者迦多衍尼子等於諸法相無間思求冥感天仙現來授與如天授與筏第遮經不斷傳出的佛典仰推從天上傳來部派佛教間就大抵如此了佛的時代印度早已有了文字而聖典卻一直在憶持中印度教的教典也如此專憑憶持傳誦聖典就不免多變化了古稱阿難為多聞第一就是稱讚阿難憶念受持的經法最多聖典越來越多所以比丘中有持經法者持律者持論母者就是分類的專業憶持者分別功德論說上者持經律論三藏其次持四阿含經或能受持律藏即是如來寶這可見佛弟子重視聖典的憶持了佛弟子念法經律論而重視記憶念力是必然的但經典浩繁記憶不易怎樣能增強記憶的念力呢增強念力也就是增強記憶力的訓練達到過耳不忘這就是三藏所沒有而新出現於佛教中的陀羅尼了大智度論說是陀羅尼多種一名聞持陀羅尼得是陀羅尼者一切語言諸法耳所聞者皆不忘失有小陀羅尼如轉輪聖王仙人等所得聞持陀羅尼分別知衆生陀羅尼歸命救護不捨陀羅尼如是等小陀羅尼餘人亦有陀羅尼是印度人所舊有的譯義為能持或總持依佛法說陀羅尼是一種潛在的念力得到了能歷久不忘大智度論並傳有聞持陀羅尼的方便一般的咒陀羅尼也只是一種達成念念不忘歷歷分明的訓練法而已佛法中本沒有說到陀羅尼採取印度舊有的而引入佛法無疑的與憶持教法有關三念僧憶念四向四果的聖德確信是值得恭敬供養的聖者是念僧的本義然從住持佛法的僧伽來說凡是出家受具足戒的成為僧伽的一員僧伽是比丘比丘尼組成的僧團僧團中雖不一定是聖者而四向四果的聖者在這僧伽以內功德圓滿的佛涅槃以後存在於世間佛弟子的懷念中佛所說的法與律依僧伽的憶持宣說身體力行而存在於世間所以三寶住世重在僧伽佛依法攝僧為了十種義利而制戒律目的在組成一和合喜樂清淨健全的僧團健全的僧團對內能促成修證賢聖輩出對外能增進社會一般的信仰這樣能達成正法久住人間的目的所以念僧是世間無上福田施僧的功德最大佛滅以後的佛法依僧伽而住持宏傳僧伽受到特別的尊重但佛功德的崇高在佛弟子的心目中正不斷昂揚主張佛在僧中的化地部說僧中有佛故施僧者便獲大果非別施佛法藏部說佛雖在僧中所攝然別施佛果大非僧佛在僧外的部派當然施佛的功德大於施僧了僧伽中有聖者不只是事相的清淨如事相僧漸漸的不如法那信者更要敬念佛的功德了中國佛教有一句話說不看僧面看佛面正意味著僧衆品質的沒落四念戒前三者因信三寶而念與信相應的念而念戒是憶念自己持行的淨戒依在家出家男女成年未成年等不同佛施設了五戒八戒十戒學法女戒具足戒等不同的戒這是適應不同的性別年齡環境而戒的實質是一樣的力有大小強弱所以戒類雖然不同而都可以依之修定大智度論卷一三大正二五一五三中說尸羅此言性善好行善道不自放逸是名尸羅或受戒行善或不受戒行善皆名尸羅尸羅譯為戒是一種離惡行善的力量戒與一般的善行是不同的是好行善道不自放逸習性所成不斷行善的內在力量一般人總不免想行善而缺乏力量如經父母師長的教導宗教的啓發或從自身處事中發覺內心經一度的感動激發引發勇於為善防護過失的潛力這是通於一般人異教徒所以一般人也可得人天福報的但佛法卻基於這種淑世利群的戒善而趣向於出世佛弟子受戒就是為了得到這一離惡行善的潛力一般稱為得戒如戒行偶有違失應如法懺悔回復清淨沒有缺失沒有污染的清淨戒可以引發禪定所以說是聖者所樂戒有了戒善就不會墮落了這是通於世間與出世間的五念施施是施捨念自己所作施捨的福報施捨要離慳吝心而施常施親手施平等施歡喜心施衆生所有物質的享有都是施捨的福報在施戒修慈悲心定三種福業中施是重於利他的如雜阿含經卷三六大正二二六一中說種植園果故林樹蔭清涼橋船以濟度造作福德舍穿井供渴乏客舍給行旅如此之功德福德日夜常增長這是適應印度古代最有意義的布施印度氣候炎熱所以廣植林樹的園苑供人休憩也提貢蔭涼爽適的場所印度的出家衆中食以後大抵在附近林園的樹蔭下禪坐造橋與渡船使河流兩岸的住衆得到往來的便利穿井取水供應渴乏的旅行者福德舍建在遠離村邑行人往來的大路旁行人晚上可以在這裡住宿佛教的僧衆遊行如當地沒有僧寺也就住在福德舍裡這些都是社會的公共福利地方有力人士所應該做的被稱讚為功德日夜常增長摩訶僧祇律與四分律也提到這一偈頌對布施個人來說供養父母師長沙門婆羅門宗教師貧病都是當時社會一般的布施自佛法興起施佛與施僧日漸重視起來在十四種個人施中施佛的功德最為第一重視施僧所以列七種施僧的功德中阿含經的世間福經說有七世間福得大福祐得大果報得大名譽得大功德七福的內容是施僧房舍堂閣床座臥具新衣朝食中食園民風雨寒雪時增加供養須達哆經論布施功德以作房舍施四方比丘衆為最上稱揚施僧的大功德表示了寺院佛教世界性佛教的發展六念天天在印度語中是光明的意思古人依空中光明而意感到神的存在所以稱神為天天比人間好得多身體壽命享受世界都比人間好所以求生天界天堂天國是一般宗教大致相同的願望念天法門是念天界的安樂莊嚴是布施持戒修定者的生處在佛法中這是對三寶有信心有施捨持戒的德行才能生天界如具足信戒施慧那就能得預流果生於天上念天的莊嚴安樂善因善果而得到內心的安寧喜樂與滿足天神是一般宗教所共同的佛否定神教中偏邪迷妄的信行但隨順世俗容認神天善因善報的存在而作進一步的超越解脫經中常說天魔梵是印度神教當時的看法梵是梵天是永恆究竟的人如解脫生死即梵我不二或說復歸於梵魔也是天是障礙人向上向善的惡者不能達到梵我合一的不論天報怎樣好不能脫出魔的控制天泛稱魔以下的種種神這一天魔梵的次第合於印度神教的層次但依佛法以最高創造神自居的梵天還在生死流轉中佛與佛的聖弟子要超越於天魔梵的境界佛普入八衆天有四衆四大王衆天忉利三十三天衆魔衆梵天衆梵天依佛法說屬於色界魔天即他化自在天以下一向類別為欲界六天次第如下天魔梵四大王衆天忉利天衆魔衆梵天衆四王天忉利天兜率天夜摩天化樂天他化自在天梵天在佛典中與創造神相當的梵天請轉法輪恭敬讚歎負起領導天人信佛法的作用魔天極力障礙佛與弟子宏傳正法而終於不能破壞兜率天是釋尊前生的住處與佛教原是印度民間關係最密切的是忉利天與四大王衆天忉利天在這世界中心須彌山頂四王天在須彌山四方的高山上這都是地居天與我們共住在這個世界上忉利天主名帝釋釋提桓因可說是多神王國的主帝釋在享受天國的物欲外是一位鼓吹和平忍辱反對鬥爭信敬三寶的大神大梵天與帝釋是佛天上弟子的上首四大王衆天的天主即著名的四大天王東方的持國提頭賴吒南方的增長毗樓勒叉西方的增廣毗樓博叉北方的多聞毗沙門這四位天主提頭賴吒是犍闥婆毗樓勒叉是龍毗樓博叉是鳩槃荼毗沙門是夜叉龍是畜生夜叉等是鬼傳說的天龍八部還有阿修羅迦樓羅緊那羅摩睺羅伽迦樓羅是妙翅的鳥與中國傳說的鳳鳥相近摩羅伽是大蟒神這二類與龍都是畜生夜叉等是鬼趣四天王所統攝的還有衆多的鬼神這些高等畜生上等鬼王多財鬼稱為天而其實是鬼畜帝釋也是夜叉忉利天城的守護者也是夜叉所以這地居的二天含攝了高等的畜生與鬼等於中國所傳的有功德的死後為神與狐蛇等妖是低級的多神教品格良莠不齊在這些鬼天畜天中夜叉與龍對佛教有著較重要的地位念天是憶念欲界六天的福報與一般民間信仰特別密切的是忉利天與四大王衆天這二天衆有善良的也有暴惡的良善的是佛法的信仰者僧伽的護持者如長部的大會經與阿吒曩胝經說暴惡的以佛法感化他使轉化為良善的如佛化鬼子母不再食人的幼兒這是佛法對良莠不一的天衆所採取的根本原則印度神教的某些宗教行為如殺害犧牲的祭祀火供養護摩水中洗浴得清淨向六方禮拜祈求禱告生天這些都加以否定觀察星宿占卜瞻相召喚鬼神或復驅遣厭禱咒術這些與鬼畜天神相結合的迷妄行為是出家弟子所絶對禁止的對在家信衆似乎沒有嚴格的禁止所以在佛法普及過程中這些迷妄行為有通過在家弟子而滲入佛法的可能還有修慈悲喜捨無量這可說是博愛定的能生於梵天梵天沒有男女性別稱為梵行所以梵天的德性是相當高尚純潔的佛弟子也有方便勸人修梵行而生梵天的但梵天的生死未了慢性根深所以會有自稱常恆不變為人類之父的邪見這是佛法所明確豫以破斥的忉利天與四王天鬼畜天雖有善良的而充滿忿怒暴惡的也不少尤其是毒龍羅剎與夜叉欲界天是有男女性別的忉利天與四大王衆天與人類一樣的兩性交合而成淫事所以傳有貪欲戀愛的故事梵天慢與欲天的忿怒貪欲所以不能解脫生死佛法是要斷除這些煩惱的如眩惑於傳說中的天威而取崇拜的傾向那佛法怕不免要漸漸的變質了適應信強慧弱的中下根性傳出了四不壞淨六念等法門六念中念佛是對佛遺體遺跡等事相的憶念或是對佛因菩薩行與果德等理想的憶念佛弟子對佛的永恆懷念使念佛法門特別發達這不是念法念施等所可及的惟有與形而上實體相結合的梵天及鬼畜天的信仰在一般民間有悠久與廣泛的影響所以念天法門從佛教思想史看來也是非常發達的這本是通俗的方便但發展到念佛與念天合流那是佛的神化神的佛化形成高深神祕庸俗的大統一也就演進到與佛法相反的方向第二節通俗化與神化佛法流行人間成為佛教一天天發展起來佛教是以出家僧伽為中心的出家是離眷屬離財物名位的愛著而過著為求解脫而精進的生活早期佛教的形象是恬淡的朴質的安詳的沒有一般神教的迷妄行為祭神咒術占卜等也不與神教徒諍論重在實行也不為佛法而自相諍論不許眩惑神奇貪求利養釋尊涅槃後特別是阿育王以後佛教與寺塔大大的發展寺塔建築的莊嚴寺塔經濟的富裕藝術圖畫雕刻音樂歌舞也與佛教相結合而佛教出現了新的境界那是部派佛教時代就已如此了佛塔是供奉佛舍利的建塔起初是在家弟子的事後來漸移轉為僧伽所管理進一步塔與洞窟的修建工程通俗宏化的唄𠽋者也熱心的來參加出家衆為修建寺塔等而發心服務如根本說一切有部毗奈耶卷四大正二三六四二中說時諸苾芻既聞斯說若能作福者今世後世樂多行乞丐於佛法僧廣興供養時佛教法漸更增廣在這段文字中看到了比丘們到處去乞求中國名為化緣用來供養佛建塔供養塔法僧建僧坊供僧衣食這樣佛教越來越興盛了比丘們不但為修建作福而到處化緣也發心為修建而工作如十誦律說諸比丘作新佛圖塔擔土持泥墼磚草等粗泥細泥黑白塗治四分律說為僧為佛圖塔講堂草庵葉庵小容身屋為多人作屋不犯比丘為修建而作工是各部派所共許的如十誦律說阿羅毗的房舍比丘在屋上作手中失墼墮木師木工上銅鍱律也有此事並分為好幾則寺塔的增多興建可以攝引部分人來信佛可說佛法興盛了但重於修福求今生來生的幸福與佛法出世的主旨反而遠了修福也是好事但出家衆總是讚揚供養三寶的功德信衆的物力有限用在社會福利事業怕反要減少了佛教以出家衆為中心出家到底為了什麼出家要受具足戒取得僧伽成員的資格受了戒戒師要勉勵幾句如四分律卷三五大正二二八一六上說汝當善受教法應當勸化作福治塔供養佛法衆僧應學問誦經勤求方便於佛法中得阿羅漢果比丘出家受戒怎麼首先教他勸化作福治塔呢十誦律這樣說精勤行三業佛法無量種汝常憶念法逮諸無礙智如蓮華在水漸漸日增長汝亦如是信戒聞定慧增五分律說汝當早得具足學戒學三戒滅三火離三界無復諸垢成阿羅漢這是更適合於訓勉初出家比丘的四分律在後重視修福治塔因為四分律是法藏部律法藏部是主張於窣堵波塔興供養業獲廣大果大果是究竟解脫成就佛道為極力讚揚舍利塔的部派所以在四分律戒經中增多了有關敬塔的戒條這樣佛弟子半月半月布薩終了五分戒本說諸佛及弟子恭敬是戒經恭敬戒經已各各相恭敬慚愧得具足能得無為道僧祇戒本也如此四分律比丘戒本卻這樣說我今說戒經所說諸功德施一切衆生皆共成佛道說一切有部舊律十誦戒本與五分戒本等相同而新律的根本說一切有部戒經也追隨四分律而說皆共成佛道了寺塔的興建高廣莊嚴部分的出家比丘傾向於福德也就自然同情大乘的共成佛道了釋尊對傳統的婆羅門東方新興的沙門這類宗教的信仰思想行為採取寬和的態度對種種思想如身與命是一是異等釋尊總是不豫答覆無記而提出自悟的緣起說如長部一梵網經類集異見為六十二見以為異教所說的有他定境的經驗事出有因而論斷錯誤可說是寬容的批評對一般信仰的天龍鬼神也採取同樣的態度鬼神是有的但是生死流轉的可憐憫者值不得歸信所以出家衆不得祀祠鬼神不得供天不得作鬼神塔高級的梵天是請佛說法者忉利天的帝釋釋提桓因來人間聽佛說法成為佛的兩大天弟子善良的鬼神龍都讚歎佛成為佛教的護持者佛法中早就有了通俗化導鬼神的法門如四部阿含有不同的宗趣覺音的長部注名吉祥悅意也就是龍樹所說的世界悉檀如長部的闍尼沙經大典尊經大會經帝釋所問經阿吒曩胝經等是通俗的適應天神信仰的佛法特別是阿吒曩胝經是毗沙門天王與信心夜叉所奉獻有守護佛弟子得安樂的作用其實與雜阿含經相當的相應部有偈品中的天相應天子相應夜叉相應林神相應魔相應帝釋相應梵天相應都是以佛陀超越天魔梵的立場而又融攝印度的民間信仰釋尊對印度鬼神的態度是溫和的革新者在出家僧團內部隔離這些神教的信行以純正的理性的信心而對固有神教起著潛移默化的作用這一態度對當時的佛法來說可以減少異教徒抗拒的困擾而順利的流行於當時神教的天魔梵不足歸信但容許是有的有就會引發一些想不到的問題如赤銅鍱部律說一比丘與龍女行不淨淫行夜叉餓鬼與黃門行不淨行四分律說到若天子若龍子阿須羅子犍闥婆子夜叉餓鬼的殺罪僧衆與天龍鬼等有實際的關涉是一致肯定的如受比丘戒先要審查資格問遮難有一項問題是人不或作汝非是非人鬼神非是畜生耶這是說如是鬼神或畜生如龍變化作人形那是不准受戒的這表示了僧伽內部的出家衆有鬼神與畜生來受比丘戒的傳說又如咒術是僧衆所不准信學的但同樣的承認它的某種作用銅鍱律說到咒斷鬼命以咒術殺人也是五分律僧祇律十誦律等所記載的世間咒術是不准學的但漸漸有限度的解禁了為守護而學咒文不犯若誦治腹內蟲病呪若誦治宿食不消呪若學書若誦世俗降伏外道呪若誦治毒呪以護身故無犯總之為了護自己身世俗咒術是可以學習了本來是對外的方便容忍異教的民間信仰而重事相的律師們不能堅持原則反而讓它滲透到僧伽內部中來漸漸的擴大佛法將迅速的變了佛教流傳到那裡就有釋尊到過那裡在那裡降伏夜叉與龍等傳說如島史南傳六六三說佛陀成正覺第九月破夜叉軍勝者成正覺第五年調伏諸龍成正覺第八年入三摩地如來三次來楞伽島據島史說釋尊初次來楞伽島時島上有夜叉部多羅剎排斥佛的教法所以佛將他們驅逐到島去住第二次島上有大腹龍與小腹龍互鬥不已釋尊偕三彌提比丘去楞伽降伏二龍第三次釋尊與五百比丘到楞伽島的河口在那裡入定教化群龍西元前三世紀阿育王時佛法傳入錫蘭而釋尊當時竟已來過三次了這是南傳赤銅鍱部的傳說同樣的傳說出現於北方如根本說一切有部毗奈耶藥事大正二四四上四一中說世尊告金剛手藥叉曰汝可共我往北天竺調伏阿鉢羅龍王世尊遊行至積集聚落時彼聚落有住藥叉名曰覺力心懷暴惡藥叉答曰我今捨惡更不為害世尊復至泥德勒迦聚落復有藥叉名曰法力世尊便即調伏世尊復至信度河邊調伏鹿疊藥叉世尊復至仙人住處於此調伏杖灌仙人如來與金剛手藥叉到無稻芉龍王即阿鉢羅龍王宮中金剛手威伏龍王無稻芉龍王及諸眷屬皆悉調伏世尊又到足爐聚落已調伏仙人及不發作藥叉於犍陀聚落調伏女藥叉世尊復到乃及理逸多城攝化陶師世尊次至緑莎城於其城中為步多藥叉及其眷屬說微妙法於護積城中調伏牧牛人及蘇遮龍王世尊次至增喜城調伏栴荼梨七子并護池藥叉城側有一大池阿濕縛迦及布捺婆素於此池中俱受龍身世尊於其池所便留其影世尊至軍底城於其城中有女藥叉名曰軍底常住此城心懷暴惡而無畏難一切人民所生男女常被食噉調伏此女藥叉并眷屬已便捨而去佛法傳入北天竺比傳入錫蘭要早些據說釋尊與金剛手藥叉早已乘空而來調伏藥叉夜叉與暴龍了這些傳說可能有兩種意義一釋尊遊化的地區名為中國沒有去遊化的就是邊地佛教的中國本指恆河兩岸佛法傳入錫蘭傳到北印度佛法相當的興盛比之恆河兩岸並不遜色這應該是佛曾來過可說是廣義的中國了佛法傳到了西域的今新疆省于闐為大乘佛法重鎮日藏經也說以閻浮提內于闐國中水河岸上近河岸側瞿摩娑羅香大聖人支提住處付囑吃祇利呵婆達多龍王守護供養佛告龍王我今不久往瞿摩沙羅牟尼住處結跏七日受解脫樂這樣釋尊也曾到過于闐了二古代任何地區人民都有鬼神的信仰也就有種種神話有些神與當地民族有親緣關係佛法的傳布要在當地人民心中建立起佛陀超越於舊有神靈以上轉移低級信仰為佛法的正信這就是調伏各處暴惡龍與夜叉的意義錫蘭北天竺于闐等地民間信仰的鬼神不一定稱為夜叉那伽龍畢舍遮等等到佛法傳來固有低級的鬼神也就佛化其實是印度化了又如阿育王時去各地宏法的傳教師中末闡提到犍陀羅與罽賓降伏阿羅婆樓也就是北方所傳的無稻芉龍王末示摩等在雪山邊降伏夜叉須那迦與鬱多羅到金地國降伏食人小兒的女夜叉佛法傳到那裡就有降伏該地區固有鬼神的傳說只是表示了佛法的信行取代了舊有低級的信行這是世界悉檀吉祥悅意而已但這些低級的鬼龍轉化為佛法的護持者增多了佛教神化的內容
