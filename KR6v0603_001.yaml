body:
  text: 緒言二千五百多年前釋迦牟尼佛以下簡稱釋迦佛或釋尊誕生於中印度出家修行在菩提伽耶成佛成佛後四十五或作九年間遊行於恆河兩岸為大衆說法佛的法才流行於人間佛法是世界性的本沒有種族與國界的局限但佛法是出現於印度流傳於印度由印度而傳到世界各地區的所以雖有部分教典傳說從天上來從龍宮來從他方世界來而一切教典的原本都是使用印度人的語文經傳誦記録而流傳下來的因此佛法可以說到鬼神說到他方世界說到超越人間的事理卻不可忘記了一切佛法是出現於印度人間因釋尊在印度成佛說法而開始的佛法在印度的長期約一千六百年流傳分化嬗變先後間有顯著的不同從不同的特徵可以區別為三類一佛法二大乘佛法三祕密大乘佛法一佛法釋尊為弟子說法制戒以悟入正法而實現生死的解脫為宗弟子們繼承了釋尊的經法與戒律修習宏傳西元前三年前後弟子們因戒律與法的見地不同而開始分派其後一再分化有十八部及更多部派的傳說如現在流行於斯里蘭卡即錫蘭等地區的佛教就是其中的赤銅鍱部二大乘佛法西元前一世紀有稱為大方廣或大乘者興起次第傳出數量衆多的教典以發菩提心因修六度等菩薩行道圓成佛果為宗這一時期論義非常的發達初期佛法的論義也達到精嚴的階段從西元二世紀起到八世紀中延續到一一世紀初譯傳於我國的華文教典就是以大乘佛法為主的三祕密大乘佛法西元五六世紀起三密相應修天瑜伽迅速成佛的願望流行起來密典也就不斷的次第傳出傳入西藏的佛法大乘佛法以外主要是屬於這一類的佛法有此三大類型也就是印度佛教史上的三大時期這一切從出現於印度來說都是流傳於印度人間的佛法佛法在印度的不斷演化原因是非常錯綜復雜的我在初期大乘佛教之起源與開展一一頁中曾這樣說從佛法而演進到大乘佛法的過程中有一項是可以看作根本原因的那就是佛般涅槃所引起的佛弟子對佛的永恆懷念大乘佛法如此從大乘佛法而演進到祕密大乘佛法也不離這一原因不過離釋迦佛的時代遠了對佛的理念也多少遠了些佛的弟子有在家的有出家的依法修行求解脫沒有什麼不同但佛法的住持與宏揚從釋尊以來無疑的是以出家主要是比丘衆為中心的佛法的住持宏揚是多方面的比丘衆的個性與特長也不盡相同佛弟子從事的法務各有所重比丘也就有了持法者持律者論法者誦經者唄𠽋者瑜伽者等不同名目持法者與持律者是阿含經法與戒律的集成者誦持者佛法在僧團中的護持延續持律者律師是有重大貢獻的戒律是道德的軌範生活的準則僧團的規制這一切毗尼律是世界中實釋尊是適應當時當地的情形而制定的初期的結集者為了護持佛教的統一性決定為若佛所不制不應妄制若已制不得有違如佛所教應謹學之但也由於這一規定律制受到了限制不能隨時代地區不同而作正確的適應失去世界中實的意義窒礙難行有的就精進修行對律制是一切隨宜了這一僧伽制度雖一直其實還是多少變通延續下去但在大乘佛法興起時已不為大乘行者所重視所以大乘佛法以後的開展幾乎都是法的開展經法的住持宏傳出現了誦經者與論法者也就是經師與論師大概的說大衆部系是重經的上座部系是重律而又重論的經法的誦持者多作對外的一般教化依經而宣揚經的要義又舉事例來比喻說明在佛法的宏揚中傳出了衆多的譬喻本生因緣是佛與弟子們今生及過去生中的事跡這是佛教界共傳共信的不過傳說得多少差別些在宣揚經法時講說這些事例使聽衆容易信受如阿育王派到各地區的宏法者大多是講說有譬喻本生因緣的經法說一切有部中有持經譬喻者一系上座部系的其他部派也應有持經而重一般教化的比丘持經譬喻者的一般教化從傳記故事而又藝術化與重聲音佛事的唄𠽋者相結合如法華經所說的法師受持讀誦解說書寫法師是的對譯也就是法的唄𠽋者唄𠽋者也與建築寺塔等有關大乘佛法興起有更多的佛與菩薩的本生譬喻因緣流傳出來傳說每與一般信衆心理相呼應與民間神話古事等相結合如過分重視這些傳說很可能偏向適應世俗的低級信行論法者是僧衆內部對法義的論究者起初是摩呾理迦本母對每一論題一一法門其後演化為一一經的明確解說如法集法蘊等論佛教就有了持母者有的對一一法的自相共相相攝相應因緣等作深入廣泛的論究名為阿毗達磨對法也就有了持阿毗達磨者阿毗達磨論非常發達成為論書的代表取得了與經律的同等地位總稱為三藏論義從修行的項目擴展到佛法全體對於佛的應機說法或廣或略或同或異或淺或深加以分別抉擇條理使佛法的義解與修行次第有一完整而合理的體系所以佛法是宗教而又富於學術性的但論者的思想方式各有所長不同的傳承發展論義也就有部派的異義等到大乘佛法興起又依大乘經造論如龍樹論是南方經師及北方論學的綜合者無著世親等論書淵源於說一切有部的經師及論師更接近阿毗達磨論者論是經過分別抉擇不是依文解義的如龍樹依據四阿含經的不同宗趣立四悉檀以解說一切經義無著論立四意趣與四祕密用來解釋經義這是說對於經典不能依文解義望文生義而要把握佛法的真實意趣去解說一切貫通一切大乘佛法時代論義特別發達在論究抉擇法義外也有面對梵文學的興盛印度教教義發達而負起評破外學成立佛法自宗的任務瑜伽者即一般所說的禪師佛是覺者佛法是覺者的法法是本來如此的佛出世如此佛不出世也如此但佛的教法是由於釋尊的覺證正法然後適應時機開示宣說教導弟子們修持也能證入正法而得大解脫所以佛法是從證出教的本著自身的修驗來教人的也就因此佛弟子尤其是出家的佛弟子從原始的經律看來都是過著修行生活的說到修行主要是戒定慧三學出家衆依戒而住過著潔身自好守法於大衆中和樂共住的集團生活在家衆生活方式不同但有關道德的戒行還是大致相同的定與慧的修習就是瑜伽行專於修習定慧的被稱為瑜伽者瑜伽者大抵住於適宜於專修的阿蘭若處但為了法義與持行方法還是要到大衆住處來請益的僧事出家衆的共同事務多了佛弟子有了偏重與特長但並非經師們不修行瑜伽者不知法義的雖然傳習久了不免彼此間的風格不同但在同一的佛教來說這應該不是對立的說到定慧熏修傳授者要識別來學者的根機授以應機的修持法門如雜阿含經說有比丘修不淨觀斷貪欲修慈心斷瞋恚修無常想斷我慢修安那般那念斷覺想修不淨觀可以對治貪欲如九想等修慈心可以對治瞋恚修無常想的可以對治我慢修安那般那念也就是修數息觀的可以對治覺想尋思多種多樣的雜想這些煩惱是人人都有的但人的根性不同某類煩惱特別重的就應修不同的法門來對治後代所傳的五停心五種淨行所緣就是由此而來的對初學者要應病與藥如修法與根性不適合精進修行也是難得利益的瑜伽者的根性不一大抵以自己修持而有成就的教人這樣的傳習下去瑜伽者也就各有所重了同樣的修習方法流傳久了也會多少差別如數息觀雖大致相同而四門或六門數入或數出就不一致瑜伽者又隨地區部派師承而分流了不但如此瑜伽者觀行成就呈現於自心的境界瑜伽者是深切自信的這可能引起義解上的歧異如阿毗達磨大毗婆沙論卷九大正二七四五上說隨有經證或無經證然決定有緣一切法非我行相謂瑜伽師於修觀地起此行相依修持經驗而成為教義的如法救說二聲語與名無有差別二事相行別是入三昧乃知瑜伽者的修持經驗影響到論師的義學論義也會影響瑜伽者如修行道地瑜伽行地經的長行是以論義解說瑜伽本頌內容就多少變化了經師教化者的傳說也會影響論師與瑜伽師總之佛法在佛弟子對佛的永恆懷念中誦經者唄𠽋者論義者瑜伽者彼此不斷的相互影響而從佛法到大乘佛法又從大乘佛法演進到祕密大乘佛法雖說彼此間相互影響但發展到出現新的階段除適應時地而外瑜伽者是有最重要的關係修行者本著自身的修驗傳授流通漸漸的成為大流進入新的階段佛法的宗派大多是從證修持經驗出教的修行是佛法最重要的一環不過佛法是解脫道大乘佛法是菩提道解脫道是甚深的菩提道是難行的為了宏法利生無論是攝引初學種植出世善根或是適應當時當地的一般根機不能不善巧的施設方便佛法展開的修行方便是重信的淺近容易一些也就能普及一些佛法如大海漸入漸深所以由淺而深由易入難不能不說是善巧的方便不過古代的方便有些是適應神教的低級信行有些是適應不務實際的信行如過分的重視方便以為是究竟無上的那不免買櫝還珠了本書想從一般的方便道來說明印度佛法的流變表示印度佛教史的一面上編佛法第一章中道正法第一節佛法甚深釋尊修證而得究竟解脫的名為法佛是正法的圓滿體證者教法由佛而傳出所以名為佛法佛法出現於印度與印度及一切的神教有根本的不同處是一般人所不容易信受契入的所以說佛法甚深說佛法甚深並非說教典與著述繁多法海汪洋不容易充分了達也不是說佛法是神祕莫測的或法義圓融無礙而博大精深的那為什麼說佛法甚深呢如實的說佛法本來如是是無所謂深不深難不難的如果說是深是難那是難在衆生自己深在衆生自己如過去善根到了成熟階段佛法可說是並不太深太難的如釋尊在王舍城異學刪闍耶的上首弟子舍利弗見五比丘之一的阿說示威儀具足諸根澄淨就問他老師是誰學什麼法阿說示簡要的說諸法從緣起如來說是因彼法因緣盡是大沙門說舍利弗聽了當下就悟入得法眼淨舍利弗回去他的好友大目犍連見舍利弗的神色澄淨問他得到了甘露嗎舍利弗將經過告訴他也說了諸法從緣起偈目犍連也悟入了正法於是二人率領了二百五十弟子來見佛成為佛的弟子這不是言下直入嗎也許有人要說舍利弗與大目犍連一向是從刪闍耶修行早已成就戒成就定所以能直下悟入那不妨再舉幾則事實來說明一波羅奈的長者子耶舍一向過著奢侈的欲樂生活一晚忽然感到了物欲的空虛內心非常不安一個人外出走向山林喃喃自語的說禍哉禍哉那時釋尊在露地經行見到了就對耶舍說這裡沒有災禍耶舍坐下來佛為他說法當下就悟入了正法這還可以說耶舍雖長在欲樂生活中內心已激發了厭患的情緒但毗舍離的郁伽長者可不同了二郁伽長者與婦女們在大林中飲酒歡樂在酩酊大醉中見到釋尊就忽地清醒了佛為郁伽說法也就當下悟入這二位是從貪染欲樂中來的三鴦掘魔羅是一位逢人就殺的惡賊行旅非成群結隊不敢通過釋尊從那邊過鴦掘魔羅執劍趕來卻一直追不上口呼沙門住住佛答應說我住汝不住鴦掘魔羅覺得話說得離奇問佛是什麼意思佛為他說法鴦掘魔羅也當下悟入放下刀箭從佛出家如果說放下屠刀立地成佛聖這是最真實的事例這一位是從殘暴瞋害中來的四婆四吒婆羅門女六個兒子一個個的死了想兒子想得發了狂裸體披髮到