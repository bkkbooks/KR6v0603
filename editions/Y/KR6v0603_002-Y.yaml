body:
  text: 中編大乘佛法第一章泛論普及而又深入的大乘第一節崇高的佛陀與菩薩僧西元前一世紀中大乘佛法以新的姿態出現於印度大乘佛法是以發菩提心修菩提行成就佛果為宗的發心修行的名為菩提薩埵簡稱菩薩修行到究竟圓滿的名為佛菩薩與佛有不即不離的因果關係佛果的無邊功德莊嚴是依菩薩行而圓滿成就的由於眾生的根性不同大乘佛法從多方傳出來也就有適應智增上的信增上的悲增上的不同但從佛法而演進到大乘佛法主要還是佛般涅槃所引起的佛弟子對佛的永恒懷念也就因此大乘佛法比起佛法來有更多的仰信與情感成分這樣佛法中以信為本的方便道普及而又能引入甚深的如六隨念的一部分當然會有更多的開展就是繼承甚深行而來的廣明菩薩發心修行證入甚深也就是難行道的眾多教典也有不少的方便成分所以是甚深而又能普及的法門充滿理想而能普及的大乘佛法在舊有的佛法傳統中脫穎而出佛法進入了一新的階段釋尊涅槃了引起佛弟子無限的懷念部分佛弟子的懷念傾向於形而上的理想化的引出了大乘佛法的新境界涅槃佛法以為是超脫了無休止的生死流轉佛與聲聞弟子是沒有差別的涅槃是生死苦的止息不生不滅無量無數不能再以有無來表示徹底的說世間的思想與語文什麼都是無法表示的在世俗說明上涅槃也可以說是有的實有的但不能想像為人天那樣的個體對一般人的世間心識來說涅槃了的佛與阿羅漢不再與世間相關除傳誦中的法與律外僅留佛的遺體舍利為人供養作福是不能滿足人心需要的但也就由於這樣涅槃了的佛與阿羅漢不是佛弟子祈求的對象不會附上迷妄的神教行為佛法仍然保持了理性的宗教新形象佛法甚深這樣的涅槃連闡陀都難以信受何況佛涅槃後的一般信眾呢不能滿足人心在對佛的懷念中大眾部等以為一切如來無有漏法如來色身實無邊際如來威力亦無邊際諸佛壽量亦無邊際佛的涅槃不只是寂滅可說超脫一切而不離一切永遠的大慈大悲利益眾生方廣部說釋迦佛住兜率天成佛現生人間的是化身後來大乘經進一步的說住色究竟天於彼成正覺那是與印度教的最高神大自在天同一住處了說到釋尊的壽命或說七百阿僧祇劫或說我成佛已來甚大久遠壽命無量阿僧祇劫常住不滅起初大乘經還以阿羅漢的涅槃比喻菩薩的自證也有同入無餘涅槃而滅度之的經說其實阿羅漢的涅槃不是真涅槃只是佛的方便化導而已總之佛智不可思議佛涅槃不可思議只能以信心來領受能生信心也是難得的了經中說七佛原只是隨順世間七世其實過去已成的佛是無量數的佛法沒有說到現在還有其他的佛名大眾部卻說十方世界有佛佛說世界無量眾生無數與釋尊同時十方世界有多佛出世應該是合理的他方世界不一定是清淨莊嚴的但大乘經所說的他方世界似乎總是比我們這個世界好些這個世界的佛釋尊已涅槃了而世界又這麼不理想以信為先的大乘佛子漸從現實人間而傾向理想的他方菩薩與菩薩道是從譬喻本生等來的釋尊在過去生中曾經歷長期的修行被稱為菩薩意思是求覺的眾生從本生等所傳說的菩薩行一般歸納為修六波羅蜜四攝經歷十地而後成佛菩薩自己還沒有解脫修種種的難行苦行主要為了利人不惜犧牲一切甚至獻出自己的生命依大乘法說菩薩要廣集福德與智慧資糧五事具足才能得無生法忍與阿羅漢的涅槃相等但菩薩的廣大悲願不入涅槃留惑潤生願意在長期的生死中度脫苦難的眾生這種不急於自求解脫偉大的利他精神在世間人心中當然是無限的尊重讚歎見賢思齊學菩薩而求成佛的大乘佛法為佛弟子所樂意信受奉行這是一項最有意義的重要因素當然還有其他原因菩薩的大行波羅蜜行主要是以慧般若為先導的大乘經所說甚深智與廣大行是繼承佛法的甚深行如般若經所說得無生法忍的不退轉阿毘跋致菩薩都是依人身進修而悟入的得無生忍以上的是大菩薩俗稱法身大士以方便力現種種身利濟眾生那就不是常人的境界成為大乘佛弟子的信仰對象從初發心到法身大士沒有僧伽組織卻成為菩薩僧比起四向四果的聖僧及一般出家眾似乎要偉大得多大乘佛法興起佛與菩薩的偉大莊嚴存在於現實人間更多的存在於信念理想之中從此代表佛法的現實僧伽出家眾雖依舊的遊化人間還是歸依僧而不再重視四向四果的聖僧更不要說人間凡僧了如大寶積經一九郁伽長者會大正一一四七三上說菩薩見須陀洹斯陀含阿那含阿羅漢及與凡夫若見聲聞乘皆悉敬順速起承迎好語善音右遶彼人應當如是思念我等得無上正真道時為成聲聞功德利故而演說法雖生恭敬心不住中長者是名在家菩薩歸依於僧若有未定入聲聞乘勸令發於一切智心若以財攝若以法攝依於不退菩薩之僧不依聲聞僧求聲聞德心不住中長者是名在家菩薩成就四法歸依於僧以此布施迴向無上道是名歸依僧大乘佛教界儘管照樣的說聲聞法原始的佛法照樣的供養一般出家眾而心不在焉釋尊為出家者和樂共處而制立的僧律也不受大乘行者的尊重可以念佛過去佛他方佛念菩薩可能是人是天是魔也可能是鬼畜而不再念傳統的僧伽功德佛法將順著這一方向而發展下去第二節佛菩薩天的融和佛法中高級天與低級的鬼天畜生天對釋尊與出家弟子只是讚仰歸敬聽法而求安樂與解脫又自動的表示護法的虔誠雖說天上也有聖者但都不及人間的阿羅漢在佛弟子的歸依信仰中沒有天的地位天反而是仰望佛法出家僧三寶救度的容忍印度民間信仰的群神憐愍愚癡而超脫群神是佛法的根本立場由於佛教界傳出的菩薩本生談菩薩多數是人但也有是天神鬼與畜生所以經律中所見的天有些在大乘經中成為大菩薩了經律中說釋尊的二位天上大弟子大梵天得阿那含果帝釋得須陀洹果這二位天弟子在華嚴經中與人間的二大弟子舍利弗大目犍連合化成為與梵天相當的文殊師利與帝釋相當的普賢菩薩這與色究竟天圓滿究竟菩提的佛綜合起來看表示了佛法與印度天神的溝通娑伽度龍王十住地菩薩阿那婆達多龍王七住菩薩與這兩位龍菩薩有關的有海龍王經與弘道廣顯三昧經法華經說八歲龍女立刻轉男子身於南方無垢世界成佛大樹緊那羅王所問經的當機者是一位現緊那羅身的大菩薩維摩詰所說經說十方無量阿僧祇世界中作魔王者多是住不可思議解脫菩薩屬於四大王眾天的鬼畜天是菩薩而蒙佛授記的著實不少最重要的要算夜叉了經中有金剛手也名執金剛或譯密迹金剛力士是從手執金剛杵得名的本是一切夜叉的通稱如帝釋手執金剛杵也是夜叉之一經律中說有一位經常護持釋尊的金剛力士這位經常護持佛的金剛手在密迹金剛力士經中是發願護持千兄賢劫千佛的大菩薩經常隨侍釋尊所以被解說為一般人所不知的佛事一般人沒有聽說過的佛法這位護法金剛知道得很多於是菩薩三密如來三密都由這位金剛手而傳說出來後來的祕密大乘佛法都由此傳出理由就在這裡印度人信仰的夜叉極多帝釋在中間約忉利天也可說有五方四王天在四方都有夜叉群所以傳有五部族金剛神大品般若經就已說到了夜叉身的大菩薩受到華嚴經的尊重法會開始十方菩薩以外從大自在天到執金剛一切天眾菩薩來參加善財童子所參訪的也有眾多的女性天神都是夜叉圍繞師子頻申比丘尼的在十地菩薩以上有執金剛神與坐菩提道場也就是普賢地菩薩相當夜叉身相的菩薩地位非常崇高與祕密大乘佛法是一脈相通的只是程度不同而已天神鬼天畜天的地位隨大乘佛法而重要起來一向與鬼神信仰相結合的咒術等也當然要漸漸地滲合進來不過在大乘佛法中菩薩化的鬼畜天菩薩所說的還是菩薩道的深智大行佛果的功德莊嚴與後起的適應鬼畜天的法門精神還是不大同的在一般人心目中天鬼天神畜天俗稱妖精比人要厲害得多所以在信仰中漸漸地勝過了人間的賢聖僧大乘佛法重在印度群神的菩薩化西元四五世紀間傳出的楞伽經進一步的佛化群神如入楞伽經卷六大正一六五五一上中說大慧我亦如是於娑婆世界中三阿僧祇百千名號凡夫雖說而不知是如來異名大慧或有眾生知如來者有知自在者有知仙人者有知梵者有知那羅延者有知勝者有知迦毘羅者有知究竟者有知阿利吒尼彌者有知月者有知日者有知婆羅那者有知毘耶娑者有知帝釋者有知意生身者大慧如是等種種名號如來應正遍知於娑婆世界及餘世界中三阿僧祇百千名號而諸凡夫不覺不知以墮二邊相續法中然悉恭敬供養於我楞伽經的意思是如來佛不一定是釋尊的名號是非常多的梵天帝釋以外如自在是溼婆天那羅延異譯作毘紐毘紐是那羅延天的異名日是日天月是月天婆樓那異譯作明星即太白星這都是印度神教所崇拜的迦毘羅是數論派傳說中的開創者毘耶娑廣博仙人傳說為吠陀的編集者這都是印度神教傳說的古仙人印度的群神與古仙其實是如來異名一般人雖不知道就是如來但還是恭敬供養梵天等這種思想比楞伽經集出還早些的大集經已明白的表示了如大方等大集經九寶幢分大正一三一三八中說世尊入王舍城爾時心遊首楞嚴定示現微妙八十種好若事奉象者即見象像事師子者見師子像有事牛者即見牛像事命命鳥見命命鳥像有事兔者即見兔像有事魚龍龜鱉梵天自在天建陀天八臂天帝釋阿脩羅迦樓羅虎狼猪鹿水神火神風神日月星宿國王大臣男女大人小人沙門婆羅門四天王夜叉菩薩如來各隨所事而得見之見已皆稱南無南無無上世尊合掌恭敬禮拜供養爾時雪山光味仙人覩見佛身是仙人像楞伽經說世間不同宗教的不同信仰其實所信仰的就是如來只是他們不知道而已這是說隨地區生活人類不同意識而形成不同的信仰其實神的本質是一就是如來這是泛神的也就是一切神即一神的寶幢分從佛出發不同信仰的人他們所見的佛就是他們平時所信奉的神這是大乘行者從法性平等的立場消解了神與佛之間的對立免受印度傳統宗教的歧視與排斥而達到天佛不二的境地這一思想的開展可能與如來普入八眾有關如長阿含經二遊行經大正一一六中說佛告阿難世有八眾何謂八一曰剎利眾二曰婆羅門眾三曰居士眾四曰沙門眾五曰四天王眾六曰忉利天眾七曰魔眾八曰梵天眾我自憶念昔者往來與剎利眾坐起言語不可稱數以精進定力在所能現彼有好色我色勝彼彼有妙聲我聲勝彼彼辭我退我不辭彼彼所能說我亦能說彼所不能我亦能說阿難我廣為說法示教利喜已即於彼沒彼不知我是天是人如是乃至梵天眾往反無數廣為說法而莫知我是誰八眾有人四眾與天四眾天四眾是梵天眾魔眾忉利天眾帝釋是忉利天主四天王天應譯為四大王眾天眾忉利天眾與四大王眾天眾都是低級天高等的鬼天畜天佛分別的到八眾中去是神通示現的無論到那一眾去就與他們一樣但音聲容色論說什麼都比他們要高超得多這還是容忍印度神教的信仰而表示勝過一切人與天神的偉大不過到底是佛還是天神在一般人心中多少會模糊起來長阿含經是世界悉檀隨順眾生的樂欲而說如經師們不能把握經說的意趣所在依文解義進而從無二無別的意境去解說表示為佛天不二這在現實的一般人心中不免要神佛不分了大乘佛法後期這一趨勢是越來越嚴重了第三節造像與寫經大乘佛法興起前後佛教界有兩大事情對於佛法的通俗化給以廣泛的影響一與法有關的聖典的書寫經律論三藏雖經過結集但一向依誦習而流傳下來錫蘭傳說在毘多伽摩尼王時因多年戰亂而造成大饑荒比丘們到處流離憂慮憶持口誦的三藏會因動亂而有所遺忘所以西元前四二二九年間集合在中部摩多利的阿盧精舍誦出三藏及注釋書寫在貝葉上以便保存這雖是局部地區的書寫記錄但佛教界聲氣相通印度本土的書寫經典距離是不會太遠的錫蘭的書寫三藏可能是最早的慈恩傳說迦溼彌羅結集大毘婆沙論王以赤銅為鍱鏤寫論文赤銅鍱是錫蘭島的古名所以赤銅鍱鏤寫論文可能由於錫蘭書寫三藏的傳聞而來那時大乘初興在成立較早的小品般若經中已重視經典的書寫了二與佛有關的佛像流行將佛的遺體舍利建塔供養表示了對釋尊的崇敬至於佛像起初是不許的若以色量我以音聲尋我欲貪所執持彼不能知我釋尊之所以稱為佛是不能在色聲等相好中見到的也許這正是供養佛的舍利而沒有造像的原因所以阿含經說念佛也是不念色相的當時沒有佛像僅有菩提樹法輪足跡以象徵佛的成佛說法與遊行現存西元前的佛教建築有浮雕的本生談菩薩相也沒有佛像十誦律也說如佛身像不應作願佛聽我作菩薩侍像足以證明佛法本是不許造佛像的大眾部系以為佛的色身也是無漏的色身也是所歸敬處這可能是可以造佛像的理論依據西元前後犍陀羅式摩偷羅式的佛像畫像雕刻像漸漸流行起來早期流行佛像的地方當時都在西方來的異族統治下受到了異族文化的影響東漢支婁迦讖於桓帝光和二年西元一七九譯出的道行般若經卷一大正八四七六中說佛般泥洹涅槃後有人作佛形像人見佛形像無不跪拜供養者其像端正姝好如佛無有異人見莫不稱歎莫不持華香繒綵供養者賢者呼謂佛神在像中耶薩陀波倫菩薩報言不在像中所以作佛像者但欲使人得其福耳佛般泥洹後念佛故作像欲使世間人供養得其福這段文字除支謙依支讖本而再譯的大明度經外其他的般若經本都是沒有的所以這可能是支讖本所增附的支讖的另一譯本般舟三昧經也說到一者作佛形像用成是般舟三昧故那個時代在月氏貴霜王朝統治下的西北印度顯然佛像已相當盛行了佛法中舍利塔是表示佛的建在僧寺旁形成三寶的具體形象但佛法傳布到各方教區越來越廣僧寺越來越多要以佛舍利建塔應該有事實的困難佛像的興起漸取代佛舍利塔的地位起初佛像是供在塔中的寺中供奉佛像處印度稱為香室與我國的大雄寶殿相當佛像以外又有菩薩像天神像的造作對於佛教通俗化的普及發達是有重要影響力的不過佛像的出現發達在一般信眾心目中似乎更類似神像的崇信了另一方面大乘佛法的瑜伽行者念佛見佛念佛進而念菩薩念天三昧更開拓出佛法的新境界第二章大乘念法法門第一節十法行方便道的六隨念法門大乘經中分別論述的有摩訶般若經大般涅槃經虛空藏經等可說並不太多然分別闡揚的如念佛法門就是大乘佛法中非常重要的修行了念是憶念明記不忘是修習定慧所必不可缺的其實任何修行即使是初學也要憶念不忘如憶念而稱佛的名為持名念佛同樣的意義持誦經典名為念經持誦咒語名為念咒有念誦一詞就是口誦心念的意思現在先說念法在佛法中重於聖道的憶念大乘佛法是依於勝義依於法界依法性為定量也就是重在契證的正法一切法本不生一切法本清淨一切法本性空所以以甚深廣大行為主的般若經這樣的說念法菩薩摩訶薩應修念法於是善法不善法有為法無為法中乃至無少許念何況念法這是以一切法無所念為念法了然修學甚深法從佛法以來就有四預流支親近善士聽聞正法如理思惟法隨法行如實道的方便在聽聞思惟修行時都是不能沒有念的大乘佛法興起當然也是這樣起初智證的法是脫落名相本來如此的流傳世間的教法是佛所說多聞聖弟子所傳的依佛及僧而傳布所以法比佛與僧是要抽象些一般信眾多數是念佛念僧供養佛及僧由於佛教界出現了書寫的聖典念法法門得到了重大的開展這是初期大乘般若經等所明白昭示了的如摩訶般若波羅蜜經這樣說是般若波羅蜜若聞受持親近讀誦為他說正憶念應聞般若波羅蜜應受持親近讀誦為他說正憶念受持親近讀誦說正憶念已應書經卷恭敬供養尊重讚歎花香瓔珞乃至伎樂書般若波羅蜜經卷供養恭敬華香乃至幡蓋書般若波羅蜜經卷與他人令學受持般若波羅蜜親近讀誦說正憶念亦為他人種種因緣演說般若波羅蜜義開示分別令易解般若波羅蜜是智證的甚深法門菩薩修學般若攝導施戒等六度四攝大行自利利他而到達佛地般若是甚深的修學的方便當然是親近善士等以聞思修而契入正法所引第一則中聽聞般若法門受持是信受憶持在心親近是常來善士處承奉諮受讀是口受後來是依經文一句句的學習誦是熟習了的背誦以上是親近善士多聞正法的詳細說明為他說是宣傳未聞使別人也能信受奉行為他說也能增進自己的熟習與理解正憶念是如理思惟的異譯依大智度論此下有修那就是法隨法行了第一則的修學次第與佛法中親近善士等預流支一樣只是說得更詳細些第二則多了書寫經卷與供養大乘興起時期恰好書寫經卷流行般若法門甚深而又通俗化寫經是重要因素寫成一部一部的經典法有了具體的形象於是受到恭敬供養用華香香有燒香末香塗香等多類瓔珞幡蓋來供養還有伎樂那是歌舞進一步就是戲劇了對經典的供養與供養佛的舍利是完全相同的第三則不但自己如此還書寫經典布施給別人使別人也能受持讀誦供養第四則以經卷布施雖是功德無量但般若到底是重於智證的智證要先得如理的正見所以為他演說開示分別是更重要的正憶念以前的為他說只是照本宣揚而演說般若波羅蜜義開示分別是深一層的開示抉擇重於勝解深義以法為中心的般若法門自修與利他採取了這樣的方便甚深而又通俗化通俗而又方便的引入深義的修證在法的學習法的流通上有著不同於初期佛法的內容聽聞受持親近讀誦為他說正憶念書寫供養施與他人在親近善士等固有方便外增多了書寫等通俗易行的方便這是大乘興起時因教界書寫聖典而展開的大品經中自三三歎品到三八法施品共九品二卷多廣說這一系列方便的功德其他初期大乘經也有這種情形如大寶積經的不動如來會末品說到應當受持讀誦通利為他廣說並說或於他人有是經卷應可詣彼而書寫之若於彼村求不能得應詣隣境書寫受持讀誦通利復為他人開示演說舊譯的阿閦佛國經也說到供養經卷法華經的法師品極力讚揚聽聞受持書寫供養的功德與般若經相同如說若有人聞妙法華經乃至一偈一句有人受持讀誦解說書寫妙法華經乃至一偈於此經卷敬視如佛種種供養華香瓔珞末香塗香燒香繒蓋幢幡衣服伎樂乃至合掌恭敬法師功德品說到受持是法華經若讀若誦若解說若書寫能得六根的種種功德天台智者大師依此法師功德品立五品法師等到書寫經典盛行了對於書寫供養經卷等功德經中也就淡了下來讀誦等方便經中所說的或多或少後起的無上依經總合為持經的十種法行如說一者書寫二者供養三者傳流施他四者諦聽五者自讀六者憶持七者廣說八者自誦九者思惟十者修行十法以書寫為第一可見那時的受持讀誦可依書寫的經典不一定非從人口受不可了所以大智度論說若從佛聞若從弟子聞若於經中聞依經文而了解義趣也就等於從人受學了大乘的智行是念法為主的以受持讀誦等為方便因經法的書寫而流行信行是念佛為主的以稱名禮拜懺悔等為方便因佛像的興起而盛行尤其是經典的書寫信行念佛者也讚歎讀誦的功德如般舟三昧經說聞是三昧已書學誦持為他人說須臾間是菩薩功德不可復計念佛三昧分說但能耳聞此三昧名假令不讀不誦皆當次第成就阿耨多羅三藐三菩提能聽受斯念佛三昧若讀誦所得功德望前布施不可喻比何況有能具足聽受修行演說是功德聚而可校量耶十法行已成為一切法門的共通方便了第二節書寫供養與讀誦功德佛法重智證而又出重信的方便般若是甚深法重智證的也傳出了重信的方便那就是書寫供養等了大智度論卷五八大正二五四七二下說是般若有種種門入若聞持乃至正憶念者智慧精進門入書寫供養者信及精進門入若一心深信則供養經卷勝於聞持等若不一心雖受持而不如聞持等從智慧入門從信入門都可以深入般若智與信到底是不容許別行的初入般若適應不同根性可以有此二門而最重要的還是真誠一心如不能一心都是不能得真實功德的在正法中心的般若法門中重信的書寫供養施他是大乘佛法時代的特色由於般若法門的容受通俗的方便讀誦也就有了不同的意義這不妨一一的說明一書寫起初佛說法雖然結集了還是口口傳誦下來傳誦容易誤失也可能遺忘失傳書寫經典興起這是保存弘布佛法的好辦法所以在法的修學中書寫與讀誦解說等受到了同樣的尊重以般若經來說為了不致中途停頓鼓勵限期的精進完成如說若能一月書成應當勤書若二月三月四月五月六月七月若一歲書成亦當勤書讀誦思惟說正憶念修行若一月得成就乃至一歲得成就應當勤成就書寫等應當精勤的完成書寫的功德是很大的所以不動如來會勸人精勤設法去求法寫經寫經一向受到尊重我國燉煌石室的藏書有些是唐宋間的寫經不過寫經是為了功德忽略了傳布佛法的原始意義自我國印刷發達後書寫經典來傳布佛法已沒有必要了僅有極少數出發於虔敬的寫經或刺舌出血來寫經對宏傳佛法來說寫經的時代是過去了二供養寫成的經典尊重供養表示了對法的尊敬也能引發佛弟子書寫讀誦經文的熱心供養經典般若經有一傳說的事實在眾香城犍陀羅城中有七寶臺赤牛頭栴檀以為莊嚴真珠羅網以覆臺上四角皆懸摩尼珠寶以為燈明及四寶香爐常燒名香為供養般若波羅蜜故其臺中有七寶大床四寶小床重敷其上以黃金牒書般若波羅蜜經置小床上種種幡蓋莊嚴垂覆其上在高臺上供養經典與供養佛牙佛鉢的方式相同這是西元二世紀的傳說供養經典在印度北方應該是有事實的歷代三寶紀說崛多三藏口每說云于闐東南二千餘里有遮拘迦國王宮自有摩訶般若大集華嚴三部大經並十萬偈王躬受持親執鍵鑰轉讀則開香花供養又道場內種種莊嚴眾寶備具兼懸諸雜花時非時果傳來中國如南嶽慧思以道俗福施造金字般若二十七卷金字法華琉璃寶函莊嚴炫曜功德傑異大發眾心也是供養經卷的實例一直到近代供奉在藏經樓中的大藏經也還是重於供養的書寫經典法才有了具體的實體受到佛弟子的恭敬供養佛入涅槃佛弟子懷念佛而恭敬佛的遺體舍利建塔供養供養佛舍利塔只能生信作福而書寫的經典更可以讀誦解說依法修行比佛舍利更有意義些所以摩訶般若波羅蜜經卷一大正八二九中說憍尸迦若滿閻浮提乃至如恒河沙等世界佛舍利作一分復有人書般若波羅蜜經卷作一分二分之中汝取何所釋提桓因白佛言我寧取般若波羅蜜經卷何以故世尊我於佛舍利非不恭敬非不尊重世尊以舍利從般若波羅蜜中生般若波羅蜜所修熏故是舍利得供養恭敬尊重讚歎舍利是佛的遺體舍利的所以受人尊敬供養因為依此色身而成佛說法成佛說法都是依般若波羅蜜甚深法的修證而來這可見般若經勝於佛的遺體所以在二分中寧可選取般若經這一分了在佛弟子的心目中大乘成佛法門經卷可說是與佛一樣的可以依經而知法至少也與舍利塔一樣如金剛般若波羅蜜經說若是經典所在之處則為有佛若尊重弟子若有此經一切世間天人阿修羅所應供養當知此處則為是塔皆應恭敬作禮圍繞以諸華香而散其處法華經也說有人受持讀誦解說書寫妙法華經乃至一偈於此經卷敬視如佛在佛像還沒有盛行時重於智證的大乘以經卷代替了舍利達成聖典的廣泛流布三施他書寫經典將經典布施贈送給他人使他人也能供養受持讀誦等施他的本是書寫的經典自印刷術發明經典也都是印刷的於是改為印經贈送了為什麼要施他施者深深信解法門的希有受者因此而能受持讀誦思惟修行佛法因此而流布這所以要施他如施者不知經義受者擱放一邊如現前佛教界的一般情形那是失去施他功德的意義了書寫供養施他是虔信尊敬而修法的布施使法門廣大流行在行者自身是信施福德菩薩道以般若為主而更要有利他為法為人的德行所以對修學大乘法來說重智而又讚揚信施福德確是相助相成的這所以般若等重智證的大乘兼有信施等通俗的法門四讀誦般若法門的修學書寫供養施他以外是聽聞受持親近讀誦為他說正憶念如說而行這樣的修學般若經為初學者善男子善女人廣讚聽聞受持等功德今世後世的功德今世功德是現生所能得的正是一般人希望得到的現世福樂從三三歎品起經文所說的極多比較起來與初期佛法所說得慈心定者的功德大致相同慈心功德雜阿含經祇夜說不為諸惡鬼神所欺大智度論與大毘婆沙論說慈心五功德增壹阿含經說十一功德增支部說八功德與十一功德內容是睡眠安樂醒覺時安樂不見惡夢為人神所愛樂天神擁護盜賊不侵刀兵水火毒所不能害不橫死不蒙昧命終速入定顏色光潤得慈心定的有上說的種種功德那是由於自力修持所得的般若經說於般若波羅蜜能修聽聞受持等十種法行的也有這些功德還說到若在空舍若在曠野若人住處終不怖畏那是從念佛離恐怖來的沒有惡夢反而能得見佛等善夢如因事而往至官所官不譴責也就是不會受官非之累依大毘婆沙論也是慈心功德的一項傳說不但不會橫死也是四百四病所不能中這當然要除其宿命業報所感的疾病那是不能不受的在般若經中這都是聽聞般若波羅蜜受持讀誦等功德經中說聽聞受持正憶念時到處說不離薩婆若心薩婆若是一切智的音譯不離薩婆若心就是不離菩提心依菩提心而修學般若波羅蜜能得種種今世的福樂那與慈心功德一樣是自力修持所得的現世福德然在廣說受持等現世福樂時適應民間的神祕信仰表示出般若波羅蜜的威神力如經上讚歎般若波羅蜜是大明呪無上明呪無等等明呪唐譯大般若經作是大神呪是大明呪是無上呪是無等等呪是一切呪王咒明咒似為梵語的語譯與祕密大乘的漫怛攞意義是相通的大智度論卷五七大正二五四六四中說如外道神仙呪術力故入水不溺入火不熱毒蟲不螫何況般若波羅蜜以咒來比喻般若波羅蜜法般若是咒中至高無上的咒王比一切咒術的神用更偉大這顯然是適應民間的咒術信仰使般若俗化書寫供養等而又神化容易為一般人所信受經中舉有藥名摩祇的比喻藥氣力故蛇不能前即自還去也是稱歎般若波羅蜜威力經中又舉譬喻說如負債人親近國王供給左右債主反更供養恭敬是人是人不復畏怖何以故世尊此人依近於王憑恃有力故這是依仗他力的功德了依此來觀察經中說有魔王與外道想到般若法會上來嬈亂釋提桓因即誦般若波羅蜜是時諸外道梵志遙繞佛復道還去即時誦念般若波羅蜜惡魔聞其所誦漸漸復道還去就是往至官所官不譴責也是讀誦是般若波羅蜜故般若波羅蜜這樣的神效真可說是一切咒中的咒王了般若是甚深的智證法門直示一切法不生一切法空一切法本淨的深義而卻說讀誦般若經有種種的現生利益並能降伏魔王外道的嬈亂這在讀者也許會感到意外的般若法門興起於南方大成於北印度可能與當地的部派佛教有關誦經而有護持佛弟子的作用長部三二阿吒曩胝經已經說到了南傳的赤銅鍱部也已誦持護經以求平安幸福了十誦律所說的多識多知諸大經中有阿吒那劍晉言鬼神成經就是阿吒曩胝經盛行於北印度的說一切有部不但有這部經還有誦經而降伏敵人的傳說如根本說一切有部毘奈耶說邊地的兵勢很盛王師一再敗落法與比丘尼教他們每於宿處誦三啟經稱天等名而為呪願願以此福資及梵天此世界主帝釋天王并四護世四大天王及十八種大藥叉王般支迦藥叉大將執杖神王所有眷屬難陀鄔波難陀大龍王等般支迦藥叉即便去斯不遠化作軍眾象如大山馬形如象車如樓閣人等藥叉這樣敵人望見就恐懼降伏了此外有誦三啟經以遣除樹神的記錄三啟經是經分三分前是讚誦佛德後是發願迴向中間是誦經如人死亡了讀誦三啟經中間所誦的是無常經如降伏敵人遣除樹神中間誦經部分應該是誦阿吒那劍等經了北方的部派佛教流行這種誦經以求平安降伏敵人等行為般若經在北方集成也就以讀誦般若經代替世俗的一切法術咒語然從作用來說讀與誦念般若波羅蜜經與世俗信仰的作法持咒到底有多少差別智證的般若法門融攝了佛法通俗的信施更咒術化而讚揚讀誦功德甚深而又通俗化大乘佛法得到了廣大的流行然而神祕化的融攝比之佛法大乘佛法是深一層的神祕化了以後將更深刻的神化下去第三章大乘念佛法門第一節信方便的易行道佛法有適應慧強信弱的有適應信強慧弱的根性不同適應的修行方便也就多少不同大乘佛法理想與信仰的成分增多以信為先的方便也就越來越重要然大乘佛法主流仍是重慧的甚深廣大的菩薩道修菩薩行是大乘佛法所共的而慧與信的適應不同而又相通如重慧而以法為主的聞思修證而又有書寫供養讀誦功德的方便如上一章所說重信而以佛菩薩天為主的以稱名懺悔等為方便然也有念佛實相的深行說到大乘佛法的念佛內容異常的廣大先從易行道說起大乘佛法以無上圓滿的佛為究極理想而從菩薩的廣大修行中去完成菩薩的發心自未得度先度他是故我禮初發心先人後己的精神是希有難得的發心修行從釋尊過去生中的修行事跡來說特別是布施為了慈濟眾生不惜犧牲一切甚至奉獻自己的生命菩薩要修行三大阿僧祇劫這是隨順說一切有部說的其實佛言無量阿僧祇劫作功德欲度眾生何以故言三阿僧祇劫三阿僧祇劫有量有限在無量時劫中修行任重道遠沒有比菩薩更偉大了菩薩的廣大修行惟有勝解一切法空才有可能如瑜伽師地論卷三六大正三四八七中說若能如實了知生死即無染心流轉生死若於生死不以無常等行深心厭離即不速疾入般涅槃若於涅槃不深怖畏即能圓滿涅槃資糧雖於涅槃見有微妙勝利功德而不深願速證涅槃是諸菩薩於證無上正等菩提有大方便是大方便依止最勝空性勝解是故菩薩修習學道所攝最勝空性勝解名為能證如來妙智廣大方便瑜伽師地論所說空義與中論有所不同然上求佛道下化眾生的菩薩道非有空性勝解不可是一致的見解佛果究竟圓滿菩薩的廣大修行當然不是急功近利者所能成辦的在修行過程中有的中途退失名為敗壞菩薩有的久劫修行到不退轉阿惟越致地再進修到圓成佛果修菩薩行到不轉地是法甚深久乃可得對一般人來說這樣的甚深難行道可能會中途退失的正如般若經所說無量阿僧祇眾生發阿耨多羅三藐三菩提心行菩薩道若一若二住阿惟越致地行菩薩道成佛的法門廣大甚深不是簡易的事說老實話這不是人人所能修學的所以釋尊成佛一般弟子都是求證阿羅漢而入涅槃的傳說僅彌勒一人未來成佛菩薩道難行苦行大乘佛法也是這樣而出現於印度的不過究竟圓滿的佛果廣大甚深的菩薩行應該是見聞者所有心嚮往的如此的深妙大法也總希望能長住世間利益眾生所以適應一般根性繼承佛法的念佛有易行道的安立易行而又能成為難行道的方便這與智證的正法甚深而又安立書寫供養施他讀誦功德等方便意趣可說是同一的現在來說大乘佛法中以念佛為主的易行道如龍樹十住毘婆沙論卷五大正二六四一上中說諸佛所說有易行道疾得至阿惟越致地方便者願為說之汝言阿惟越致地是法甚難久乃可得若有易行道疾得至阿惟越致地者是乃怯弱下劣之言非是大人志幹之說汝若必欲聞此方便今當說之佛法有無量門如世間道有難有易陸道步行則苦水道乘船則樂菩薩道亦如是或有勤行精進或有以信方便易行疾至阿惟越致十住毘婆沙論是華嚴經十地品偈頌的廣分別十住毘婆沙論所說的易行道先說稱念佛及菩薩名憶念禮拜進一步如論卷五大正二六四五上說求阿惟越致地者非但憶念稱名禮敬而已復應於諸佛所懺悔勸請隨喜迴向原則的說易行道是廣義的念佛法門對於佛稱佛名是語業禮拜是身業憶念是意業這是對佛敬信而起的清淨三業在佛前修懺悔行勸請行隨喜行以回向佛道作結這一念佛法門在龍樹時代西元二三世紀間大乘行者主要是在家的善男子善女人很多是這樣修行的如大智度論卷六一大正二五四九五中說菩薩禮佛有三品一者悔過品二者隨喜回向品三者勸請諸佛品三品修行的內容大智度論作了簡要的介紹菩薩法晝三時夜三時常行三事一者清旦偏袒右肩合掌禮十方佛言我某甲若今世若過去世無量劫身口意惡業罪於十方現在佛前懺悔願令滅除不復更作中暮夜三亦如是二者念十方三世諸佛所行功德及弟子眾所有功德隨喜勸助三者勸請現在十方諸佛初轉法輪及請諸佛久住世間無量劫度脫一切菩薩行此三事功德無量轉近得佛日夜六時菩薩於佛前行此三事與中國佛教的早晚課誦相近易行道的功德無量主要能保持大乘信心不致於退失十住毘婆沙論說佛法有無量門或有勤行精進或有以信方便易行疾至阿惟越致這是二類根性也就是重智與重信的不同大智度論也說若聞持乃至正憶念者智慧精進門入書寫供養者信及精進門入菩薩有二種一者有慈悲心多為眾生二者多集諸佛功德所說略有差別總不外乎在甚深難行的正常道外別說菩薩初學的通俗法門然重智及慈悲與重信只是初入門者的偏重不是截然不同的法門所以十住毘婆沙論卷六大正二六四九中下說是菩薩以懺悔勸請隨喜迴向故福力轉增心調柔軟於諸佛無量功德清淨第一凡夫所不信而能信受及諸大菩薩清淨大行希有難事亦能信受信諸佛菩薩無量甚深清淨第一功德已愍傷諸眾生無此功德但以諸邪見受種種苦惱故深生悲心以悲心故為求隨意使得安樂則名慈心隨所能作利益眾生發堅固施心依論所說修易行道而能成就信心的就能引生慈悲心能進修施等六波羅蜜這可見菩薩道是一貫的重信的易行道重悲智的難行道並不是對立而只是入門有些偏重而已大智度論所說的禮佛三品是出於漢安世高所譯的舍利弗悔過經舍利弗啟問前世為惡當何用悔之乎佛答分三段悔過助其歡喜隨喜勸請舍利弗再問欲求佛道者當何以願為得之佛答說取諸學道以來所得福德皆集聚合會以持好心施與回向天下十方人民父母蜎飛蠕動之類末後說種種福德不如持悔過經晝夜各三過讀一日舍利弗悔過經的內容是在十方如來前懺悔隨喜勸請回向與十住毘婆沙論所引的經說相合這部經有梁僧伽婆羅異譯的菩薩藏經隋闍那崛多共笈多等譯的大乘三聚懺悔經西藏譯名聖大乘滅業障經異譯的組織小異分為懺悔及三聚隨喜功德聚勸請功德聚回向功德聚懺悔中說到罪業隨心空不可得的深義這部經古代每稱之為三品經如漢安玄所譯的法鏡經說晝三夜亦三以誦三品經事晉竺法護的離垢施女經說三品諸佛經典晝夜奉行三品法說到這三品內容的經典很多可見這是初期大乘盛行的易行道三品或作修行三分誦三分法或作三支經這可能品是的義譯如三十七菩提分或譯三十七覺品三十七覺支但晚期的異譯轉化為三聚或三蘊三陰蘊那是了經名三品而實際有四分懺悔隨喜勸請回向這是值得注意的依個人的意見三分四分是次第集成的原始是懺悔部分所以經末稱此為悔過經異譯名為三聚懺悔滅業障異譯菩薩藏經說此經名滅業障礙亦名菩薩藏亦名斷一切疑菩薩藏與斷一切疑是一部分大乘經的通稱滅業障礙才是主題所以推定這是該經的原始部分摩訶般若波羅蜜經自三到三八品為善男子善女人廣說聽聞受持書寫供養施他的功德三九品名隨喜品明無相的隨喜回向大智度論說禮佛三品以隨喜回向為一品是隨順般若經而說的回向不只是隨喜回向修一切行末後都是要回向的懺悔回向與般若經的隨喜回向相結合成為二品行如彌勒菩薩所問本願經說我悔一切過勸助隨喜眾道德歸命禮諸佛令得無上慧彌勒菩薩不持耳鼻頭目手足身命珍寶城邑妻子及以國土布施與人以成佛道但以善權方便安樂之行得致無上正真之道這是懺悔隨喜的易行道淨土行在這二品上加勸請行成為三品法門至於回向無論是一行二行三行都是以回向作結如以回向為一行那就成為四分行了在佛前修懺悔隨喜勸請回向在初期大乘時代非常的流行如賢劫經說念佛法勤悔過樂助隨喜功德施眾生因回向勸諸佛思益梵天所問經說有四法善知方便何等四一者順眾生意二者於他功德起隨喜心三者悔過除罪四者勸請諸佛這一通俗易行的方便與文殊師利及普賢有關文殊與普賢二大士是華嚴經中佛的二大輔弼所以也與華嚴有關先提到兩部經一晉聶道真所譯的三曼陀跋陀羅菩薩經三曼陀跋陀羅是普賢梵語的音譯這部經是佛在摩竭提國清淨法處自然金剛座光影甚明也就是華嚴經初會的說處經是普賢為文殊說的經的內容是悔過禮願樂助其歡喜隨喜勸請諸佛轉法輪與住世施與回向末後總結說是善男子善女人晝夜各三勸樂法行所當悔者悔之所當忍者忍之所當禮者禮之所當願樂隨喜者願樂之所當請勸者請勸之所當施與者施與之悔是自說罪過忍是容忍是懺摩的義譯合起來就是懺悔經文正宗分分悔過品願樂品請勸品與三品法行相同但在願樂品中多了禮敬一切諸佛一切諸菩薩諸迦羅蜜善知識父母及阿羅漢辟支佛凡是有功德而可敬的都作禮這是從隨喜一切功德而來的三品本是禮佛三品是在佛前禮敬而修行的這部經說到般若波羅蜜兜沙陀比羅經兜沙陀比羅經義譯為如來藏篋經為華嚴法門最初集成的經名這部經的成立般若與華嚴經已開始流傳了二竺法護譯的佛說文殊悔過經是文殊為如來齊光照燿菩薩說的經文不分品內容是禮佛悔過勸助隨喜眾德勸轉法輪諸佛住世供養諸佛回向我及眾生成佛道對於禮佛五體投地作了表法的解說經上說或問上界悔過之處十地十忍十分別事十瑞十持十印十三昧顯然的與華嚴內容相通這兩部重於懺悔的經文殊說或普賢為文殊說與華嚴法門有關比起三品經來雖同樣的是通俗的易行道而又通於深義了六十華嚴的傳譯者佛陀跋陀羅於晉元熙二年西元四二譯出文殊師利發願經共四十四頌與三曼陀跋陀羅菩薩經文殊悔過經非常接近唐不空所譯的普賢行願讚六十二頌與四十華嚴末卷偈頌相同都是文殊師利發願經的增廣本依文殊師利發願經記說晉元熙二年歲在庚申於楊州鬪場寺佛陀跋陀羅禪師新出云外國四部眾禮佛時多誦此經以發願求佛道大抵舍利弗悔過經文殊悔過經等文字長了些要晝夜三時一日誦念六次不太方便所以編為簡要的偈頌如龍樹的寶行王正論說為此因及果現前佛支提即佛舍利塔日夜各三遍願誦二十偈二十偈的內容也就是禮敬離惡懺罪隨喜請轉法輪窮生死後際是常住世間回向發願文殊師利發願經是日常持誦的誦本與普賢行願讚等內容都是七分禮佛讚佛供養佛懺悔隨喜請轉法輪請佛住世回向這是六十華嚴八十華嚴經所沒有的四十華嚴把偈頌編入華嚴經普賢行願品的末了長行為了滿足十數加上恒順眾生與常隨佛學這是偈頌所沒有的三曼陀跋陀羅菩薩經說持是功德令一切眾生與某自己名字生有佛處有菩薩處皆令生須呵摩提阿彌陀佛剎這一法門是易行道淨土方便道發願往生是不限於某一淨土的但經文卻提到了須呵摩提阿彌陀佛剎須呵摩提是極樂或安樂的音譯文殊師利發願經說願我命終時滅除諸障礙面見阿彌陀往生安樂剎易行方便與往生極樂有了更密切的關係在佛前懺悔隨喜勸請本是為初學者開示的通俗易行法門文殊與勸發菩提心有關為一切師如濡首菩薩清淨分衛經等說文殊又與懺罪有關如阿闍世王經如幻三昧經說悔過等三品法門終於與文殊因文殊而與普賢有關了也就與華嚴法門有關如十住毘婆沙論將十地經所沒有說的稱名憶念禮拜懺悔隨喜勸請附入初地中西元三四世紀間竺法護與聶道真譯出與文殊更與普賢有關的文殊悔過經三曼陀跋陀羅菩薩經西元五世紀初譯出的文殊師利發願經已是當時印度日常持誦的法門了通俗易行而又與深義相通到四十華嚴而充分明了出來這是重信的易行的廣義念佛法門三支法門名為三支而其實有六支三支是禮敬現在十方佛禮敬諸佛而後修的懺悔勸請中有請佛說法請佛住世隨喜末後又有迴向或加入供養供養也本是對佛的禮敬如文殊師利發願頌所說宗喀巴所造菩提道次第廣論也依華嚴經頌而說七支作為積集順道資糧淨治業障逆緣的加行遲一些譯出的還有唐那提譯離垢慧菩薩所問禮佛法經內容為七支禮敬歸依懺悔勸請轉正法輪不般涅槃隨喜迴向發願唐義淨譯金光明最勝王經五滅業障品以四種對治業障於十方世界一切如來前說一切罪懺悔勸請說法及久住世間隨喜迴向與三品經相合趙宋施護譯佛說法集名數經說七種最上供養內容為禮拜供養懺悔隨喜勸請發願迴向先後的開合增減總列而比對如下禮敬諸佛稱讚如來廣修供養懺悔業障隨喜功德請轉法輪請佛住世常隨佛學恒順眾生普皆迴向發廣大願歸依三寶第二節易行道支略說念佛為主的易行道是以信為方便的作用是多方面的名稱也就不一如思益梵天所問經名善知方便離垢慧菩薩所問禮佛法經以禮佛為名也就是禮佛與佛前的修行金光明最勝王經集為滅業障品這正如智者大師的集為五悔法了佛說法集名數經稱為最上供養華嚴經普賢行願品名為十大願文殊師利發願經也是名為發願的大寶積經的善臂菩薩會菩薩於三時中掃塔禮佛勸請懺悔念善根隨喜願得無上菩提迴向都是戒波羅蜜所攝易行道的內容或多或少到普賢行願品的十大願雖多少超越了這一原則但不失為集易行道的大成以下一一的略加解說一禮敬諸佛二稱讚如來佛在世時弟子們見了佛一定是虔誠敬禮印度古代見了國王每讚頌以表示敬意如我國古時的相見賦詩不過賦詩是相對的在雜阿含經祇夜中鵬耆舍就已作偈讚佛了大乘佛教盛行讚歎如來如佛一百八名讚一百五十讚佛頌等西元七世紀印度佛教的讚佛情形如南海寄歸內法傳所說對於佛因崇敬信念而有所表示那是當然的在大乘法中禮佛是禮十方佛通於身語意三業如普賢行願品說我以清淨身語意一切遍禮盡無餘這就是十住毘婆沙論的稱名憶念禮拜稱名是語業的禮敬如說南無佛南無釋迦牟尼佛南無阿彌陀佛憶念是意業的禮敬禮拜是身業的禮敬如合掌稽首佛足五體投地傳說釋尊在因地見燃燈佛時五體投地可說是最敬的身禮三業的禮敬以內心的憶念為主依內心敬念而表現於身業語業如內心沒有誠信憶念那稱名如鸚鵡學語禮拜要被禪者譏笑為如碓上下了所以三業禮敬主要是虔誠的念佛稱佛名號其實就是讚歎如佛一百八名讚世親所造的無量壽佛優波提舍一般稱為往生淨土論立五念門說云何讚歎口業讚歎稱彼如來名這樣禮佛就是念佛本來稱名憶念禮拜就可以了為了適應佛教界的讚佛偈普賢行願品別立稱讚如來一門禮佛念佛大乘佛法中法門眾多當別為敘說三廣修供養這是對於佛的供養佛在世時衣食住藥等一切是信眾恭敬供養的佛涅槃以後佛舍利遺體建塔漸漸莊嚴起來對於佛塔也就以華香瓔珞伎樂幢幡燈油花鬘燈明幢幡傘蓋供養一般重視的是財物的供養出家眾又怎樣供養呢佛在世時如阿難為佛侍者為佛服務就是供養最上的供養是弟子依佛所說的精進修行得到究竟解脫的阿羅漢能滿足佛為弟子說法的最大願望就是對佛最上的供養重法的大乘經也說到法供養如維摩詰所說經說若善男子善女人受持讀誦供養是經者即為供養去來今佛若聞如是等經信解受持讀誦以方便力為諸眾生分別解說顯示分明守護法故是名法之供養又於諸法如說修行隨順十二因緣離諸邪見得無生忍是名最上法之供養從信解受持到得無生忍如法供養是通於淺深的重信的易行道文殊悔過經才提到財物的供養諸佛十方世界無所係屬的無主物持以貢上諸世光耀佛天中天普賢行願品說以諸最勝妙華鬘妓樂塗香及傘蓋如是最勝莊嚴具我以供養諸如來最勝衣服最勝香末香燒香與燈燭我以廣大勝解心普遍供養諸如來這些都是財供養一切是最勝的一一皆如妙高須彌山聚的這樣的廣大供養是由於廣大的勝解心勝解是假想觀依定所起的假想觀或以假想觀而得定觀成廣大供品來供佛這不是一般人所能的普賢行願品所說本是大願發願能這樣供佛如修行深了能以勝解所成作廣大供養那已不是易行道了大智度論說供養者若見若聞諸佛功德心敬尊重迎逆侍送旋繞禮拜曲躬合手掌而住避坐安處勸進飲食華香珍寶等種種稱讚持戒禪定智慧諸功德有所說法信受教誨如是善身口意業是為供養依此可見供養實只是禮敬的一部分所以初期的三品經是沒有說供養的四懺悔業障懺悔能達成佛弟子三業的清淨在出家僧團中是時常舉行的人非大聖不可能沒有過失有過失就要知過能改如有罪過而隱藏在內心會影響內心障礙聖道的進修不得解脫大乘佛法的懺悔是在十方一切佛前懺悔無始以來的一切罪業普賢行願品所說還只是懺悔業障但有的卻擴大為懺悔三障煩惱障業障報障等在大乘佛法中懺悔有了不尋常的意義而懺悔的方法更多這留在下面作專章來敘說五隨喜功德隨喜是對於他人的所作所為內心隨順歡喜認可為行得好合於自己的意思所以隨喜是通於善惡的簡略的說佛法是淺深不等的離惡行善這是要自己身體力行的但不只是自己行就夠了任何一種離惡行善的善行可分四類一自行自己去做二勸他行還要勸別人去做三隨喜行知道別人做了起認可歡喜心四讚歎行讚歎這一善行讚揚行此善行的人以激勵大眾大家都向於離惡行善才是佛教的理想善行如此惡行也有自行勸他行隨喜行讚歎行如惡行而具足四行那可是惡性深重了這裡約隨喜功德說一切善行不外乎一般人的人天福德聲聞與緣覺乘有學無學功德菩薩發大心廣修福慧自利利他的功德如來圓滿大菩提現成佛說法入涅槃等最勝功德對於這一切功德都心生歡喜如普賢行願品說十方一切諸眾生二乘有學及無學一切如來與菩薩所有功德皆隨喜般若經隨喜品也是這樣不過與般若相應無相無著是難行道而已法華經隨喜功德品聽聞隨喜而轉化他人隨喜功德是一切大乘法門所重視的大智度論說隨喜福德者不勞身口業作諸功德但以心方便見他修福隨而歡喜這不是說不需要身語的實際善行是說見他修福而心生隨喜是有很大功德的依大智度論說隨喜功德之所以有大福德一確信福德因果得正見故隨而歡喜二我應與一切眾生樂而眾生能自行福德作福的一定能得安樂那就與自己行善一樣三眾生行善與我相似是我同伴是故隨喜眾生是自我中心的雖明知行善是應該的但從自我而起顛倒每對他人的善行善事福德慧德會引起嫉妒障礙或破壞這是修菩薩行的大障如能修隨喜行時時隨喜一切功德那一定能慈心普利趣入菩提的大道隨喜是禮佛三品之一是在佛前修的佛菩薩的功德當然是隨喜的主要內容但如來化導眾生不棄人天聲聞緣覺功德所以一切功德都是發菩提心者所隨喜的六請轉法輪七請佛住世在三品法門中這二者是合為勸請品的這二者出於各部派的共同傳說一釋尊成佛以後感到了佛法甚深眾生不容易教化曾有我寧不說法疾入於涅槃的意境梵天知道了特來請佛說法這才受請而大轉法輪佛法是不共世間的世間的神教哲學等學行不是一無足取而是對於徹悟人生的真義實現人生的究竟歸宿是無能為力的惟有佛法才能達成這一目的梵天是印度的最高神自稱是宇宙人類萬物的創造者梵天來懇請說法表示了神教的無能為力有待佛法的救濟佛轉法輪是世間出現了新的希望如昏暗中的明燈一樣那是多難得呀二佛曾三次對阿難說佛四神足已多修習行專念不忘在意所欲如來可止一劫有餘為世除冥多所饒益天人獲安阿難聽了當時沒有說什麼釋尊這才答應了魔的請求三月後入涅槃這表示了雖然說佛涅槃後自依止法依止如法修行與佛在世一樣實際上佛涅槃後雖然佛法在開展教區在擴大而佛法的真意義究竟解脫的卻大大的低落了這所以有正法與像法後來又有末法的分別不免想到了佛法從世間滅失的悲哀這二項傳說在部派佛教中沒有引起什麼問題初期大乘興起勸請成為禮佛三品之一晝夜六時對十方佛初成佛道的請轉法輪佛要入涅槃的請佛住世這是願望佛法的出現世間佛法永遠存在於世間為苦難眾生作依怙這是真誠的護法心西元前後印度的政局非常混亂佛法在傳布中不免要受到破壞障礙聖弟子面對當前的佛教從內心激發護法的熱心而將請轉法輪請佛住世作為禮佛要行時時憶念以激發佛弟子為法的熱忱一普皆回向回向是迴轉趣向迴向功德是將所有功德轉向於某一目的普賢行願品的迴向是所有禮讚供養福請佛住世轉法輪隨喜懺悔諸善根迴向眾生及佛道依偈說回向是將上來所說的禮敬功德讚歎功德供養功德懺悔功德隨喜功德勸請功德一切回向於眾生與眾生同成佛道依偈文可見重佛重信的易行道三品經也如此本沒有恒順眾生與常隨佛學的回向眾生及佛道如舍利弗悔過經說學道以來所得一切福德皆集聚合會以持好心施與回向天下十方人民父母蜎飛蠕動之類皆令得其福有餘少所令某得之令某等作佛道異譯菩薩藏經說得更明白一切和合迴施與一切眾生一切和合迴向阿耨多羅三藐三菩提以此善根願令一切眾生亦得阿耨多羅三藐三菩提菩薩修易行道所得的功德回向眾生就是將自己的功德轉而布施給眾生使眾生離苦得樂發心修行成佛菩薩的功德真能施與眾生使眾生受福樂嗎這裡面含有重大問題也就是自力與他力一般神教都是重他力的佛法說善惡因果修因證果一向是自力的大乘佛法的回向功德不違反佛法的特質嗎大智度論卷六一大正二五四八七下四八八上說共一切眾生者是福德不可得與一切眾生而果報可與菩薩既得福德果報衣服飲食等世間樂具以利益眾生菩薩以福德清淨所有身口人所信受為眾生說法令得十善末後成佛是果報可與一切眾生以果中說因故言福德與眾生共若福德可以與人者諸佛從初發心所集福德盡可與人經上說福德回向施與眾生這是果中說因是不了義說菩薩的福德是不能轉施與別人的但菩薩發願化度眾生所以依此福德善根未來福慧具足就能以財物佛法施與眾生使眾生得財物能依法修行成就佛道如自己的福德而可以迴施眾生那是違反自力原則的佛菩薩的功德無量如可以迴施眾生那世間應該沒有苦惱眾生都是佛菩薩那樣也不用佛菩薩來化度了十住毘婆沙論這樣說我所有福德一切皆和合為諸眾生故正迴向佛道菩薩發菩提心求成佛道主要是為了救度一切眾生所以迴向眾生及佛道是說為諸眾生故以一切功德迴向阿耨多羅三藐三菩提並非以福德善根施與眾生普賢菩薩行願讚但說悉皆迴向於菩提沒有說迴向眾生也許是為了避免讀者的誤解吧大乘佛法的易行道主要是懺悔隨喜勸請三品這是在十方佛前進行的所以從禮佛而分出禮敬讚歎供養三事修行終了這一切功德為一切眾生而回向於佛道所以易行道的主體到此為止華嚴經十迴向品二處說到一懺悔禮敬勸請隨喜悉以迴向二懺悔隨喜禮敬勸請迴向離世間品說四行是菩薩道懺除罪障隨喜福德恭敬尊重勸請如來易行道的本義就是這些大乘行者對佛禮敬供養堅定了清淨的大乘信心懺悔使內心沒有疑悔不礙修行隨喜佛菩薩等的功德養成樂人為善的無私心勸請能激發護持佛法的熱忱並以一切功德為眾生而迴向佛道不為一切眾生就會趣入涅槃易行道是以佛為中心的進修能成就這樣的菩薩心行也就能不退阿耨多羅三藐三菩提了八常隨佛學九恒順眾生為了符合華嚴經的體裁滿足十數普賢行願品長行才加入此二願約意義說這二者是菩薩道所應有的在修學過程中生生世世見佛聞法是向上不退的最佳保證到底應該怎樣修學也只有學習諸佛那樣的因中修學才能圓成佛道恒順眾生是於眾生隨順而轉尊重眾生救助眾生利益眾生思益梵天所問經說菩薩有四法善知方便在隨喜懺悔勸請外順眾生意也確是方便之一上來的解說是依易行道的十支作一般的解說並非專依普賢行願品說的第四章懺悔業障第一節佛法的懺悔說在佛法中懺悔是進修的方便與戒學有關到了大乘佛法懺悔罪業為日常修持的方便從大乘經去看幾乎重信的經典說到念佛不一定念阿彌陀佛都會說到消除生死重罪的中國佛教流行的種種懺法就由此而來懺是梵語懺摩的音略意義為容忍如有了過失請求對方個人或團體容忍寬恕是懺的本義悔是的意譯直譯為說犯了過失應該向對方承認過失不只是認錯要明白說出自己所犯的罪過這才是悔了三曼陀跋陀羅菩薩經說所當悔者悔之所當忍者忍之悔與忍合說就是懺悔成為中國佛教的習慣用語此外也譯為悔或譯惡作對自己的所作所為覺得不對而起反悔心就是這種悔惡作或是善的或是惡的但無論是善悔惡悔有了悔意心緒就不得安定成為修定的障礙悔惡作與懺悔的悔說意義完全不同這是應該知道分別的古人稱佛法戒律中的懺悔為作法懺中國佛教是以大乘佛法為主的對作法懺似乎不太重視釋尊依法攝僧將出家人組合起來名為僧伽使出家眾過著和樂清淨的僧團生活維持僧伽大眾的清淨就是佛所制的戒律內容包含了道德的如殺盜等軌範生活的衣食住等準則團體的如受具布薩安居等規制僧伽的和樂清淨能使社會大眾增長信心內部僧眾精進而易於解脫達成正法久住世間的目的就依賴這如法清淨的僧伽僧伽的戒律如國家的法律人人有尊重與遵守的義務如違犯了如極其嚴重是不容許懺悔的逐出僧團如世間的死刑不再是僧伽的一員如不太嚴重的准予依律懺悔如不承認過失不肯懺悔的那就擯出去大家不再與他往來談論如世間的流刑但還是出家弟子什麼時候真心悔悟請求懺悔就為他依法懺悔出罪犯過失而可以懺悔的也輕重不等犯重的是僧殘如犯重而沒有覆藏自己知道過錯當日請求懺悔的要接受六日夜摩那埵的處分處分的內容主要是褫奪部分的權利如世間的褫奪公權坐臥到旁邊下位去尊敬比丘眾並為大眾服務如六夜中誠意的接受處分就可以舉行出罪阿婆呵那如犯重而怕人知道覆藏起來或經同住者的舉發或後來省悟到非法請求准予懺悔那就要加重處分了覆藏多少天先要受別住波利婆沙多少天的處分別住以後再經六夜的摩那埵然後可以出罪別住的處分與摩那埵相同犯僧殘罪的要在二十比丘僧前舉行出罪手續然後回復了固有的清淨比丘沒有罪了身分犯過失而比較輕的或在四人以上僧中向一比丘說罪悔或但向一比丘說也有所犯極輕的自心呵責悔悟就可以了釋尊為比丘眾制定的懺悔法是在道德感化中所作的法律處分如經過合法的出罪手續就回復清淨比丘身分正如受了世間的法律處分徒刑罰鍰等就不再有罪一樣在僧伽制度中舉發別人的過失是出於慈悲心因為唯有這樣才能使他清淨如法修行除極輕的心悔外犯者都要在大眾或一人之前陳說自己所犯的過失以誠意知罪為要懺悔以後人人有平等自新的機會旁人不得再提起別人從前的過失諷刺或歧視如諷刺歧視已懺悔的人那就是犯了過失僧伽中沒有特權實行真正的平等民主與法治依此而維護個人的清淨僧伽的清淨佛法中懺悔的原始意義如佛教而是在人間的相信這是最理想的懺法出家的應依律制而行有所違犯的犯或譯為罪是應該