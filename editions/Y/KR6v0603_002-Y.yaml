教他懺悔然後為他說八關齋戒依大智度論先受三歸依其次懺悔然後說八戒及不過中食論上說我某甲若身業不善若口業不善若意業不善若今世若過去世有如是罪今日誠心懺悔身清淨口清淨心清淨受行八戒是則布薩失譯的受十善戒經所說的受八戒法也是先歸依次懺悔後受戒戒是在大德和上前受的而懺悔是今於三世諸佛阿羅漢前和上僧前至誠發露五體投地懺悔諸罪是名行布薩法已有大乘懺悔的意義在家弟子的懺悔與受八戒通常是六齋日在四部眾中由出家大德來教說的但近住八戒的流布顯然演變到可以從受盡形壽戒的在家弟子受所以大毘婆沙論說從七眾受皆得西元三四世紀間造的成實論竟說若無人可作師時但心念口言我持八戒就是受戒了這一攝化在家弟子的八戒在佛教傳宏中某些部派是相當寬的達到可以離出家眾而懺悔受戒的地步可說是在家佛教的先聲這一演變應該是由於事實上的困難例如年紀老了想受近住戒卻不能到寺院中去那就變通為從受盡形壽五戒的在家弟子或心念口言的受持八戒也就不必向僧眾懺悔了在十方佛現在的信仰流行中大乘就向十方佛懺悔這是一項最可能的原因出家眾方面一向是在僧團中依法懺悔但也有困難的情形發生如犯僧殘罪的不敢覆藏意願發露懺悔但犯僧殘的要有二十位清淨比丘如法舉行出罪羯磨才能回復清淨可是有些地方出家眾不多無法舉行出罪尤其是教團在流行中有些是品質越來越有問題要集合二十位清淨比丘也真是不太容易在律中也說到可以暫時擱置等因緣和合時再舉行出罪但僧團可以暫時擱置而犯戒者內心的罪惡感是無法消除的這不是有心懺悔而懺悔無門嗎出家眾捨僧團而向佛十方佛懺悔這是最可能的原因了法鏡經大正一二一八下說時世無佛無見經者不與聖眾相遭遇是以當稽首十方諸佛法鏡經在說三品法懺悔隨喜勸請時說到禮十方佛為什麼禮敬十方佛因為時世無佛佛已涅槃了雖有佛遺體舍利塔但只能使人供養作福無見經者沒有通達經義而為人宣說的不與聖眾相遭遇沒有遇到四雙八輩的聖僧在這佛滅以後正法衰微出家眾徒有形儀的情形下恰好十方佛現在說流行也就自然向十方佛禮敬而修懺悔等行了二懺悔今生與過去生中的惡業懺悔的本義是對自己這一生所作惡業知道錯了請求懺悔出家與在家的懺法雖略有不同但無論是制教律化教阿含經都是懺悔這一生現生所作的惡業大乘佛法的懺悔不只是今生懺悔到無始以來所作的惡業一般熟悉的普賢菩薩行願讚大正一八八上中說我曾所作眾罪業皆由貪欲瞋恚癡由身口意亦如是我皆陳說於一切禮拜供養及陳罪隨喜功德及勸請我所積集諸功德悉皆迴向於菩提普賢行願讚是唐不空所譯的在四十華嚴中我曾所作譯為我昔所造長行作我於過去無始劫中陳說與陳罪都譯作懺悔或懺除可見華嚴經十大願中的懺悔是懺悔到無始以來的惡業陳罪與陳說還是說罪發露不敢覆藏的古義無始以來每一生中都曾造作惡業也造有善業在佛法中是公認的但過去到底造了些什麼罪一般人是誰也不會知道的不知道造些什麼罪那又怎樣懺悔呢普賢行願讚總括的說一切惡業不外乎貪瞋癡總攝一切煩惱所引發依身語意而造作所以在十方佛前就這樣的發露陳說懺悔了初期的大乘懺悔法如佛說舍利弗悔過經懺悔法是在十方佛前陳說的先說犯罪的原因是為貪瞋癡煩惱所逼就是煩惱所發動不知道佛法僧不知道是善是不善其次發露陳說自己無始以來的惡業內容為惡心出佛身血謗正法破僧殺阿羅漢殺父殺母十不善業道自作教他作見作隨喜罵詈誹謗斗秤欺誑惱亂眾生不孝父母盜塔物盜僧物毀佛經戒違逆和尚與阿闍黎毀辱三乘人惡口毀佛法說非法非法說法是最重的五無間罪大乘佛法多一毀謗經法的重罪如大智度論說聲聞道中作五逆罪人佛說受地獄一劫菩薩道中破佛法人佛說此間劫盡復至他方地獄受無量罪如大品般若經四一信毀品所說十不善業道是世間最一般的惡行是世間的惡行是出家人在佛教內所犯的惡業一般人對佛法僧的毀謗破壞這些無始以來所作的惡業其實就是當時大乘佛教所面對的教內教外的種種罪惡現在十方世界有佛所以向十方佛發露懺悔自己雖見不到十方佛十方佛是知者見者知道自己的罪惡自己的發露也能受自己的懺悔懺悔是希望淨除業障經名滅業障礙願以此罪今生輕受以後不墮三惡道不生八難應譯為八無暇能在人間天上修學佛道大乘懺法是日三時夜三時每天六次的在十方佛前懺悔佛法的本義只懺悔現生所作的惡業隨犯隨懺勿使障礙聖道的修行僧伽內部更有維護僧伽清淨的意義過去生中所作的惡業可說是不加理會的重要的是現生的離惡行善降伏斷除煩惱如煩惱不起降伏斷除身語意三業一定清淨能修善以趣入聖道趣入聖道那過去的無邊業力一時失卻了感報的可能性大乘佛法的易行道特重懺悔無始以來的惡業主張離煩惱根本的我法二執的是智證的大乘與佛法有著非常不同的意義雖然能真誠懺悔的時時懺悔的改往修來也有離惡行善的作用然從佛法思想發展來說這是值得重視的可能是佛教界業報說的發達本來四諦說中集諦是生死流轉苦的因緣內容是愛或說是無明與愛這都是以煩惱為生死苦的因素緣起說也是這樣被解說為業的是行福行非福行不動行與有雜阿含經修多羅只說到十善業與十不善業中阿含經與增壹阿含經已大大的分別解說了如中阿含經的鸚鵡經分別大業經不但說業感總異熟報生人生天等還論到同樣的人間有貧富壽夭等都是由於業報的不同雜阿含經祇夜說到摩訶男前生慳吝無比布施了又後悔殺異母弟而奪他的財產所以今生富有而不能受用沒有兒子死後產業歸公還要墮落地獄又如雜阿含經記說中勒叉那見到種種不同的鬼說到他們前生所作的惡業這種業報故事非常流行通俗傳布的本生與譬喻也多說到前生與今生的業報關係業報說可說是印度文化主流的婆羅門教東方的耆那教所公認的與佛法的解說不同在業報說通俗流布中一般信眾可能帶一些宿命論的傾向如西元二世紀來中國的安世高自己說前生晚年當往廣州畢宿世之對到了廣州路逢一少年就不明不白的被殺了這一生中吾猶有餘報今當往會稽畢對到了會稽市上有亂世高又被誤殺了像這類業報故事多少有點宿命論傾向面對世間的人際關係經濟生活身心病變等如認為一切由過去業力來決定忽略了現生因緣的影響那就會感到自己的無能為力但又想要去改善他在佛法固有的懺悔制及或說一切業皆可轉故乃至無間業亦可令轉的啟發下就會意想到過去惡業的怎樣消解淨除這應該是懺悔宿生惡業的思想來源大乘佛法的六時懺悔是世俗迷妄行為的淨化業淨除惡業是印度神教所共信的有被稱為水淨婆羅門的以為在特定的水中洗浴可以使自己的眾惡清淨如瑜伽師地論說妄計清淨論者起如是見立如是論若有眾生於孫陀利迦河沐浴支體所有諸惡皆悉除滅如於孫陀利迦河如是於婆湖陀河伽耶河薩伐底沙河殑伽河等中沐浴支體應知亦爾第一清淨論義是依據雜阿含經中阿含經的水淨婆羅門以為孫陀利河是濟度得解脫之數是吉祥得福德之數是清淨之數若有於中洗浴者悉能除人一切諸惡佛告訴他若人心真淨具戒常布薩不殺及不盜不婬不妄語能信罪福者終不嫉於他法水澡塵垢宜於是處洗若入淨戒河洗除眾塵勞雖不除外穢能祛於內垢佛法是以信三寶持戒布薩布施修定等來清淨自心洗淨穢心二十一心穢與惡業的從水中洗淨罪惡得生天解脫是印度神教的一流後代似乎特重殑伽恒河如大唐西域記說殑伽河彼俗書記謂之福水罪咎雖積沐浴便除輕命自沈生天受福死而投骸不墮惡趣揚波激流亡魂獲濟水淨的末流真是迷信得到家了淨除罪惡不只淨除今生所作的也是淨除與生俱來的罪惡如猶太教以為人的老祖宗犯了罪從此子子孫孫生下來就有罪惡耶穌以前就有呼籲人悔改而從水得清淨的耶穌從施浸者約翰在約旦河浸浴而得到宗教的經驗所以後來的基督教信徒的悔改信神要受浸禮多數改用象徵的洗禮以表示原罪的淨除浸禮只一次平時從祈禱中悔改而印度的水淨者卻是時常洗浴求淨的如方廣大莊嚴經說或一日一浴一日二浴乃至七浴每天多次洗浴是為了淨除諸惡而達到解脫別譯雜阿含經說具戒常布薩法水澡塵垢以善法來淨除內心垢穢不是沐浴那樣嗎受戒布薩是不離懺悔的那麼六時懺悔淨除無始以來的惡業不是與一日多次沐浴求清淨有同樣的意義嗎當然大乘的六時懺悔沒有那種從沐浴求淨的古老迷信了向十方佛六時懺悔淨除業障可以解決業報說通俗發展所引起的問題也適應淨化了世俗水淨的迷妄行為在大乘佛法興起中發展起來三懺悔罪過涵義的擴大業障本是指五無間罪說的犯了五無間罪即使懺悔現生也不可能悟入正法所以名為業障沒有歸信三寶以前犯殺盜等重罪歸依或出家的如違犯佛所制的戒律對修行也是有障礙的所以普賢行願品所說的懺悔業障不限於五無間罪而是廣義的通於一切不善業懺悔是犯罪造作不善業者的發露懺悔所以懺悔是對不善業而說的但在六時懺悔的流行中懺悔有了進一步的擴張不再限於業障了如隋闍那崛多共笈多譯的大乘三聚懺悔經大正二四一九一下說是眾生等有諸業障云何懺悔云何發露謂煩惱障諸眾生障法障轉後世障云何懺悔云何發露這是懺悔五種障業障煩惱障眾生障法障轉後世障同本異譯的安世高所譯舍利弗悔過經沒有說到梁僧伽婆羅譯的菩薩藏經也沒有說到只說從無始生死以來所造惡業為一切眾生障礙欲得於一切諸法清淨無有障礙應當如是懺悔諸惡業障但五種障說古來就已有了如西晉竺法護譯的文殊悔過經說以此功德自然棄除五蓋之蔽同時的聶道真所譯三曼陀跋陀羅菩薩經立五蓋品第一經文說一切諸罪蓋諸垢蓋諸法蓋悉除也蓋顯然是障的異譯罪蓋是業障垢蓋是煩惱障法蓋是法障雖只說三種而法蓋與五障中的法障無疑是相同的與闍那崛多同時的那連提耶舍譯出日藏經與月藏經有四障說彼人所有無量生死恒沙業障眾生障法障煩惱障能障一切善根未受未盡未吐者如是等業皆悉滅盡一切業障煩惱障法障罪業皆盡惟除五逆破毀正法誹謗聖人彼諸天龍乃至迦吒富單那向彼菩薩摩訶薩邊懺悔業障眾生障法障煩惱障在以上三文中除第二外都說懺悔四種障四障就是五種障中的四障五障與四障的意義可能眾生障是異熟報障法障指修學大乘法的障礙雖意義不明顯但有煩惱障在內是確然無疑的煩惱怎麼也可以懺悔呢我以為這是西域變了質的佛法竺法護與聶道真是西元三世紀後半世紀的譯師法護世居燉煌隨師至西域遊歷諸國大齎胡經還歸中夏護公所譯的經本是從西域來的闍那崛多與那連提黎耶舍是西元六世紀中後的譯師所譯的經本是齊僧寶暹道邃僧曇等十人以武平六年相結同行採經西域往返七載將事東歸凡獲梵本二百六十部也是從西域來的從西元三世紀到六世紀從西域來的經本都有懺悔四障五障說所以四障五障說決非偶然的誤譯佛經從北印度而傳入西域西域的文化低對佛法的法義缺少精確的認識如佛法初傳我國漢魏晉初期對佛法的誤解很多西域流行的佛法強調通俗的懺悔因誤傳誤演化出懺悔三障四障五障的異說印度所傳的正統論義是沒有這種見解的經本從西域來推定為西域佛教的異說應該是可以採信的後魏北印度三藏菩提流支譯出佛名經十二卷有人擴編為三十卷也就是敍列一段佛名加上經名菩薩名插入一段文字每卷末附入偽經大乘蓮華寶達問答報應沙門經一段插入的懺悔文文章寫得相當好如說然其罪相雖復無量大而為語不出有三何等為三一者煩惱障二者是業障三者是果報障此三種法能障聖道及以人天勝妙好事是故經中目為三障所以諸佛菩薩教作方便懺悔除滅此三障如此懺悔亦何罪而不滅亦何障而不消經中導言凡夫之人舉足動步無非是罪此三種障法更相由籍因煩惱故所以起惡業惡業因緣故得苦果第一先應懺悔煩惱障這不是譯出的經是中國人纂集編寫的懺法麗藏本附記說心知偽妄力不能正末法之弊一至於此傷哉懺悔三障是這部佛名經所明說的西域流行的妄說影響中國佛教極其深遠以上是所懺悔法的擴大還有能懺悔法的擴大如智者大師摩訶止觀的五悔五悔是懺悔勸請隨喜迴向發願前四事如舍利弗悔過經也就是十住毘婆沙論所引的經說易行道的四事加發願而稱之為五悔懺悔只是一事智者以為懺名陳露先惡悔名改往修來中國自己的解說與原義不合所以總名為五悔行此懺悔破大惡業罪勸請破謗法罪隨喜破嫉妬罪迴向破為諸有罪沒有說發願破什麼罪悔的本義是說是陳說己罪智者解說為改往修來意義通泛不切修行善法的一定會對治破不善如稱為悔那一切善行都是悔了在習慣用語中悔就是懺悔於是易行道的方便除念佛往生淨土外幾乎都統一於懺悔了近代中國的通俗佛教難怪以經懺佛事為代表了罪業不善業真的可依懺悔而除滅嗎龍樹有明確的說明如十住毘婆沙論卷六大正二六四八下四九上說我不言懺悔則罪業滅盡無有報異熟果我言懺悔罪則輕薄於少時受是故懺悔偈中說若應墮三惡道願人身中受又如阿闍世害得道父王以佛及文殊師利因緣故重罪輕受依十住毘婆沙論意懺悔業障並不能使罪消滅了只是使罪業力減輕重罪輕受本來是要在來生或後後生中受重報的由於懺悔善現在人中輕受重罪業就過去了金剛般若經說善男子善女人受持讀誦此經若為人輕賤是人先世罪業應墮惡道以今世人輕賤故先世罪業則為消滅讀誦經典而能消重罪業與大毘婆沙論意義相同不過後起的經典極多取意不同有些是不能這樣解說的第三節稱名念佛除業障念佛三品是晝夜六時在十方佛前進修的對佛的稱名憶念禮拜就是念佛信佛念佛以佛為理想淨除一切業障隨喜勸請迴向於佛道是廣義的念佛法門容易往生淨土不退菩提心而決定成佛在流傳中念佛是通俗化及深化的除業障是重要的一項這裡略為敍述念佛三品泛說十方現在一切佛在一般信眾心目中雖確信十方有佛偶而說到某方某某佛對十方佛現在來說不免抽象而缺乏親切感所以大乘經中舉出十方十佛的名字作為稱名憶念禮拜的對象可以除業障而得不退等功德如十住毘婆沙論卷五大正二六四一中說或有以信方便易行疾至阿惟越致不退轉者如偈說東方善德佛上方廣眾德佛如是諸世尊今現在十方若人疾欲至不退轉地者應以恭敬心執持稱名號這是現在十方一切佛中每一方舉出一佛的名號善德等十方十佛雖然後來不太受佛教界的注意但在大乘佛法開展中這可能是最早出現的十方十佛受到重信行的大乘所尊重如龍樹十住毘婆沙論論到稱名憶念首先說到了善德等十方佛東晉佛陀跋陀羅所譯的觀佛三昧海經說到東方善德佛等的本行一師九弟子以往詣佛塔禮拜佛像說偈讚歎因緣現在十方成佛又說觀十方佛東方善德佛等劉宋曇摩蜜多所譯觀普賢菩薩行法經也說到東方善德佛南方有佛名栴檀德梁僧伽婆羅所譯的菩薩藏經三品經的異譯也列有善德等十方十佛的名字譯名略異這可見善德等十方十佛在初期的信行大乘中的重要了這是出於寶月童子所問經的如趙宋施護所譯大乘寶月童子問法經說若有眾生經剎那間至須臾之間聞我十佛名號聞已恭敬受持書寫讀誦廣為人說所有五逆等一切罪業悉皆消除亦不墮地獄傍生焰魔羅界鬼趣於無上正等正覺速得不退聞此十佛名號恭敬受持書寫讀誦信樂修行所有無量無邊福德悉得具足三業之罪亦不能生聞十方佛而執持稱名號受持讀誦為人說五逆在內的一切罪業都可以消滅一切福報都可以具足速得不退這樣的念佛滅罪與佛前的懺悔罪業多少不同依經說這是十方佛於過去為菩薩時發願如此聞佛名號而滅罪的經典不少如元魏吉迦夜所譯佛說稱揚諸佛功德經廣說六方諸佛的名號與功德例如說其有得聞寶海如來名號者執持諷誦歡喜信樂其人當得七覺意寶皆當得立不退轉地疾成無上正真之道却六十劫生死之罪其有得聞寶成如來名號者執持諷誦以清淨心歡喜信樂却五百劫生死之罪其有得聞寶光明如來名者執持諷誦讀歡喜信樂五體投地而為作禮却二十萬劫生死之罪這一類文句經中著實不少都是聞佛名號以信心清淨去執持讀誦的功德原則的說都住不退轉必得無上正真之道的所說却劫生死之罪意思是說在修行成佛的過程中可以少經多少劫生死這如釋尊在過去生中七日七夜以一偈讚底沙佛超越了九劫所以生死之罪不一定是惡業而是泛稱能感生死果報的有漏業這部經特別稱讚阿閦佛魔波旬說寧使捉持餘千佛名亦勸他人令使學之不使捉持阿閦佛名其有捉持阿閦如來名號者我終不能毀壞其人無上道心其實一切佛功德是一致的姚秦鳩摩羅什所譯千佛因緣經與稱揚諸佛功德經有同樣的意趣如說時千聖王聞千佛名歡喜敬禮以是因緣超越九億那由他恒河沙劫生死之罪若有善男子善女人聞是佛名恒得值佛於菩提心得不退轉即得超越十二億劫極重惡業晉竺法護譯佛說寶網經說六方諸佛的功德也說聞彼佛名信樂不疑越若干百千億姟生死之難立在初學疾逮無上正真之道唐義淨譯受持七佛名號所生功德經也這樣說若有得聞彼佛名者便超百千俱胝大劫生死長夜流轉劇苦唐菩提流志編譯的大寶積經三四功德寶花敷菩薩會說十方十佛東方名無量功德寶莊嚴威德王如來受持彼佛名者即能滅除六十千劫生死之罪趙宋施護所譯佛說大乘大方廣佛冠經說六方佛及六方佛的上首菩薩也處處說到能稱念受持者當得不退轉於阿耨多羅三藐三菩提三十千劫中背於生死宋曇無竭譯觀世音菩薩授記經說得聞過去金光師子遊戲如來善住功德寶王如來名者皆轉女身却四十億劫生死之罪上來所引經文所說的却背超越超越或者說滅生死罪業意義是一樣的都是由於聽聞佛的名號信心清淨受執持名號讀誦因而發菩提心恒得值佛聞法修行所以能不為生死業力所障礙能決定不退轉於無上菩提的却生死業與不退菩提與念佛法門有著重要的關係大乘佛法時代甚深的難行的法門以外重信的易行法門相當的流行所以專說佛名的經典不斷的傳出所出的佛名非常多竺法護譯出的賢劫經就說了賢劫千佛的名字與因緣因緣都是從見佛供養發心而來的並說到若有聞佛名百一斯等不久成佛正覺不知是誰譯或集出的過去莊嚴劫千佛名經現在賢劫千佛名經未來星宿劫千佛名經現在有兩種本子一本以說佛名為主一本於佛名中夾入懺悔詞這顯然是經過中國佛弟子的增補元魏菩提流支譯出的佛說佛名經十二卷可說集佛名的大成這是從各種經中集出來的所以也偶而依經這樣說若人受持讀誦是佛名超越世間不可數劫若善男子善女人十日禮拜讀誦是諸佛名遠離一切業障永滅諸罪三十卷本的佛名經是依據這部經中國人編成的懺儀隋闍那崛多譯的五千五百佛名神呪除障滅罪經八卷說四千七百二十五如來約在千五百五十佛到千七百五十佛間說佛名與咒語這應該本是佛名經只是傳來的時代遲了些在流傳中為祕密行者附入了咒語所以體例不能一致諸佛名號的廣泛傳出雖未必為甚深智證行者所重視但重信的易行的方便在普及一般的信眾中顯然是受到尊重信受的從翻譯者來看這主要是北印度與西域傳來的眾多如來名號的傳出可以滿足十方三世諸佛的信念但懺悔也好除業障也好得不退轉菩提也好佛太多了會使一般信眾無所適從的於是有舉出特定的部分佛名作為受持懺悔對象的必要如大寶積經二四優波離會大正一一五一五下五一六中說舍利弗若有菩薩犯波羅夷者應對清淨十比丘前以質直心殷重懺悔犯僧殘者對五淨僧殷重懺悔若為女人染心所觸及因相顧而生愛著應對一二清淨僧前殷重懺悔舍利弗若諸菩薩成就五無間罪犯波羅夷或犯僧殘戒犯塔犯僧及犯餘罪菩薩應當於三十五佛前晝夜獨處殷重懺悔眾罪皆懺悔諸福盡隨喜及請佛功德願成無上智舍利弗菩薩應當一心觀此三十五佛而為上首復應頂禮一切如來應作如是清淨懺悔菩薩若能滅除此罪爾時諸佛即現其身為度一切諸眾生故示現如是種種之相優波離會是闡明大乘律毘尼的竺法護初譯名佛說決定毘尼經唐不空也譯出佛說三十五佛名禮懺文部分戒律是與懺悔有關的所以說到菩薩的懺悔菩薩在僧中的懺悔與佛法的律制不同如犯波羅夷的律制是逐出僧團不可懺悔的而現在在十清淨比丘前就可以懺悔出罪了犯僧殘的律制從二十清淨比丘出罪現在有五清淨比丘就可以了這是大乘的寬容精神其實也是犯重戒的菩薩比丘越來越多清淨比丘越來越少不得不降低標準如說一切有部的律師們也說犯波羅夷的一部分不失僧格了對於菩薩出家或在家的所犯一切罪別制大乘懺悔法稱念三十五佛名字南無釋迦牟尼佛南無寶蓮花善住娑羅樹王佛於佛前懺悔隨喜勸請迴向與三品經相近而且也是為舍利弗說的三十五佛中以釋尊為首初期的大乘行者還沒有忽視這一世界的佛法根源經說菩薩若能滅除此罪的諸佛現身現種種相這所以被稱為取相懺這不是稱佛名號照本誦一遍就可以這是要一心觀此三十五佛晝夜獨處殷重懺悔以諸佛現種種相證明罪業的清淨這是從稱名而引入觀相也不太容易但不能說是甚深法門了但世間總是引向通俗的如佛說三十五佛名禮懺文末說五天竺國修行大乘人常於六時禮懺不闕功德廣多文煩不能盡錄但依天竺所行者略記之這與文殊發願經等為大乘行者所日常持誦情形是一樣的宋畺良耶舍所譯觀藥王藥上二菩薩經主要是說藥王藥上二位菩薩的功德與觀法說到過去世的五十三佛普光佛一切法常滿王佛聽聞五十三佛名的百千萬億劫不墮惡道稱五十三佛名的生生世世見佛至心禮敬五十三佛的能除滅四重五逆及謗方等經皆悉清淨以是諸佛本誓願故於念念中即得除滅如上諸罪經上大正二六六四上中說若有眾生欲得除滅四重禁罪欲得懺悔五逆十惡欲得除滅無根謗法極重之罪當勤誦上文所說藥王藥上二菩薩呪亦當敬禮上文所說須彌燈光明等十方佛復當敬禮過去七佛後當敬禮五十三佛亦當敬禮賢劫千佛復當敬禮三十五佛然後遍禮十方無量一切諸佛晝夜六時心想觀想明利猶如流水念念相續行懺悔法然後繫念念藥王藥上二菩薩清淨色身五十三佛是過去佛由於佛的本願所以至心敬禮五十三佛的有除滅罪業的功德經上說到了出於優波離會的三十五佛又有咒語比優波離會的傳出顯然要遲一些雖說懺悔實與三十五佛的懺悔法不同聞汝等二菩薩名及聞我等十方佛名即得除滅百千萬劫生死之罪敬禮諸佛因緣功德力故即得超越無數億劫生死之罪這是聞名禮拜而能除滅生死罪與懺悔的意義不切五十三佛是過去佛與三品經在現在十方佛前懺悔不同經中廣明觀二位菩薩的清淨身相一再說臨命終時隨意往生諸淨土與畺良耶舍禪師的另一譯籍觀無量壽經性質相同但中國古德將三十五佛與五十三佛綜合為同一懺悔文一直流傳到現在此外還有二十五佛說如佛名經中佛為舍利弗說的東方二十五佛名號誦念此二十五佛名日夜六時懺悔滿二十五日滅四重八禁等罪不知這是依什麼經集出的意義與上二部大同說到念佛滅罪的教典極多這裡略舉重要的而已在十方佛前稱名憶念禮拜修懺悔隨喜等是信方便易行道從對僧伽的懺悔演化而來是自力的廣義念佛法門在過去或現在的十方佛前禮拜稱名觀想等能却多少劫的生死罪業都由於佛的本願力雖須要自己的禮拜稱名觀想而實含有他力佛力加持的意義稱佛名號如人的呼天叫娘一樣在一般人心中極容易存有請求援助的意味念佛的從自力而向他力發展舉一例就可明白上面曾引大智度論由於大家稱念佛名免除摩竭魚王的險難理由是魚王前生是佛弟子所以聽見了南無佛的聲音就閉口而免了一船人的被吞沒這一傳說沒有佛力救護的意義然對免難的故事來說理由是不太圓滿的如魚王前生而不是佛弟子那稱念南無佛不是就無效了嗎這一佛教界的傳說應有他力的意義如高齊那連提耶舍所譯大悲經卷三大正一二九五七中下說過去有大商主將諸商人入於大海到彼海已其船卒為摩竭大魚欲來吞噬商主偏袒右肩右膝著地住於船上一心念佛合掌禮拜高聲唱言南無諸佛得大無畏者大慈悲者憐愍一切眾生者如是三稱時諸商人亦復同時合掌禮拜如是三稱爾時彼摩竭魚聞佛名號禮拜音聲生大愛敬心得不殺心時摩竭魚聞即閉口阿難爾時商主及諸商人皆悉安隱得免魚難魚王聞佛名號起不殺心商人們免於死亡這是佛力思惟要略法說得更明確念佛者令無量劫重罪微薄得至禪定至心念佛佛亦念之如人為王所念怨家債主不敢侵近人念佛佛也念人就憑佛力的庇護而得到平安這是明確的他力說如以此義來解說念佛而免魚王之難的故事不是更合理嗎在大乘佛法的開展中易行方便幾乎都他力化了不只是念佛也念菩薩如十住毘婆沙論敍述念十方十佛後接著說阿彌陀等佛及諸大菩薩稱名一心念亦得不退轉大菩薩是得無生法忍以上的大乘經所說大菩薩多數是他方世界來的如是這一世界的也是不可思議信仰中的菩薩菩薩未必有僧伽組織但念菩薩就是念菩薩僧也可說念未來佛吳支謙譯八吉祥神呪經與竺法護異譯的八陽神呪經都附有八大菩薩失譯附後漢錄的六菩薩名亦當誦持經趙宋法賢譯的八大菩薩經都是念菩薩的短篇第五章往生極樂淨土第一節彌陀淨土與三輩往生菩薩在發心修行的過程中不退菩提心是最重要的於菩提心得不退轉才能不斷進修成就佛道如退失了菩提心那就是退轉退入二乘或退在五趣生死那就不能成佛了可是菩薩道廣大難行容易退失非怯劣眾生所能成辦所以經說往生淨土的易行道中國佛教界說到淨土似乎就是西方極樂世界說到往生就是往生西方這表示了中國佛教界對往生西方極樂淨土信仰的普遍深遠如依大乘佛法來說十方的清淨國土是無量無數的往生是死此往彼的一般用語如往生天上往生地獄以往生淨土來說十方淨土隨願往生所以也並不等於往生西方極樂國土然往生西方極樂在大乘經中有它獨到的意義這才會形成中國淨土宗那樣的盛況十方的淨土雖多然專說淨土的經典並不太多主要是東方不動阿閦佛的妙喜淨土西方阿彌陀佛的極樂淨土大乘經中說到這東西二佛與二淨土的非常多可說二淨土是旗鼓相當但說東方阿閦佛土的僅有阿閦佛國經一部二種譯本而說西方阿彌陀佛淨土的有三部經更多的譯本差別的理由何在阿閦佛淨土是重智證的甚深行阿彌陀佛淨土是重信的易行道在通俗普及的情況下念阿彌陀佛往生極樂淨土的法門當然要比阿閦佛淨土法門盛行得多了其實在中國佛教界阿閦淨土法門可說已經忘失了專明阿彌陀佛淨土的經典漢譯的有三部一大本阿彌陀經共存五種譯本經考定為阿彌陀三耶三佛薩樓佛檀過度人道經二卷傳為吳支謙譯後漢支婁迦讖譯無量清淨平等覺經四卷傳為支婁迦讖譯或作曹魏白延譯吳支謙譯這二部是二十四願的古本無量壽經二卷傳為曹魏康僧鎧譯晉竺法護譯編入大寶積經的無量壽如來會二卷唐菩提流志譯這二部是四十八願本無量壽經保存了五大善五戒及乞丐與國王的譬喻可說是從二十四願到四十八願間的經本大乘無量壽莊嚴經三卷趙宋法賢譯是三十六願本二小本阿彌陀經有兩種譯本佛說阿彌陀經一卷姚秦鳩摩羅什譯稱讚淨土佛攝受經一卷唐玄奘譯小本雖不說阿彌陀佛的本願也沒有說到三輩九品往生然敘述極樂國土的依正莊嚴而勸人念佛往生簡要而容易持誦所以最為流通三佛說觀無量壽經一卷宋畺良耶舍譯立十六觀九品往生是屬於觀相念佛的在十方佛淨土中阿彌陀佛與極樂淨土的特勝是在彌陀淨土法門集出時表示了一項信念一切佛中的阿彌陀佛一切佛土中的極樂國土是最殊勝的阿彌陀佛初發心時是世自在王門下的出家弟子法藏法藏菩薩願求佛道希望成佛時的國土在一切佛國土中是最理想的世自在王如來為他顯示了二百一十億佛國土唐譯作二十一億宋譯作八十四百千俱胝在這麼多的佛國土中選取最理想的綜合為一從菩薩大行中成就圓滿莊嚴的淨土換言之這不是某一淨土所可及的這是集一切淨土莊嚴的大成所以令我為世雄國土最第一了依菩薩大行而莊嚴佛土成佛也就勝過一切佛如初發大心時說於八方上下諸無央數佛中最尊如來智慧光的殊勝表示身光明第一如說阿彌陀佛光明最尊第一無比諸佛光明皆所不及也阿彌陀佛光明姝好勝於日月之明百千億萬倍諸佛光明中之極明也光明中之極好也光明中之極雄傑也光明中之快善也諸佛中之王也經中廣說諸佛的光明差別極力讚揚阿彌陀佛為諸佛中之王表示了阿彌陀佛第一的意境依佛法說諸佛的法身是平等的而年壽身光國土等是有差別的依大乘佛法說佛與佛是平等的但適應眾生的示現方便是可能不同的這樣阿彌陀佛與極樂淨土的最勝第一雖不是究竟了義說而適應世間印度多神中最高神的世俗心境在為人生善意趣中引發眾生的信向佛道易行方便是有其特殊作用的這可以說到佛的名號阿彌陀其中是無量的意思無數無量佛法是形容涅槃的與阿彌陀音聲相近的阿彌利哆譯義為甘露也是表示涅槃的涅槃現實生死的彼岸佛法是究竟寂滅大乘佛法是畢竟寂滅中起不思議的妙用據大本的古譯本阿彌陀在一切無量中特重於光明的無量所以也名阿彌陀婆也就是無量光佛如往生咒作南無阿彌多婆耶哆他伽多夜南無無量光如來楞嚴咒作南無阿彌多婆耶跢他伽多耶阿囉訶帝三藐三菩陀耶南無無量光如來應正遍知普賢行願品也說速見如來無量光光明與清淨的音相近所以古譯經名為無量清淨平等覺經這都可以看出無量光是阿彌陀無量佛的主要意義這使我們想起了東西二大淨土東方阿閦佛土如旭日東升象徵了菩薩的初發大心廣修六度萬行長劫在生死世間度眾生而歸於成佛入涅槃是重智的西方阿彌陀佛土如落日潛暉不是消失了而是佛光輝耀於那邊彼土彼岸也就是涅槃異名重於佛德的攝受重於信行這所以極樂世界在西方佛告阿難西向拜當日所沒處為阿彌陀佛作禮十六觀中初觀落日見日欲沒狀如懸鼓阿彌陀佛起初是重於無量光的應有適應崇拜光明善神的世俗意義但晉竺法護譯本以下都作無量壽佛了生命的永恒是世間眾生所仰望的所以有長生成仙永生天國的宗教無量光明慧光普照與慈光的攝受對一般信眾來說不如無量壽所以後代都改為無量壽了小本佛說阿彌陀經大正一二三四七上說彼佛何故號阿彌陀舍利弗彼佛光明無量照十方國無所障礙是故號為阿彌陀又舍利弗彼佛壽命及其人民無量無邊阿僧祇劫故名阿彌陀鳩摩羅什的譯本以阿彌陀無量佛為本綜合了無量光明與無量壽命還是無量光在先玄奘譯本及現存梵本以無量壽在先而無量光在後這是適應世俗所起的轉化阿彌陀佛因地發二十四大願或三十六願或四十八願建立清淨莊嚴的佛土生在這佛國中的有種種功德特別是十方世界眾生發願往生阿彌陀佛國的一定能往生極樂當然是有條件的也是有高低的經有三輩往生說各本略有出入如下上去家作沙門作菩薩道奉行六度慈心精進不瞋不貪常念至心不斷絕上捨家作沙門發菩提心修諸功德一向專念無量壽佛發菩提心專念無量壽佛恒殖眾多善根發心迴向願生彼國聞此經典受持讀誦書寫供養晝夜相續求生彼剎中在家布施深信佛語飯沙門起寺塔供養慈心精進齋戒清淨不瞋斷愛一日一夜不斷絕中發無上菩提心一向專念多少修善飯沙門起塔像供養奉持齋戒發菩提心不能專念不種眾多善根隨己修行諸善功德迴向願欲往生發菩提心持戒不犯饒益有情所作善根迴向憶念無量壽佛及彼國土下斷愛欲不瞋怒慈心精進齋戒清淨念欲往生晝夜十日不斷絕下發無上菩提心一向專意乃至十念聞深法信樂不疑乃至一念念於彼佛住大乘清淨心向無量壽佛乃至十念聞深法信樂不疑乃至一念淨心念無量壽佛發十種心十善晝夜思惟極樂國依正莊嚴志心歸依頂禮供養上表所列的是漢吳的古譯二十四願本是晉譯是唐譯都是四十八願本是趙宋譯的三十六願本念阿彌陀佛而往生極樂世界的分上中下三輩人沒有說三輩但顯然也有高下的三類差別依本說上輩是出家的修菩薩道的中輩是在家的廣修供僧建寺起佛塔等供養功德齋戒五戒及八關齋戒清淨的下輩也是在家齋戒清淨的三輩往生的都是不貪不瞋慈心精進的所以分上中下三輩在乎生前的智慧福德不同而戒行清淨卻是一致的本大致與本相同但三輩都是發菩提心的本沒有說到出家與在家三類人中初是發菩提心而廣殖眾多善根的中是多少修善根的後是心住大乘聞深法而信樂不疑的依初後來說中類也應是心住大乘與本相同三類的差別是廣殖善根不廣殖善根少少殖善根的不同本初是對阿彌陀經的受持讀誦書寫供養與念法的易行方便相同中是發菩提心持戒饒益有情的後是行十善的晚出的經本出入很大但總之三輩的高下雖與念佛有關而主要是由於生前的施戒慈慧等德行的不同小本阿彌陀經說不可以少善根福德因緣得生彼國可說是簡化大本所說的金句對於念佛及極樂國土本上輩是常念至心不斷絕中輩是一日一夜不斷絕下輩是一心清淨晝夜常念十日十夜不斷絕中輩一日一夜不斷絕下輩卻是十日十夜不斷絕可能是譯文的不善巧本都是一向專念而下輩說一向專意乃至十念本三類是專念不專念以清淨心向無量壽如來乃至十念與本相同從三輩的次第來說下輩的十念乃至一念比本十晝夜說要合理些本通泛的說晝夜相續憶念晝夜思惟事實上往生淨土品位的高下由於生前的施戒慈慧等功德的不同而念佛多少能往生阿彌陀佛土論理是不能限定時間的如佛說阿彌陀經大正一二三四七中說善男子善女人聞說阿彌陀佛淨土的依正莊嚴執持名號若一日若二日若三日若四日若五日若六日若七日一心不亂其人臨命終時即得往生阿彌陀佛極樂國土念佛而能往生極樂淨土是要專念繫念的而時間不一定若是不定詞也許一日夜或者二日三日能念到一心不亂心不散亂的意思就能臨終往生事實上有的一日半日就可以有的一年十年了還是不能心不散亂總之以念得心不散亂為往生西方極樂國土的主要條件而往生品位的高下以生前的德行而差別念是憶念繫念念為定所依心不散亂雖還不是達到禪定但念到心無二用淨念相續心中唯有阿彌陀佛極樂國土的一念了念是內心的憶念繫念可通於稱名觀相並不等於我國佛弟子所想像的口念因而造了個唸字然口稱佛名內心同時憶念依稱名而導入心不散亂那就是稱名念佛而可以往生極樂了大本阿彌陀經的專念憶念是不限於稱名念佛的小本阿彌陀經說執持名號名號的梵語為所以是重於稱名念佛的不知為什麼玄奘譯為思惟也許是不滿當時提倡的口頭散心念佛而故意改為思惟吧依上來所說可見一心念乃至十念是內心不散亂的念王日休編寫的大阿彌陀經說下輩每日十聲念佛專在稱名的數目上著想那是中國佛教的習俗與印度的大乘佛法不合第二節往生淨土的抉擇這裡要論究幾個問題一往生極樂國土的有沒有聲聞與緣覺二乘世親的無量壽優波提舍願生偈說女人及根缺二乘種不生這是依三十六願本說的如說我得菩提成正覺已所有眾生令生我剎雖住聲聞緣覺之位往百千俱胝那由他寶剎之內遍作佛事悉皆令得阿耨多羅三藐三菩提這是說極樂國土中現住聲聞緣覺位的到處去作佛事是一定要成佛的然四十八願本中雖說到沒有女人與六根殘缺不全的卻明白說極樂世界的聲聞與緣覺數量是多得難以了知的在古譯二本中處處說到諸菩薩阿羅漢經說出入不同是淨土思想的先後不同早期的大乘經說大乘法而含容二乘如般若經為諸菩薩摩訶薩眾宣示般若波羅蜜多又說或聲聞地或獨覺地或菩薩地皆於般若波羅蜜多應常聽聞如說修行佛說舍利弗悔過經是大乘的易行道而經上說欲求阿羅漢道者欲求辟支佛道者欲求佛道者都應日夜六時向十方佛懺悔隨喜勸請而迴向眾生成佛道發願往生極樂淨土是大乘法卻又說極樂國有無量無數阿羅漢從佛法發展史來說這是大乘佛法初興傳統的聲聞教團強固所以採取含容二乘的立場阿羅漢是究竟的但也應學習大乘淨土中也有阿羅漢等到大乘佛法興盛信眾增多那就要說二乘不究竟二乘不生淨土再就二乘也要迴心成佛了對於淨土中的阿羅漢要解說為佛菩薩的示現了這樣遲出些的四十八願本說三輩往生都是發菩提心的阿彌陀經說欲生阿彌陀佛國者是諸人等皆得不退轉於阿耨多羅三藐三菩提是合於大乘淨土法門發展傾向的第二問題是有罪業的能不能往生淨土約現生說從少到老人那裡會沒有過失呢善業與不善業一直是不善業強就墮落善業強就上升在此消彼長此長彼消的狀況中古譯二本似乎沒有提到這一問題只是通泛的說五戒十善說要有怎樣淨善功德依功德而分三輩往生的高下佛法一向說有業障是障礙佛法進修的所以四十八願的晉譯本說至心信樂欲生我國乃至十念若不生者不取正覺唯除五逆誹謗正法唐譯本作唯除造無間惡業誹謗正法及諸聖人五逆即五無間罪是佛法所稱為業障的大乘佛法興起說誹謗大乘正法的罪業極重極重隋唐所譯經本每增列誹謗聖者依四十八願本說造五無間罪及誹毀大乘的即使發心念佛也為惡業所礙而不能往生但觀無量壽經說三品九生下品三生都是造有惡業的下品上生是作眾惡業而不謗大乘的下品中生是毀犯五戒八戒及具足戒如此愚人偷僧祇物盜現前僧物不淨說法無有慚愧以諸惡業而自莊嚴下品下生是作不善業五逆十惡具諸不善這樣的惡業重大也有往生淨土的可能從所犯的罪業來說是聲聞佛教所說的罪業就是一向不知或不信佛法或知有佛法而不知有大乘佛法者所作的惡業所以命欲終時遇善知識在最迫切的重要關頭知道大乘淨土法門就能至心歸向不墮落而往生極樂佛法不是也說濫殺行人的惡賊鴦掘魔羅一聞佛法就證入聖果嗎如平時知道阿彌陀佛知道往生極樂以為只要信仰不分持戒犯戒作善作惡依阿彌陀佛的悲願都可以往生極樂那是顛倒解義自誤誤人了三念佛能否即生往生如稱揚諸佛功德經說其有執持斯佛名者復勸他人令使誦持增益功德必當得往生此佛國求最正覺立不退轉疾成不久執持佛名號的易行法門主要能懺除罪業得陀羅尼往生清淨佛土不退轉於無上菩提念佛名號而求生淨土在大乘佛法中可說是十方一切佛所共的重信心的大乘易行道經典不少流通極廣到底為了什麼大乘佛法主流是甚深廣大的菩薩道菩薩發大菩提心凡是有利於眾生的沒有不能施捨的沒有不能忍受的菩薩行難行大行而能歷劫在生死中利益眾生菩薩實在太偉大了但由於法門是甚深難行眾生的根性又是怯劣的多所以嚮往有心而苦於修行不易深感自己的業障深重即使發心修行也容易退失這所以有念佛方便的易行道如十住毘婆沙論所說寶月童子所問經的十方佛名還有阿彌陀等佛及諸大菩薩稱名一心念亦得不退轉這樣的稱十方佛及菩薩名一心念就能得不退轉嗎求阿惟越致不退轉地者非但憶念稱名禮敬而已復應於諸佛所懺悔勸請隨喜迴向能行如是懺悔勸請隨喜迴向福德力轉增心亦益柔軟即信佛功德及菩薩大行由此能引發悲心慈心進而能修行施戒等波羅蜜菩薩的大行難行龍樹的十住毘婆沙論立難行與易行二道然所說的易行道是通於諸佛菩薩的有二行差別而終歸於菩薩道的正方便六度等難行大行無著的攝大乘論立四種意趣解說經說的意趣所在第二別時意趣謂如說言若誦多寶如來名者便於無上正等菩提已得決定又如說言由唯發願便得往生極樂世界世親解說別時意趣為謂此意趣令嬾惰者由彼彼因於彼彼法精勤修習彼彼善根皆得增長此中意趣顯誦多寶如來名因是昇進因非唯誦名便於無上正等菩提已得決定如有說言由一金錢得千金錢豈於一日意在別時由一金錢是得千因故作此說此亦如是由唯發願便得往生極樂世界當知亦爾這是說由稱名發願能得不退轉能往生極樂國是說由此為因展轉增長才能達到而不是說稱名發願就已得決定已能往生這一解說與龍樹十住毘婆沙論所說易行道展轉引入六度大行的菩薩道意趣相合不過十住毘婆沙論說佛法有無量門如世間道有難有易陸道步行則苦水道乘船則樂菩薩道亦如是或有勤行精進的難行或有以信方便易行疾至阿惟越致分明的說有二道差別大智度論也說菩薩有二種一者有慈悲心多為眾生二者多集諸佛功德樂多集諸佛功德者至一乘清淨無量壽世界好多為眾生者至無佛法眾處讚歎三寶之音這也分明說菩薩有二類一是慈悲心多為眾生的多去沒有佛法處化導成佛也就願意在穢土一是樂集佛功德的就如往生極樂見阿彌陀佛的一類所以易行道應有通別二類在通泛的稱十方佛阿彌陀等名外更有特殊的易行道就是念佛發願往生極樂的法門大乘起信論大正三二五八二上五八三上也這樣說若人雖修行信心以從先世來多有重罪惡業障故有如是等眾多障礙是故應當勇猛精勤晝夜六時禮拜諸佛誠信懺悔勸請隨喜迴向菩提眾生初學是法欲求正信其心怯弱以住於此娑婆世界自畏不能常值諸佛親承供養懼謂信心難可成就意欲退者當知如來有勝方便攝護信心謂以專意念佛因緣隨願得生他方佛土常見於佛永離惡道如修多羅說若人專念西方極樂世界阿彌陀佛所修善根迴向願求生彼世界即得往生常見佛故終無有退所引大乘起信論文的前一段為了消除修行過程中的障礙修禮佛懺悔隨喜勸請迴向合於念佛等能消多少劫罪業的經說依此而能信心成就進修六度等與十住毘婆沙論的易行道完全同一意趣但在佛前懺悔等也可為往生極樂國的方便如普賢行願品的十大願導歸極樂這是一般大乘經義通於念一切佛也通於念阿彌陀佛依大乘通義大品般若經說十方如恒河沙等世界中眾生聞我佛名者必得阿耨多羅三藐三菩提欲得如是等功德者當學般若波羅蜜廣博嚴淨不退轉輪經說若有眾生已聞今聞當聞釋迦牟尼佛名者是諸眾生皆於阿耨多羅三藐三菩提不退轉所說的不退轉是彼諸眾生種菩提種子漸次增長當成阿耨多羅三藐三菩提而不腐敗不可毀壞與攝大乘論的別時意趣相合也就是念佛不退轉的一般意義大乘起信論文的後一段念阿彌陀佛往生極樂世界與從易行而引入難行菩薩道不同是特殊的易行道阿彌陀佛因地發願令我為世雄國土最第一其眾殊妙好道場踰諸剎極樂的國土可以適應其心怯弱懼謂信心難可成就的眾生因為生到極樂一定不退阿耨多羅三藐三菩提心依此世親造無量壽優波提舍願生偈立五念門往生極樂而淺深不同第三作願門是一心專念作願生彼修奢摩他寂靜三昧行那是與定相應的念佛第二讚歎門是稱如來名依如來光明想修行與第一禮拜門雖沒有得定也一定心不散亂如讚歎門已修如來光明想勝解觀了第四觀察門是智慧相應的從事相觀到第一義諦妙境界由於修行不同往生極樂也淺深不同無量壽優波提舍願生偈比喻為近門大會眾門宅門屋門園林遊戲地門試為比喻如從前帝都的北京到北京是一樣的而境地大大不同進了外城就是到了北京但比城外好不了多少進了內城只見街市繁盛到處是官署官員的住宅再進入紫禁城才見到皇帝大臣們在這裡朝儀帝皇的住處還在內宮往生極樂也這樣生極樂國是一樣的而境界不同所以有三輩等差別二十四願古本在中輩與下輩有念佛而信心不大堅定的如臨終悔過那麼在阿彌陀佛國界邊自然七寶城中於七寶水池蓮華中化生要經五百歲不知極樂的一歲等於人間的多少時劫才到極樂國見佛四十八願本說信心不大堅定而悔過的是胎生的三十六願本否定淨土有胎生的存在這是經典在流傳中的演變是不必要會通的菩薩處胎經稱之為懈慢國欲生阿彌陀佛國者皆染著懈慢國土不能前進生阿彌陀佛國億千萬眾中時有一人能生阿彌陀佛國往生極樂竟是那樣的難這是為一般厭惡穢土想在淨土中享樂的懈慢眾生作當頭棒喝往生極樂國是殊勝的易行道不是為了享受安樂而是修習佛道在那邊修行不會退落一定能得不退如阿彌陀佛為大眾廣說道智大經諸菩薩皆悉卻坐聽經聽經竟即悉諷誦通利重知經道益明智慧不斷的上進阿彌陀佛經說晝夜六時出和雅音其音演暢五根五力七菩提分八聖道分如是等法其土眾生聞是音已皆悉念佛念法念僧往生極樂國土是為了精進修菩薩道淨土中沒有障礙而容易修行所以是易行道如以為往生極樂就永遠享福或以為一生極樂生死已了或者想像為往生即是成佛以往生極樂為目的而不知從此正好修行這些誤解往生極樂的還能說是大乘的巧方便嗎第六章念佛及菩薩三昧第一節通三乘的念佛觀六隨念之一的念佛是佛法中重信的方便道在佛弟子對佛的永恒懷念中適應信眾崇敬的心理特別發達起來如念佛滅罪念佛往生淨土念佛不退菩提心經典紛紛傳出念佛功德不斷的強化然念佛法門不限於信也不限於持名本可以引向甚深智證的這就是修念佛三昧所以觀佛三昧海經說欲繫念者欲思惟者欲行禪者欲得三昧正受者都要觀佛念佛是繫念佛而得三昧定的修行為了說明念佛三昧先要說到學佛法而解脫生死或修菩薩道而成佛都不離般若慧的證悟法性沒有勝義觀慧的修證是決不能成就的修學位名般若證果時名菩提這是佛法的心要但慧是不離禪定的釋尊所開示的正定主要是四禪禪定與生理有關是世間所共的這是修行者所應該知道的初學者修定依此而進觀勝義的方便釋尊初說不淨念不淨觀出家眾首制淫欲從對治制伏貪欲煩惱來說不淨觀是最有力的方便但世間是緣所起法有相對性如不能適當的應用會引起副作用的不淨觀也不例外經律一致的說到釋尊讚歎不淨觀比丘們依著修行引起了嚴重的厭惡自身結果有六十位比丘都自願的被殺而死這樣釋尊才為比丘們別說安那般那念數息觀從一切依緣起來說修息而不能恰如其分當然不會厭身自殺但也會有副作用的不淨觀與數息觀古稱入道的二甘露門或加四或六界差別念界分別觀名為三度門其實由於眾生的根機不一煩惱各有偏重雜阿含經已說到四類有比丘修不淨觀斷貪欲修慈心斷瞋恚修身無常想斷我慢修安那般那念斷覺想尋思修行道地經綜合為五種對治如說行者情欲熾盛為說人身不淨瞋怒而熾多者為說慈心設多愚癡當觀十二因緣設多想念尋思則為解說出入數息設多憍慢為說此義為憍慢者所說的就是界差別達摩多羅禪經說安那般那不淨界又附說慈等四無量心三昧等修行道地經所說的五種對治也就是瑜伽師地論的五種淨行所緣鳩摩羅什於西元五世紀初來華傳出的坐禪三昧經卷上大正一五二七一下說若多婬欲人不淨法門治若多瞋恚人慈心法門治若多愚癡人思惟觀因緣法門治若多思覺尋思人念息法門治若多等分人念佛法門治曇摩蜜多西元四四二卒劉宋元嘉年西元四二四來華傳出的五門禪經要用法也列舉坐禪三昧經的五門但說若心沒者教以念佛五門禪與修行道地經的差別是以念佛代界分別這已進入大乘佛法而還沒有忘失佛法固有的方便不淨觀引起了副作用釋尊別說數息觀但不淨觀有對治貪欲的作用仍為佛弟子所修習只是別出方便就是從不淨觀而轉入淨觀如八解脫八勝處十遍處八解脫八勝處十遍處內有色想觀外色少內有色想觀外色內有色想觀外色多內無色想觀外色少內無色想觀外色內無色想觀外色多地遍處水遍處火遍處風遍處淨解脫身作證內無色想觀外色青青遍處內無色想觀外色黃黃遍處內無色想觀外色赤赤遍處內無色想觀外色白白遍處空無邊處空遍處識無邊處識遍處無所有處非想非非想處想受滅身作證不淨觀與淨觀都是以色法為所緣境的八解脫的前二解脫是不淨觀第三淨解脫是淨觀八勝處的前四勝處與八解脫的前二解脫相當是不淨觀後四勝處觀青黃赤白是淨觀後二是無色處是阿含經所說的不淨觀主要是青瘀膿爛等九想或作十想末後是骨鏁從骸骨不淨而轉起淨觀是從白骨流光而轉淨的如達摩多羅禪經卷下大正一五三一六中下說於身起淨想不淨觀對治不求止貪欲思惟習厭患更有淨對治不作厭患想方便淨解脫智者開慧眼謂於不淨緣白骨流光出從是次第起青色妙寶樹黃赤若鮮白枝葉花亦然上服珠瓔珞種種微妙色是則名修行淨解方便相於彼不淨身種種莊嚴現此則淨解脫方便不淨觀有的修不淨觀不著意於離貪欲只是厭患自身這就是觀不淨而自殺的問題所在所以修淨觀來對治從白骨流光觀器世間青黃赤白與自身清淨莊嚴就是淨解脫從不淨而轉起淨觀名為改易觀如禪祕要法經說不淨想成時慎莫棄身自殺當教易觀易觀法者想諸骨節間白光流出其明熾盛猶如雪山見此事已前不淨聚夜叉吸去見此事時心大驚怖求易觀法易觀法者先觀佛像思惟要略法也說若極厭惡其身當進修白骨觀亦可入初禪從不淨觀而起淨觀的方便是白骨流光依正莊嚴或觀佛像這是佛法禪觀而漸向大乘佛法禪觀的重要關鍵禪定的五方便本是佛法而流行於西北印度的禪法念佛取代界差別而為五門的一門可見念佛在這一地區的盛行也可見佛法與大乘佛法的關涉傳於中國的禪法起初是大瑜伽師僧伽羅叉的禪集修行道地瑜伽行地的古譯經西元四三四五五年間譯師們傳譯了好多部如坐禪三昧經二卷姚秦鳩摩羅什譯禪法要解二卷姚秦鳩摩羅什譯思惟略要法一卷姚秦鳩摩羅什譯禪祕要法經三卷姚秦鳩摩羅什譯達摩多羅禪經二卷東晉佛陀跋陀羅譯佛說觀佛三昧海經一卷東晉佛陀跋陀羅譯五門禪經要用法一卷劉宋曇摩蜜多譯治禪病祕要經二卷劉宋沮渠京聲譯這幾部是部派佛法禪觀而含有大乘佛法禪觀的成分或是大乘禪觀而通於佛法代表了西元二三世紀來的西北印度的禪法鳩摩羅什所譯的一坐禪三昧經如僧叡關中出禪經序說初四十三偈是鳩摩羅羅陀童受法師所造後二十偈是馬鳴菩薩之所造也其中五門是婆須蜜世友僧伽羅叉眾護漚波崛近護僧伽斯那眾軍勒脇比丘馬鳴鳩摩羅羅陀禪要之中抄集之所出也菩薩習禪法中後更依持世經益十二因緣一卷要解二卷別時撰出僧叡序的內容正是坐禪三昧經這是集各家的禪要而附入菩薩習禪法二禪法要解是說一切有部的禪法末後的五神通依大乘法說三思惟要略法先舉五門特明菩薩求佛道的大乘觀法四禪祕要法經內容為如來初為迦絺羅難陀說不淨門為禪難提比丘說數息法為阿祇達說四大觀這還是不淨數息界三度門但內容繁重風格與觀佛三昧海經相近數息觀前有念佛三昧四大觀有點雜亂所說的數息一數二隨三數四隨等與羅什所傳的數息不合這可能是曇摩蜜多失傳的禪祕要佛陀跋陀羅是著名的禪師所譯的一達摩多羅禪經題名不妥當應作修行方便禪經為說一切有部的禪法本是安般不淨界偈頌集在後附的長行中觀緣起見佛已通於大乘了二觀佛三昧海經觀佛的相好取華嚴經意觀像品第九觀七佛品第十通於聲聞的念佛觀曇摩蜜多所譯五門禪經要用法傳為大禪師佛陀蜜多撰佛陀蜜多傳說是世親的師長然這部禪經性質是纂集所成的佛陀蜜多撰的可能指觀佛三十事慈心觀二十事說的沮渠京聲譯的治禪病祕要經是對治禪病的方便在這幾部禪法中念佛是以念佛色身為主的如觀佛三昧海經說得此觀者名佛現前三昧亦名念佛三昧亦名觀佛色身三昧觀佛色身相好可說是大乘佛法的特色但在部派佛教中大眾部說佛身無漏有念佛色身的可能增壹阿含經卷二大正二五五四上中說比丘正身正意結跏趺坐繫念在前無有他想專精念佛觀如來形未曾離目已不離目便念如來功德如來體者金剛所成十力具足四無所畏在眾勇健如來顏貌端正無雙視之無厭戒德成就猶如金剛而不可毀清淨無瑕亦如琉璃如來三昧如來慧身如來身者解脫成就如來身者度知見城有解脫者無解脫者皆具知之增壹阿含經屬於大眾部的末派所傳經中所說的念佛是總說佛身與功德是金剛身與十力四無所畏是佛相端嚴與戒定慧解脫解脫知見功德法身這樣的念佛比起大乘佛法的念佛色身還相當的古樸也就因此禪法中的念佛也還有通於聲聞的意義如達摩多羅禪經觀緣而入正受等至見佛光明普照的境界有聲聞境界辟支佛境界菩薩境界諸佛境界的淺深不同五門禪經要用法一心念佛從額上出現佛像去而復還的遠與近見諸佛從心而出出而還入的不同分別是聲聞人是辟支佛人或大乘人當然禪法中的念佛色身三昧是大乘佛法的各部禪經所說的念佛三昧多少有些不同這是廣略不一修行瑜伽者的修驗與傳承不一然從修行的次第來說仍有一致性鳩摩羅什的思惟要略法分為觀佛三昧法這實是總名生身觀法法身觀法十方諸佛觀法坐禪三昧經中治等分的念佛法門雖廣略不同而內容與次第是一致的五門禪經要用法將思惟要略法的這一部分全部纂集進去依此來觀察禪祕要法經的念佛三昧觀佛三昧海經所說也不外乎這一次第念佛三昧的修習次第依思惟要略法先觀佛像佛涅槃以後不見佛的色身經上雖說佛有三十二相但不容易憶念到明明了了的見佛形相自繪畫的木石等造的佛像流行有佛的具體形相可以憶念思惟念佛觀就盛行起來所以修念佛法門要先觀佛像好先從肉髻眉間白毫下至於足從足復至肉髻三十二相及八十種好如印象明了然後一心觀佛閉目思惟繫心在像觀像而心得安住能開目閉目坐臥行步常得見佛進一步觀生身當因於像以念生身念佛在菩提樹下成佛鹿野苑轉法輪等隨用一處繫念在緣這與觀像不同生身觀是觀釋尊在世的具體活動所以坐禪三昧經作初生出家勤苦行菩提樹下成等正覺觀視道樹初轉法輪再進而念法身已於空中見佛生身當因生身觀內法身十力四無所畏大慈大悲無量善業如人先念金瓶後觀瓶內摩尼寶珠功德法身是不離色身的與說一切有部等生身以外說佛無漏功德法身是不同的沒有說法性為法身佛像觀生身觀法身觀都是依釋尊而起的憶念思惟再進觀十方諸佛這要從東方的一佛二佛漸漸增多到無量佛然後觀東南方南方一直到現見十方諸佛從觀像到觀十方佛是念佛三昧的次第進修依坐禪三昧經生身觀時就進念十方佛生身念佛功德法身後再念諸佛功德法身禪祕要法經分為觀像佛與真佛觀像佛從一佛像增多到鐵圍山內充滿佛像從坐像到行像臥像到釋尊入大涅槃這可見禪祕要法經的觀像是通於像佛及生身的真佛是不離色身而內有金剛功德法身觀佛三昧海經篇幅很長觀相品第三起觀四無量心品第五止是觀佛相的觀像觀四威儀品第六中舍衛城度老母上忉利天為母說法下忉利天見金佛像至曠野澤降伏散脂鬼大將到那乾訶羅化毒龍留影到拘尸那降力士如來臥入涅槃與生身觀的性質相同觀馬五藏相品第七那是因為佛像沒有馬陰藏相所以特立這一品本行品第八明一切佛的身相功德都是依觀佛相好而來的觀佛三昧經多採取傳說主題到此可說已告結束此下的觀像品第九念七佛品第十念十方佛品第十一及觀佛密行品第十四可說是扼要的重說便於一般人的實際修持像觀先要用眼去審細的觀佛形相如思惟要略法大正一五一九九上說人之自信無過於眼當觀好像便如真佛無異先從肉髻眉間白毫下至於足從足復至肉髻如是相相諦取還於靜處坐禪三昧經也這樣說至佛像所諦觀佛像相好相相明了一心取持還至靜處諦觀佛像相好明了是用眼來審細觀察留下極深刻的印象其他禪經雖沒有說到但這是必要的如觀佛三昧海經說觀白毫光闇黑不現應當入塔觀像眉間一日至三日若坐不見佛眼當入塔觀若不見佛耳者如前入塔諦觀像耳一日至十四日若不能見胸相分明者入塔觀之這樣的一再說到入塔觀像那時的佛像多數是供奉在佛塔中的先以眼取佛像相好然後到靜處去閉目憶念觀像如不見也就是不能明見像相那麼再到塔裡去觀佛像相大寶積經的摩訶迦葉會說若於疊上牆壁之下造如來像大精進菩薩持畫疊像入於深山在畫像前結跏趺坐正身正念觀於如來這都是用眼來諦觀佛像的明證特別在牆壁之下造像是為了適合靜坐平視觀佛的諦觀像相明了以後要觀佛像了如坐禪三昧經說還至靜處心眼觀佛像令意不轉繫念在像不令他念心眼觀是心如眼那樣的觀像是閉目的觀念依佛說觀佛三昧海經卷九大正一五六九下說結加趺坐繫念一處隨前眾生繫心鼻端或繫心額上或繫心足指如是種種隨意繫念專置一處勿令馳散使心動搖心若動搖舉舌拄顎閉口閉目叉手端坐一日至七日令身安隱身安隱已然後想像依此在觀像前先要靜坐使身心安隱如平常靜坐而身心安定的當然不必用這一準備了說到正觀佛像有逆觀與順觀逆觀者從足逆觀乃至頂髻順觀者從頂至足觀佛三昧海經也這樣說如是逆觀順觀往返凡十四遍諦觀一樣極令了了觀一像成已出定入定恒見立佛在修行者前然後觀二像三像等一直要觀到心眼見佛像三十二相光明如眼所見無有異也如是心住是為得觀像定觀念佛三昧要先修像觀像觀成就再進修生身法身十方佛古代的進修次第如此念佛三昧的修習與不淨觀地遍處等相同都是先以眼取相分明然後閉目垂簾憶念觀想起初是先觀一相然後擴大如從一骨到骨骸處處從一佛到佛像遍滿等這是勝解作意也就是平常說的假想觀勝解作意的念佛達到能見一佛作十方佛能見十方佛作一佛見一切諸佛來入一佛身中正遍知諸佛心智無有限礙我今禮一佛即禮一切佛若思惟一佛即見一切佛從臍出一一佛還入人臍這是從觀念中達到一切佛即一佛一佛即一切佛從自身出佛佛入自身的境界這不只是理論化的玄談在印度是修勝解觀而呈現於自心的念佛三昧的修習是與易行道懺悔等相結合的如佛說觀佛三昧海經卷九大正一五六九一上說至心求大乘者當行懺悔行懺悔已次行請佛說法住世行請佛已次行隨喜行隨喜已次行迴向行迴向已次行發願行發願已正身端坐繫念在前觀佛境界令漸廣大在觀佛像達到一室內滿中佛像時就要行懺悔請佛隨喜迴向發願也就是天台家所說的五悔法其實以懺悔為中心的念佛三品的行法與念佛觀深切相關在開始欲觀像者先入佛塔以好香泥及諸瓦土塗地令淨隨其力能燒香散華供養佛像說己過惡禮佛懺悔如是伏心經一七日復至眾中塗掃僧地除諸糞穢向僧懺悔禮眾僧足復經七日然後靜坐如觀佛不明了或光色不顯不說是自己的煩惱散亂修持不善巧而認為自己的過去罪業就誠懇的禮佛懺悔思惟要略法也說若宿罪因緣不見諸佛者當一日一夜六時懺悔隨喜勸請漸自得見禪祕要法經說晝夜六時懺悔諸罪念佛三昧與易行道的念佛三品相結合與重信的六念法門也見到了關係如佛說觀佛三昧海經卷六大正一五六七四中六七五上說諸佛心者是大慈也一一化佛讚說不殺讚歎念佛讚歎念法讚歎念僧讚歎念戒讚歎念施讚歎念天讚六和敬讚慈三昧如此六念能生善法此六念者是諸佛因佛心者是六念心因六和敬而得此法欲成佛道當學佛心從觀佛身相而觀佛心佛心是以大慈為本的而慈心又是從六念為因而生起的這樣成佛應學佛心學佛心應學六念六念是以念佛為先的所以菩薩法者唯有四法何等為四一者晝夜六時說罪懺悔二者常修念佛不誑眾生三者修六和敬心不恚慢四者修行六念如救頭然這些就是重信菩薩所修行的上文說過念佛能滅罪稱名以外主要是觀佛相好的念佛三昧如禪秘要法經說未來眾生罪業多者為除罪故教使念佛此名觀像三昧亦名念佛定復名除罪業貪婬多者先教觀佛令離諸罪然後方當更教數息鳩摩羅什所傳的五門念佛是治貪瞋癡尋思等分的但末了也說是名念佛三昧除滅等分及餘重罪在觀佛的種種相中觀白毫相的功德最大如觀佛三昧海經說能須臾間念佛白毫令心了了除却九十六億那由他恒河沙微塵數劫生死之罪設復有人但聞白毫心不驚疑歡喜信受此人亦除却八十億劫生死之罪眾生的罪業真重觀佛見佛的功德真大觀佛色身的念佛三昧成為大乘佛法的一大方便這本從大眾部系而來傳入西北印度及各地顯然的受到部派佛教者所採用成為五門禪法之一五門禪是初學禪法者的對治方便所以坐禪三昧經說行者修五門雖得一心定力未成猶為欲界煩惱所亂當作方便進學初禪念佛者令無量劫重罪微薄得至禪定念佛三昧是可通於聲聞乘的如禪秘要法經說聞佛說此觀佛三昧成阿羅漢觀佛三昧海經也有成阿羅漢的記錄悉於毛端了了得見見已歡喜有發無上菩提心者有發聲聞緣覺心者第二節大乘的念佛三昧上文所說的念佛三昧從佛像觀生身觀功德法身觀到十方佛觀是從釋尊的像與生身觀開始的部分的聲聞瑜伽者作為五門禪的一門那只是修禪的方便所以上文所說的是在大乘佛法流行中部派佛教採用大乘念佛的意義如專依大乘佛法來說念佛三昧那就應重於念過去現在十方佛及大菩薩的三昧大乘佛法中經典眾多內容真可說廣大無邊但扼要的來說甚深極甚深難通達極難通達的是智證的甚深行菩薩的悲願無限無數億劫在生死中利益眾生是難行苦行適應一般信增上的施設的易行道是方便行適應不同的菩薩根性法門的風格也就不同但佛是無所不在無所不知無所不能究竟寂滅而德相無邊大用無方卻是大乘佛法所共通的重於現在十方佛多數經典仍說釋迦佛但佛的德相也多勝過人間的釋迦如般若經說世尊在師子座上坐於三千大千國土中其德特尊光明色像威德巍巍遍至十方如恒河沙等諸佛國土譬如須彌山王光色殊特眾山無能及者理想的佛陀觀成為大乘佛法的通義所以甚深廣大的菩薩道也要說到超越的佛陀觀而不只是信願增上的大乘行如大本阿彌陀經說阿難西向拜當日所沒處為阿彌陀佛作禮以頭腦著地言南無阿彌陀三耶三佛檀阿難未起阿彌陀佛便大放光明威神則遍八方上下諸無央數佛國即時阿難諸菩薩阿羅漢等諸天帝王人民悉皆見阿彌陀佛及諸菩薩阿羅漢國土七寶莊嚴道行般若經說持釋迦文佛威神一切大眾悉見阿閦佛及見諸比丘不可計皆阿羅漢諸菩薩亦無央數重信的阿彌陀經大眾現見西方的阿彌陀佛菩薩等及國土的莊嚴重智證的般若經大眾見到東方的阿閦佛與菩薩等這二部是西元一世紀傳出的聖典雖用意不同而都現見了他方世界的現在佛與菩薩法華經中過去的多寶佛塔涌現在空中多寶佛的全身不散並出聲讚歎釋迦牟尼佛快說是法華經我為聽是經故而來至此華嚴經入法界品中安住毘瑟底羅居士常供養栴檀佛塔開塔時得佛性三昧見過去以來的一切佛法華經與華嚴經都說到開塔見過去佛意味著佛壽無量不是二乘那樣畢竟涅槃的無論是重信的重智的見現在佛或開塔見過去以來的佛初期大乘經的現見佛陀是一致的大乘佛法的念佛見佛主要是般舟三昧般舟三昧的意義是現在佛悉立在前的三昧是專念現在佛而佛現前的三昧專明般舟三昧的般舟三昧經漢譯的現存四部一般舟三昧經的三卷本一六品二一卷本八品這二部都題為後漢支婁迦讖譯應與竺佛朔有關三古代失譯的拔陂菩薩經一卷四隋闍那崛多譯的大方等大集經賢護分五卷一七品漢光和二年西元一七九譯出的般舟三昧經受到初期大乘的非常重視如龍樹的大智度論再三的提到般舟三昧十住毘婆沙論自念佛品第二十到助念佛三昧品第二十五就是依般舟三昧經而說的這部經也有先後不同本的糅合情形如一心念若一晝夜若七日七夜過七日以後見阿彌陀佛與阿彌陀經說相近又說不得臥出三月如指相彈頃三者經行不得休息不得坐三月除其飯食左右能疾得般舟三昧為後世三月修般舟三昧的依據般舟三昧的修習如十住毘婆沙論卷一二大正二六八六上中說新發意菩薩應以三十二相八十種好念生身佛如先說轉深入得中勢力應以功德法身念佛心轉深入得上勢力應以實相念佛而不貪著未得天眼故念他方世界佛則有諸山障礙是故新發意菩薩應以十號妙相念佛以緣名號增長禪法當知得成般舟三昧菩薩成此三昧已如淨明鏡自見面像如清澄水中見其身相初時隨先所念佛見其色像見是像已後若欲見他方諸佛隨所念方得見諸佛無所障礙論文所說的念佛生身法身與五門禪中的念佛相同修習大乘的念佛三昧主要是念諸佛三十二相八十種好莊嚴其身比丘親近諸天供養為諸大眾恭敬圍繞專心憶念取諸佛相但初學者沒有天眼是不能見他方佛的也就不容易取相修習所以初學者念如來應正等覺等十號也就與佛法六念中的念佛相同這樣念佛三昧的修習有念佛十種德號念佛生身念佛法身念佛實相四類也可說是次第的增進大智度論說到六念中的念佛有二一念如來等十號念佛三十二相八十隨形好念佛戒具足解脫知見具足念佛一切知十八不共法等功德這與念佛的十號生身法身相同二般若的實相念佛無憶思惟故是為念佛而無憶無念的念佛是色等五陰三十二相及隨形好戒眾解脫知見眾十力四無所畏四無礙智十八不共法大慈大悲十二因緣法這一切都無自性自性無所有所以無所念是為念佛佛的生身以五陰和合為體所以觀五陰無所有經說見緣起即見法見法即見我佛所以觀緣起因緣惟有般若的離相無所有才真能見佛之所以佛的但實相念佛是於生身法身等而無念無思惟的所以般若的無所念是為念佛與念色身法身等是不相礙的如中本般若大品的菩薩般若已說到念無量國土諸佛三昧常現在前了修般舟三昧的歷程如大方等大集經賢護分卷二大正一三八七六上中說善男子善女人等若欲成就菩薩摩訶薩思惟一切諸佛現前般舟三昧亦復如是其身常住此世界中暫得聞彼阿彌陀如來應供等正覺名號而能繫心相續思惟次第不亂分明覩彼阿彌陀佛是為菩薩思惟具足成就諸佛現前三昧因此三昧得見佛故遂請問彼阿彌陀佛言世尊諸菩薩等成就何法而得生此佛剎中耶爾時阿彌陀佛語是菩薩言若人發心求生此者常當繫心正念相續阿彌陀佛便得生也時彼菩薩復白阿彌陀佛言世尊是中云何念佛世尊精懃修習發廣大心得生此剎耶賢護時彼阿彌陀佛復告彼言諸善男子若汝今欲正念佛者當如是念今者阿彌陀如來應供等正覺明行足善逝世間解無上士調御丈夫天人師佛世尊以上德號具有如是三十二相八十隨形好以上色身身色光明如融金聚具足成就眾寶輦轝以上法身放大光明坐師子座沙門眾中說如斯法其所說者謂一切法本來不壞亦無壞者乃至不念彼如來亦不得彼如來彼作如是念如來已如是次第得空三昧以上實相善男子是名正念諸佛現前三昧也無論在家的出家的聽說西方阿彌陀佛就一心念念到現見阿彌陀佛見到了阿彌陀佛就問怎樣才能往生阿彌陀佛國土應怎樣的念佛經文含有四種念佛與十住毘婆沙論說相合念十號是稱名憶德的念佛三十二相等是念色身佛色身光明如融金聚具足成就眾寶輦轝是念佛法身鳩摩羅什的思惟要略法說當因生身觀內法身十力四無所畏大慈大悲無量善業如人先念金瓶後觀瓶內摩尼寶珠所以法身尊妙神智無比無遠無近無難無易無限世界悉如目前無有一人在於外者一切諸法無所不了拔陂菩薩經也這樣說紫磨金色身如淨明月水精珠身譬如眾寶所瓔珞念功德法身大乘是不離色身的只是無量功德所莊嚴色相光明清淨廣大無礙顯出佛身的無所不在佛智的無所不了不是聲聞行者那樣離色身而念佛功德法的所說一切法本來不壞等是念佛實相在念佛三昧中能見佛與佛問答這種瑜伽行者的修驗是佛法到祕密大乘佛法所一致的修行者從三昧起出定對於定中境界進一步觀察如大智度論卷二九大正二五二七六中下依經文說從三昧起作是念言佛從何所來我身亦不去即時便知諸佛無所從來我亦無所去復作是念三界所有皆心所作何以故隨心所念悉皆得見以心見佛以心作佛心即是佛心即我身心不自知亦不自見若取心相悉皆無智心亦虛誑皆從無明出因是心相即入諸法實相所謂常空這段經文為瑜伽行者的三界唯心萬法唯識說所本定中見到了佛聽到佛的說法但修行者並沒有到佛國去佛也沒有到這裡來見佛與聽佛說法都只是自己定心所現的對於定中見佛與佛問答般舟三昧經列舉了夢喻不淨想喻正與從水油明鏡水精四喻所見自身的影子那樣後來解深密經說我說識所緣唯識所現故也是依三摩地定影像說的並以明鏡為喻無著造攝大乘論成立唯識也以夢等不淨想為喻來說明並引頌說諸瑜伽師於一物種種勝解各不同種種所見皆得成故知所取唯有識這可見念佛德號色身法身於定心中所見的聽到的都是勝解觀想所成就的華嚴經入法界品善財所參訪的解脫長者也說一切諸佛隨意即見彼諸如來不來至此我不往彼知一切佛無所從來我無所至知一切佛及與我心皆悉如夢從念佛見佛所引發的唯心觀成為大乘佛法的重要內容在了解以心見佛心即是佛後般舟三昧經卷上大正一三九六上進一步說心有想為癡心無想是泥洹涅槃是法無可樂者皆念所為設使念為空耳設有念者亦了無所有這是從唯心所現趣入空三昧從有想念而向離想念的涅槃以涅槃為趣向顯見為大乘初期的聖典定心所現見的只是觀想所成沒有真實性所以有念是空無所有的大智度論立三種空一分破空天台家稱為析法空二觀空三十八空緣起的無自性空前二者是方便說不了義的般舟三昧經自心所見為空是觀空一切法不壞的空是境空心也空的與無性空相同當時還沒有中觀與瑜伽學派而學派是依行者所重而分化出來的般舟三昧是現在十方諸佛現前的三昧不是限定於某一佛的如大方等大集經賢護分說獨處空閑如是思惟於一切處隨何方所即若西方阿彌陀如來應供等正覺是人爾時如所聞已般舟三昧經也說菩薩隨其所向方聞現在佛常念所向方佛欲見佛般舟三昧所念的是隨所聽聞的他方現在佛而發心念佛見佛的經上特舉西方阿彌陀佛名應該是般舟三昧是在北天竺傳出的而這裡恰好流行念阿彌陀佛往生西方的法門所以就以阿彌陀佛為例初修一定要專念一佛等三昧成就佛身現前再漸見東方十方一切佛展轉增多遍虛空中見無數佛如明眼人夜半視星宿見星其甚眾多一樣般舟三昧是念十方現在一切佛的法門念佛法門的廣大流行念他方佛經典的不斷傳出表示了大乘佛法界的一項重要意義根本原因是佛弟子對佛的永恆懷念釋尊在世佛弟子見佛聞法如說修行佛涅槃後雖還是聞法修行在一般佛弟子的心目中到底沒有佛那樣的應機開示鞭辟入裡從釋尊入滅到彌勒成佛要經一段漫長而沒有佛法的時期修學佛法的如還沒有見諦得須陀洹果雖憑善業而往來人間天上但長期不逢佛法是有誤失墮落可能的這該是佛弟子永恆懷念的重要因素現在十方有佛勝解念佛而三昧成就的能見佛聽聞佛法還能與佛問答那真是太理想了念佛的能往生佛國可以不離見佛聞法能滿足佛弟子的願望是一切念佛法門盛行的原因如大方等大集經賢護分卷一大正一三八七四中說世尊譬如今時聖者阿難於世尊前親聞法已皆悉受持如說奉行彼諸菩薩身居此土不至彼佛世界而能遍睹諸佛世尊聽聞法已悉能受持如說修行亦復如是從是已後一切生處常不遠離諸佛世尊聽聞正法彼諸菩薩是修般舟三昧的菩薩能見佛聞法更能一切生處常不遠離諸佛般舟三昧經也說行是三昧比丘已見我常為隨佛不遠離論中也說菩薩念佛故得入佛道中念佛三昧能除種種煩惱及先世罪菩薩常愛樂念佛故捨身受身恒得值佛於無上道得不退轉報念佛能消罪業生生世世見佛聞法得不退轉是一切念佛法門所共同的往生西方淨土也不外乎這一意義有些淨土行者厭娑婆而求生淨土不免消極了一點日本部分淨土行者以為生淨土即成佛那真是無稽之談了般舟三昧所見的佛及菩薩等是由觀想所成的如大智度論說般舟三昧憶想分別常修常習故見佛經文以夢中所見不淨想等為譬喻這是唯心所現虛妄不實的那麼所見的佛與佛問答聽佛說法都虛妄而不足信嗎那又不然定心所現的與錯覺幻想不同名定自在所生色在世俗諦中是實有的修般舟三昧成就幽冥之處悉為開闢無所蔽礙是菩薩不持天眼徹視不持天耳徹聽不持神足到其佛剎不於此間終往生彼間便於此坐三昧見之般舟三昧能見能聞他方世界事卻不是天眼等神通力與法華經六根清淨說相近常修習是三昧故得見十方真實諸佛三昧力有淺深所見聞的也就有優劣但約佛與法來說那是真實的般舟三昧是自力念佛現生就能見佛聞法其中也有他力的因素如大方等大集經賢護分卷二大正一三八七七上說得見彼世界佛有三因緣何者為三一者緣此般舟三昧二者彼佛加持三者自善根熟具足如是三因緣故即得明見彼諸如來於三昧中見佛聞法不只是般舟三昧力也有佛的加持力自善根熟異譯作本功德力指過去生中積集的功德今生持戒完具含有他力因素他力不斷的強化起來那是以後的事了梁天監年間曼陀羅仙譯的文殊師利所說摩訶般若波羅蜜經傳出念佛的一行三昧如卷下大正八七三一上中說佛言法界一相繫緣法界是名一行三昧善男子善女人欲入一行三昧應處空閑捨諸亂意不取相貌繫心一佛專稱名字隨佛方所端身正向能於一佛念念相續即是念中能見過去未來現在諸佛入一行三昧者盡知恒沙諸佛法界無差別相僧伽婆羅是曼陀羅仙同時人依據曼陀羅仙傳來的原本再譯的文殊所說般若波羅蜜經卻沒有這一段但唐玄奘所譯的大般若經第七曼殊室利分也有這段經文玄奘所譯譯一行三昧為一相莊嚴三摩地譯不取相貌為善想容儀一行三昧與一相莊嚴三昧都是般若經中百八三昧之一一行三昧是不見諸三昧此岸彼岸龍樹解說為不見禪定的入相出相得相失滅相一相莊嚴三昧是觀諸法皆一相文殊說般若經釋一行三昧為繫緣法界一相是法界無差別的甚深三昧而從專心繫念一佛入手見三世諸佛法界無差別相與般舟三昧同樣的是念佛三昧而這是與通達甚深法相結合的所以般舟三昧的念佛是由淺而深的一行三昧是直下見三世般舟作十方佛通達諸佛無差別曼陀羅仙譯為不取相貌所以禪宗四祖道信以下的禪門都說憶念佛名入手而不取佛身相好的然依玄奘所譯念佛是善想容儀那是觀佛相好而通達法界了鳩摩羅什所譯千佛因緣經說念佛三昧莊嚴心故漸漸於空法中心得開解思空義功德力故即於空中得見百千佛於諸佛所得念佛三昧念佛三昧與空慧是這樣的相助相成了羅什所譯華手經立一相三昧與眾相三昧緣念一佛而成就的是一相三昧緣念多佛而成就的是眾相三昧經上又說一相三昧見一切法等相眾相三昧了達一切法一相無相等相是法法平等無相也是法法平等似乎方便不同而其實都是歸於實相的在大乘佛法中念佛執持名號固然是適應信行人的易行道但念佛而修三昧能從觀相唯心而深入實相的易行道本是甚深難行道的方便誘導行者深入的法界無差別中畢竟寂滅而化用無盡正是大乘佛法共同的佛陀觀以上所說的都是通於現在一切佛的或以阿彌陀佛為例那不過是經典流通處恰好流行阿彌陀佛的信仰也就舉例說明使人容易信受罷了第三節念佛菩薩的觀法經是勸人或淺或深依法修行的大乘經中說十方十佛六方六佛廣說佛名的著實不少也有專明某佛某菩薩的全經或其中一品這顯示了某佛某菩薩的特殊功德也就有專修某佛某菩薩的法門在祕密大乘佛法中如毘盧遮那阿閦阿彌陀等佛文殊師利普賢觀世音地藏等菩薩的修持法大量集出流傳這一風氣大乘佛法已經開始了在西元五世紀上半就已譯出了觀無量壽佛經一卷宋畺良耶舍譯觀藥王藥上二菩薩經一卷宋畺良耶舍譯觀普賢菩薩行法經一卷宋曇摩蜜多譯觀虛空藏菩薩經一卷宋曇摩蜜多譯觀彌勒菩薩上生兜率陀天經一卷宋沮渠京聲譯觀世音觀經一卷宋沮渠京聲譯佛說文殊師利般涅槃經一卷西晉聶道真譯畺良耶舍曇摩蜜多沮渠京聲都是有名的罽賓與西域的禪師瑜伽者與鳩摩羅什及佛陀跋陀羅時代與地區相近這可以想見當時的罽賓及西域念佛及菩薩的禪觀是相當興盛的沮渠京聲所譯的觀世音觀經已經佚失聶道真所譯佛說文殊師利般涅槃經也是觀經的一類是西元四世紀初譯出的這幾部觀經概略的說明它的內容一觀無量壽佛經是依無量壽佛經所出的觀法十六觀從觀想西方落日起次第觀淨土莊嚴無量壽佛觀世音大勢至菩薩的相好莊嚴觀想淨土的依正莊嚴死後能往生西方極樂國土共十三觀後三觀明九品往生是無量壽佛經三輩往生的分別配合十六這一成數而已觀無量壽佛經的緣起是阿闍世王逼害生母韋提希韋提希對佛說我宿何罪生此惡子唯願世尊為我廣說無憂惱處我當往生不樂閻浮提濁惡世也這是充滿了不滿現實的厭離情緒不是為了容易修菩薩行而求生淨土從此厭娑婆苦求生極樂成為中國一般淨土行者的心聲還有觀無量壽佛經傳出的時代流行念佛滅除罪業的思想所以經中一再說到此座想成者滅除五百億劫生死之罪作是菩薩像觀者除無量億劫生死之罪下品下生的是五逆十惡人由於稱佛名故於念念中除八十億劫生死之罪消業往生因時代不同與古本大阿彌陀經多少差別了二觀普賢菩薩行法經法華經中有普賢菩薩勸發品說到五濁惡世有受持讀誦思惟修習法華經的普賢菩薩會乘六牙白象而來而自現身供養守護安慰其心現其人前而為說法示教利喜依此而成的觀普賢菩薩行法先觀普賢菩薩再進而見十方佛十方淨土見釋迦牟尼佛十方分身佛見多寶佛塔十方佛說六根懺悔於佛菩薩前受菩薩戒法這是以普賢菩薩為出發的法華觀法在鳩摩羅什的思惟要略法中已有觀無量壽佛法法華三昧觀法無量壽佛的觀法鈍根先作白骨觀再觀從白骨放白光明於光明中見無量壽佛利根直從光明觀起修羅什的修學也在罽賓與西域比畺良耶舍等要早半世紀而以不同的佛菩薩及淨土為主修不同的觀法已經開始流行了但羅什所傳的大乘佛菩薩觀法還相當的簡略畺良耶舍等所傳完善得多了三觀藥王藥上二菩薩經藥王與藥上二位菩薩也見於法華經藥王菩薩本事品依此而成立的觀法分別說觀二菩薩的身相所應修及得的功德藥上菩薩開示了過去五十三佛的懺悔法四觀虛空藏菩薩經姚秦佛陀耶舍譯出的虛空藏菩薩經先後共有四種譯本經中說懺除罪業國王五根本罪大臣五根本罪聲聞五根本罪初學菩薩的八根本罪並說稱名禮拜供養虛空藏菩薩所得的現世利益依此而成立的觀虛空藏菩薩法就是罪業的懺悔法如說先於功德經中說虛空藏菩薩摩訶薩名能除一切惡不善業又依大寶積經二四優波離會竺法護所譯名佛說決定毘尼經說於深功德經說治罪法名決定毘尼有三十五佛這樣禮敬稱三十五佛名觀虛空藏菩薩見菩薩的身相而滅除罪業五觀彌勒菩薩上生兜率陀天經彌勒是繼釋迦佛未來成佛的菩薩說彌勒菩薩下生成佛的有好幾部經都依阿含經說增入釋尊付囑大迦葉迦葉待彌勒成佛相見而後入滅的傳說彌勒是釋尊唯一的菩薩弟子入滅後上生兜率陀天佛教界有上昇兜率見彌勒的多種傳說這部經說彌勒菩薩的上生兜率陀天天宮與菩薩身心的功德莊嚴經文所開示的主要為不厭生死樂生天者愛敬無上菩提心者欲為彌勒作弟子者應該一一思惟兜率陀天上上妙快樂應當繫念念佛形像稱彌勒名這就能除罪業而往生天上未來遇見彌勒成佛聞法得益這部經的意趣近於大乘初興時期與前四部經有所不同六文殊師利般涅槃經說文殊的身世涅槃時的相好勸眾生當懃繫念念文殊像念文殊像法見文殊身相的功德經上也說作此觀者名為正觀若他觀者名為邪觀顯然是觀經的一類以上六部是釋迦牟尼即毘盧遮那佛阿彌陀佛二佛彌勒文殊普賢觀世音大勢至藥王藥上虛空藏八大菩薩的觀法不同佛菩薩的不同修法正不斷的發展起來念佛念菩薩能淨除罪業得生淨土得陀羅尼不退阿耨多羅三藐三菩提心為大乘佛法的重要行門這一修行與易行道的佛前懺悔關係極深易行的三品法門是一般的晝夜六時的經常修持而在念佛與菩薩的觀想中是不斷的為修行而懺悔修持中的不斷懺悔是與罪業觀有關的如觀普賢菩薩行法經說諸佛世尊常在世間色中上色我有何罪而不得見寶積經的發勝志樂會說今為業障之所纏覆於諸善法不能修行善住意天子會說禪定中自見往昔所行惡業深生憂悔常不離心於甚深法不能證入謗佛經說求陀羅尼而不能得何以故以彼往世惡業障故這樣眾生之所以不能見佛不能得陀羅尼不能修行不能證入一切都是過去生中的罪業在障礙了也就因為這樣在念佛念菩薩的觀行過程中不斷的懺悔才能不斷的向上進修如觀佛三昧海經觀普賢菩薩行法經敘說得最為明白觀藥王藥上二菩薩經也就扼要的說淨諸業障報障煩惱障速得除滅於現在身修諸三昧念念之中見佛色身終不忘失阿耨多羅三藐三菩提心隨意往生他方淨國觀虛空藏菩薩經就是以念佛懺悔為主的觀行早期傳出的大乘經如小品般若二十四願本的阿彌陀經阿閦佛國經等還沒有重視過去生罪業的懺悔金剛般若經已說持經而先世罪業則為消滅觀無量壽佛經就一再說到消除多少劫生死之罪必定當生極樂世界念佛念法持經念僧菩薩與三品法門的懺悔相關聯而發展起來念佛主要是觀想念佛懺悔也就是古德所說的取相懺法華經法師功德品說六根清淨功德是由於受持是法華經若讀若誦若解說若書寫沒有說懺悔依法華經而有的觀普賢菩薩行法經說六根懺悔法得六根清淨所說的懺悔是念法的懺悔如說晝夜六時禮十方佛行懺悔法誦大乘經讀大乘經思大乘義念大乘事恭敬供養持大乘者視一切人猶如佛想若有懺悔惡不善業但當讀誦大乘經典所以懺悔六根是一切業障海皆從妄想生若欲懺悔者端坐念實相也就是古德所說的實相懺念佛菩薩見佛稱為念佛三昧依鳩摩羅什法師大義卷中大正四五一三四中說見佛三昧有三種一者菩薩或得天眼天耳或飛到十方佛所見佛難問斷諸疑網二者雖無神通常修念阿彌陀等現在諸佛心住一處即得見佛請問所疑三者學習念佛或以已離欲或未離欲或見佛像或見生身或見過去未來現在諸佛是三種定皆名念佛三昧三類見佛人中一是依禪得五通的二是常修念佛沒有神通而能見佛這應該是離欲得定的三初學念佛或已離欲或沒有離欲也能見佛三類都名為念佛三昧而淺深大有差別依此說觀普賢菩薩行法經所說云何不失無上菩提之心云何復當不斷煩惱不離五欲即離欲得淨諸根滅除諸罪父母所生清淨常眼不斷五欲而能得見諸障外事此觀功德除諸障礙見上妙色不入三昧但誦持故專心修習心心相次不離大乘一日至三七日得見普賢不入三昧專心修習心心相次這是定前的一心不亂的境界這就能見佛菩薩當然這是低層次的一心誦持到心不散亂如隋智顗的誦至藥王品心緣苦行至是真精進句見共慧思師處靈鷲山七寶淨土聽佛說法法華經所說的六根清淨是受持讀誦等法師的功德父母所生的眼耳能見聞障如鐵圍山等障外的佛與淨土與智顗所得的境地相當般舟三昧經說聞西方阿彌陀佛剎當念彼方佛不得缺戒一心念若一晝夜若七日七夜過七日以後見阿彌陀佛於覺醒時不見於夢中見之這也是不持天眼徹視不持天耳徹聽的觀普賢菩薩行法經所說普賢菩薩復更現前行住坐臥不離其側乃至夢中常為說法那是深一層次了第七章護持佛法與利樂眾生第一節人間的現世利益佛法在世間信修者能得現生利樂來生生人間天上的利樂佛法不只是了生死而已現實的人世間無論是自然界社會家庭以及自己的身心都有眾多不如意的苦患佛法的信念要得現生利樂惟有依法而行使自己的身心健全與人和樂共處安分守法向上向善如有疾病的釋尊自己也是延醫服藥醫藥不一定能治療全愈但醫藥到底是治病的正途關於經濟生活佛說要方便具足從事合法的職業獲得經濟來源守護具足能合理保存所得不致損失善知識具足結交善友不交懶惰凶險虛偽等惡友正命具足經濟的多少出入作合理的支配這樣俗人在家得現法安現法樂一切依法而行即使遇到不幸或傷亡那是宿業所限寄望於未來的善報如是解脫者那更無動於心了大體說與儒家盡人事而聽天命的精神相近不過業由自己所造不是天命神意所決定的現生的安樂釋尊從不教人向神秘的力量去求解決適應當時社會情況所作的教化佛法是那麼理性而沒有迷妄的成分佛法真是超越神教的宗教大乘佛法興起極力讚揚稱念佛菩薩名號進而觀想佛菩薩的莊嚴可以懺悔過去的業障也能改善現生的缺陷能得無病等利益佛法說是入慈定者的功德大乘佛法中重智證的般若經說是大神呪是大明呪是無上呪是無等等呪是一切呪王讀誦般若經能得現世的種種利益這是通俗化念法而有一般咒術的作用重信的念佛及菩薩法門更能適應低級民間信仰有類似咒術的神秘意義佛法是更普及了而佛出人間學佛的意義不免漸漸的迷糊了八吉祥神呪經現存五種譯本一佛說八吉祥神呪經吳支謙譯二佛說八陽神呪經晉竺法護譯八陽可能是八祥的訛寫三佛說八部佛名經元魏瞿曇般若流支譯這是流傳中的錯誤因為經初說聞如是呼佛為天中天這是西晉以前不知是誰譯出的古譯依大唐內典錄般若流支的確譯有八佛名經宋求那跋陀羅也譯有八吉祥經但都已佚失了四八吉祥經梁僧伽婆羅譯五八佛名號經隋闍那崛多譯這部經說東方世界的八佛名號稱念持誦的功德除不墮三惡趣不退菩提等外重在現生的種種利益如佛說八吉祥神呪經大正一四七二下說若有善男子善女人聞此八佛及國土名受持奉行諷誦廣為他人解說其義者四天王常擁護之不為縣官所拘錄不為盜賊所中傷不為天龍鬼神所觸嬈閱叉夜叉鬼神蠱道鬼神若人若非人皆不能害殺得其便也除其宿命不請之罪若有疾病水火惡鳥鳴惡夢諸魔所嬈恐怖衣毛豎時常當讀是八吉祥神呪經呪之即得除愈經文中並沒有咒語而稱經為八吉祥神呪經說讀是八吉祥神呪經呪之持是八佛名呪之即除愈可見古代的傳譯者對於持八佛名號讀誦八佛名經看作持咒那樣的為什麼持誦八佛名號讀誦八佛名經能現生逢凶化吉不為災禍所侵害呢這當然是佛力前二部譯文說到四天王常擁護之八吉祥經說八部諸善神日夜常守護這是在佛力加被下受到四天王統率天龍八部等善神的擁護佛力與善天力取著同一的立場同樣是東方世界的一佛或說七佛的功德是藥師經共有四種譯本一拔除過罪業障生死得度經東晉帛尸梨蜜多羅譯編入佛說灌頂經卷一二二佛說藥師如來本願經隋達摩笈多譯三藥師琉璃光如來本願功德經唐玄奘譯四藥師琉璃光七佛本願功德經唐義淨譯這四譯中二三兩種譯本是沒有咒語的初譯有短咒在全經的末後義淨譯有咒而插入中間經與咒應該是別行的在流傳中結合在一起所以在後或在中間不同經說東方世界的藥師琉璃光如來因中發十二大願成就淨琉璃國土大乘佛法中淨土極多而藥師淨土的本願不只是出世聖善更注意到殘廢疾病與醫藥官非與飲食問題氣候的冷熱有人間淨土現實感的彌勒淨土以外就是藥師淨土與阿閦佛淨土了但在佛力加持思想下重於佛力救護念彼如來本願功德稱名禮讚恭敬供養彼如來者能得到長壽富饒官位男女所求皆得惡夢惡相怪鳥來集百怪出現不能為患水火刀毒懸險惡獸毒蛇毒蟲離諸怖畏女人臨產無有眾苦延壽離諸橫死人眾疾疫難他國侵逼難自界國內叛逆難星宿變怪難日月薄蝕難非時風雨難過時不雨難眾難解脫求長壽等都是個人的現生福樂末後人眾疾疫難等是有關國家治亂影響全民的大問題經上說這些苦難都可從對藥師佛的稱念禮拜供養讀誦中得到佛力的救護這一類佛力救護說此外也還有不少經典說到晉竺法護譯的佛說滅十方冥經與八吉祥神呪經的性質相同只要歸依禮敬十方佛則無恐懼不遇患難元魏菩提流支的佛名經說現世安隱遠離諸難一切諸惡病不及其身唐菩提流志所譯大寶積經功德寶花敷菩薩會說十方佛西方佛名一切法殊勝辯才莊嚴如來受持彼佛名者毒不能害刀不能傷火不能燒水不能溺梁失譯的阿彌陀鼓音聲王陀羅尼經也說受持讀誦彼佛名號乃至無有水火毒藥刀杖之怖亦復無有夜叉等怖北涼曇無讖譯無想經說頂戴受持諸佛名號若中兵毒水火盜賊無有是處除其宿業若有眾生聞彼佛名敬信不疑無諸怖畏所謂王怖人怖鬼怖無諸疾病常為諸佛所念以上略舉佛力救護的部分經說這樣的救護與一般祈求神助的宗教意義是完全相同的大菩薩的慈悲救護如法華經的觀世音菩薩普門品本經有三譯晉竺法護譯的名正法華經一卷姚秦鳩摩羅什譯的名妙法蓮華經七卷隋闍那崛多與達摩笈多依據羅什譯本有所增補次第也有所修改成為添品妙法蓮華經七卷觀世音或譯觀自在是被稱為大慈大悲救苦救難的大菩薩慈悲救護的內容經說是稱觀世音菩薩名者大火不能燒大水不能沒航海不墮羅剎鬼國刀杖所不能害夜叉羅剎不能害有罪無罪不受繫過嶮道不為怨賊所害常念恭敬觀世音菩薩離貪欲離瞋恚離愚癡禮拜供養觀世音菩薩求男得男求女得女偈頌說高處墮落不傷咒詛毒藥不能害惡獸毒蛇毒蟲不能傷雷電雨雹消散在這種種的慈悲救護中離貪瞋癡是內心的清淨求男求女是世間的安樂事外其他都有關生死存亡的險難的救護也就是重於救苦救難的其中若有百千萬億眾生為求金銀琉璃車渠馬瑙珊瑚琥珀真珠等寶入於大海假使黑風吹其船舫飄墮羅剎鬼國其中若有乃至一人稱觀世音菩薩名者是諸人等皆得解脫羅剎之難一項在佛教界是有悠久傳說的傳說是商人們航海去採寶因風而漂流到僧伽羅也就是錫蘭現在的斯里蘭卡那時島上所住的是美麗的女羅剎商人們就分別與羅剎斯成婚生育兒女如有新的人漂來就會將舊的商人吃了一位商主知道了內幕知道惟有婆羅天馬從空中經過時那怕捉住馬王的一毛就能渡海而脫離被殺的命運於是暗中通知商人們有人相信的就依馬王的神力而逃出羅剎鬼國這一傳說極為普遍如巴利藏中本生的雲馬本生康僧會譯的六度集經說一切有部毘奈耶佛本行集經大唐西域記也說馬王是釋尊的本生這一傳說是部派佛教所公認的到大乘佛法時代轉化為觀自在菩薩神力救難之一所以在祕密大乘佛法中觀自在菩薩示現有馬頭觀音為六觀音八大明王之一傳說與錫蘭古代的羅剎鬼國有關所以觀自在菩薩離錫蘭不遠如大唐西域記說秣剌耶山東有布呾洛迦山觀自在菩薩往來遊舍山東北海畔有城是往南海僧伽羅國路不過觀自在菩薩的聖德有複雜的內容如善財童子參訪善知識觀自在菩薩也在南方也說若稱我名若見我身皆得免離一切怖畏與法華經說相同但南方的觀自在菩薩與從空而來的正趣菩薩又出現於西方極樂世界就是觀自在與大勢至兩大菩薩了這是釋尊本生而轉化為觀世音菩薩的與我曾說過的觀世音與釋尊有關恰好相合觀世音所住的布補呾洛迦與釋族過去所住的東方阿溼婆馬國首邑的布多羅相合傳說與印度東南沿海地區有關所以觀世音菩薩的救苦救難特別受到航海者沿海漁民的崇信那位類似觀音救護海難的媽祖可說是觀世音菩薩的中國化了關於地藏菩薩一般人重視傳說不一的地藏菩薩本願功德經所以著重地獄鬼魂與度亡然依地藏十輪經說有能至心稱名念誦歸敬供養地藏菩薩摩訶薩者一切皆得一切皆得就是解脫種種憂苦及令一切如法所求意願滿足解脫種種的苦迫是種種希求憂苦逼切飢渴所逼乏少種種衣服寶飾醫藥床敷及諸資具愛樂別離怨憎合會身心憂苦眾病所惱互相乖違興諸鬪諍閉在牢獄具受眾苦鞭撻拷楚臨當被害身心疲倦氣力羸惙諸根不具顛狂心亂鬼魅所著煩惱熾盛惱亂身心為火所焚為水所溺為風所飄或於山巖等墮落毒蛇毒蟲所螫或被種種毒藥所中惡鬼所持成諸瘧病或令狂亂為諸藥叉羅剎吸精氣鬼及諸虎狼師子惡獸蠱毒厭禱諸惡呪術怨賊軍陣懼失身命稱念地藏菩薩名號能解免這種種苦惱救苦救難不是與稱念觀音菩薩的功德相等嗎依佛經法菩薩大乘僧的慈悲威力使一般人能得現生的種種利益為佛教普及人間的方便現生利益是一般信者所最關切的但專從信仰中去求得會引起副作用這是現代佛弟子所不能不知道的人類從蒙昧而日漸開化宗教就應運而生這是一切民族所共同的初民在生活中一切都充滿了神祕感一切都是自己那樣的有生命的進步到有神在主持支配這一切人類在環境中感覺外在的力量異常強大如自然界的颱風豪雨地震海嘯以及大旱久雨等還有寒來暑往日起月落也非人力所能改變深刻的影響人類此外社會的關係社會法制人事牽纏以及貧富壽夭都是不能輕易改變的還有自己的身心也使自己作不得主這種約制我們影響我們的力量是宗教的主要來源引起人類的信順順從可以得神的庇祐而安樂否則會招來禍殃順從雖是宗教的一大特性而宗教的真實意趣卻是趣向解脫是將那拘縛自己不得不順從的力量設法去超脫它實現自由神教對於自然界社會界或者自己身心的障礙困難或祈求神的寬宥祈求神的庇護援助或祈求另一大力者神折伏造成障礙苦難的神力或者以種種物件種種咒術種種儀式種種祭祀求得一大力者的干涉保護或增加自己的力量或者索性控制那搗亂的力量或者利用那力量這一切無非為了達成解除苦難打開束縛而得超脫自由的目的在人類知識的發達中這類低級的宗教行為被超越而進入高等的宗教重於社會的和樂人心的革新淨化但低級宗教會多少留存下來如耶穌也曾趕鬼治病到現代還有生了病祈禱而不服藥的極端分子在中國如荀子的天論說君子以為文而百姓以為神禮論說其在君子以為人道也其在百姓以為鬼事也儒者利用它而並不否棄它這才一直演化而流傳在民間在佛法是出家人所不取用的印度神教雖有梵我一如等崇高理念而低級的迷妄行為還是流行著大乘佛法的信行者適應神教而發展起來求佛菩薩的護佑成為一般信者的佛教自作自受的自力解脫的佛法真諦不免被蒙蔽而減失了光輝第二節從人護法到龍天護法佛法是不共世間的依法修行能得究竟解脫佛法的流行人間如暗夜的明燈一樣佛與佛弟子們當然是願望正法久住世間的但人世間充滿了矛盾苦迫動亂流行世間的佛法也不免遭遇困擾於是佛教界出現了護法說到護法可分為人的護法天鬼神的護法佛法久住世間主要是依賴於人的護持佛教界不論南傳與北傳都有五師相承的傳說如阿育王傳中摩訶迦葉對阿難說長老阿難佛以法藏付囑於我我今欲入涅槃以法付汝汝善守護古代的付法護法是一代大師護持集成的經律論法藏流傳世間不遺忘也不謬誤保持佛法的正確知見法眼維護即住持佛法的純正性所以阿育王傳等付囑護持的是正法法眼法藏傳說中的華氏城第三結集在目犍連子帝須的領導下息滅諍執驅斥濫入僧團的邪見異說也是護法的實例不過佛法中部派分化都自以為根本正統護法也就變得複雜了切實的說護持正法主要是佛弟子自己佛弟子的誠信三寶依法修行才是護持佛法的最佳保證如魏菩提流支所譯佛說法集經卷五大正一七六三九下說諸菩薩護持妙正法於諸業中最為殊勝世尊菩薩若能修行護持妙法隨順菩提及諸佛如來何以故諸佛如來尊重法故世尊云何是護持妙法所謂菩薩能說諸佛一切甚深修多羅能讀能誦思惟修習是名菩薩護持妙法復次世尊若菩薩攝受修行名為護持妙法法集經是大乘經對於護持正法可說正確的把握著正確的方針與佛法的見地是吻合的印度的婆羅門文化是民族的傳統的文化後來稱為印度教與政治關係極深受到政治王族上的尊敬後起的各種出家沙門也受到政界的尊重政治不顧問沙門團內部的事務可說是政教分離而又相互尊重的佛教釋沙門團稱為僧伽也是僧事僧決不容外人顧問的這是傳教信教完全自由的地區但佛法在印度文化中有反傳統否認創造神及真我的特性所以多少要受到政教結合的傳統的婆羅門教的反對或嚴重到破壞摧殘如西元前二世紀中弗沙密多羅的破壞佛教阿育王傳說未來之世當有三惡王出一名釋拘二名閻無那三名鉢羅擾害百姓破壞佛法三惡王就是賒迦人臾那人波斯人從西元前三世紀末起到西元一世紀先後侵入西北印度進而侵入中印度的史實外來民族的侵擾當地佛教是不免要受到干擾的佛弟子想起了阿育王時代阿育王信佛而佛法傳布四方的事實而感覺到人王及大臣護法的重要阿育王傳就是在這一意境下編集出來的佛法與大乘佛法在西北印度相當的發達賒迦人等多數接受了佛法佛法又從西北印而傳到西域等地區這些地區民族複雜政局多變佛教深受影響如姚秦佛陀耶舍所譯的虛空藏菩薩經舉國王及大臣所犯的五根本罪前三罪是取兜婆塔物及四方僧物或教人取毀謗正法又制他人不令修學對出家人脫其袈裟逼令還俗或加杖捶或復繫縛或截手足乃至斷命自作使他造如此惡犯這類重罪的失人天樂墮於惡趣又如地藏十輪經說剎帝利旃荼羅宰官旃荼羅居士旃荼羅長者旃荼羅外道沙門旃荼羅婆羅門旃荼羅旃荼羅是印度的賤族這裡是暴惡者他們所作的十種惡輪都是傷害到僧伽住持的佛法所以是定生無間地獄的日藏經的護持正法品也說到剎帝利婆羅門毘舍首陀等以不信故奪他所受這幾部經與北印度有關這一地區顯然沒有中印度那樣的尊重宗教而有掠奪僧寺財物傷害比丘逼令還俗妨害自由信仰的情形大乘佛法推重在家菩薩而實際上大乘佛教還是以出家比丘為主流的如西元三世紀的龍樹提婆四世紀的無著世親大乘佛法的宏傳者都是菩薩比丘身分這幾部經所敘述的該是西元三五世紀間的情形吧出家中犯戒的非法比丘顯然相當的多護持正法當然是尊敬供養護持如法比丘而不是護持非法比丘的然沒有遺忘僧事僧決的立場僧伽內部事務不受外力的干涉所以北涼西元三九七四三九失譯的大方廣十輪經卷四大正一三六九七下說如是惡行諸比丘等我亦不聽刑罰鞭杖繫閉乃至斷命若有比丘於性重罪中若犯一罪者雖犯重罪所受之戒猶有餘勢譬如妙香雖無香質餘分芬馨不可輕蔑破戒比丘亦復如是無戒白衣不應輕慢破戒比丘應由僧伽自行處理與在家人無關這是佛法的原則政教分離但說犯一重戒的比丘所受之戒猶有餘勢近於說一切有部的見解在四根本罪中犯一罪到三罪還是比丘出家比丘的資格竟降低到只要沒有全部四重罪違犯還承認他是比丘這也許是當地出家眾的品質低落不得已而降低標準吧這等於姑息養奸會引起副作用的護法護持清淨比丘將越來越艱難了西元四五世紀嚈噠侵入西北印度這一地區的佛教急劇的衰落了人的護法而類似天神護法的有佛命賓頭羅頗羅墮阿羅漢若汝當留住世後須彌勒佛出迺般泥洹去耳的傳說阿育王傳也說見佛而沒有涅槃的賓頭盧來應供舍利弗問經說佛囑摩訶迦葉賓頭盧君徒鉢歎羅睺羅四大比丘住世不泥洹流通我佛法其後更發展為十六大阿羅漢住世護法說如玄奘所譯大阿羅漢難提蜜多羅所說法住記難提蜜多羅是佛滅八百年錫蘭執師子國的阿羅漢這是由於部派分化付囑護持正法眼藏說不能獲得佛教界的公認所以轉化為付囑佛世比丘大阿羅漢常住在世間護持佛法但這與佛世阿羅漢的遊化人間不同這是隨機應現的為現佛像僧像若空中言聲若作光明乃至於夢想中所見的從神祕現象使佛弟子堅固信心的這是部派佛教時代的情形與大乘佛法的菩薩示現天神護法性質是非常的接近了大乘經早期傳出的如篇幅較長末後大抵有囑累品佛將所說的經法付囑阿難及出現於經中的修學大乘宏揚大乘的菩薩們要大家好好的受持護持使佛法流通久遠如般若經法華經賢劫經持世經華手經佛藏經維摩詰經等不過以天神為當機者的經典如思益梵天所問經密迹金剛力士經海龍王經等都有了天神護持的咒語本來佛法容忍印度固有的天與鬼神但被尊為最高的創造神在佛法中也還是流轉生死的苦難眾生需要佛法的化度何況低級的鬼神阿含經中所見到的是向善的天神們來禮佛讚佛尊敬三寶請問佛法佛法僧是可尊敬的三寶向善的天神們會自動的來護持如長部三二阿吒曩胝經毘沙門等四大天王及統屬的鬼神願意護持佛弟子比丘比丘尼優婆塞優婆夷不為惡鬼所妨害而能安樂的修行這是被稱為護經的佛接受了囑比丘們學習保護平安天神們願意護法為什麼要誦習護經如阿育王傳說若付囑天法亦不得久住何以故諸天放逸故諸天雖自願護法但長在天處享受福樂可能會放逸而遺忘的所以誦護經喚起天神的憶念護持大集經海慧菩薩品也說汝等四王當深護助無為欲樂而作放逸吾今出世為壞放逸護正法故而說呪護法的大神是大梵天帝釋四大王眾天四王天的天主東方持國提頭賴吒天王是犍達婆南方增長毘樓勒叉天王是龍西方廣目毘樓博叉天王是鳩槃荼北方多聞毘沙門天王是夜叉四王的眷屬當然也就是犍達婆與夜叉等更統率著其他的神如阿修羅迦樓羅緊那羅摩睺羅迦毘舍闍薜荔多富單那等一切地居的鬼神都是在帝釋如王四大天王如輔臣的統率下成為佛法的護法神群大乘經中大梵帝釋四天王的說咒護持是一般的更擴大到菩薩與其他大抵與印度民間信仰的神及天上的星宿也是被想像為神的有關一大集經虛空目分說有菩薩現畜生身住在四方的山窟中修慈心南方是蛇馬羊西方是猴雞犬北方是豬鼠牛東方是師子兔龍這十二位獸菩薩依十二日十二月十二年分別次第的遊行教化眾生如能修法誦咒見十二獸見已所願求的隨意即得這與中國所傳的十二獸或十二肖說相同只是以師子代虎而已後漢支曜譯的成具光明定意經有護法十二神有神名大護神名普濟東晉帛尸梨蜜多羅初譯的藥師經名拔除過罪生死得度經末有十二神王十二藥叉大將金毘羅毘伽羅月藏經所說的十二辰一名彌沙十二名彌那這些以十二為數的護法神都可能是印度天文學上黃道帶內十二宮的各式神化二光味殊致阿羅沙仙人廣說二十八宿日月隨行一切眾生日月年歲皆悉繫屬佛於大方等大集經九寶幢分大正一三一四上呵責說眾生闇愚癡行著於顛倒煩惱繫縛隨逐如是星宿書籍同屬一星生者而有貧賤富貴參差是故我知是不定法論星宿善惡窮通壽夭實是愚癡眾生的顛倒妄說是值不得信賴的經中雖加以呵責大概為了適應世俗卻又編在經中日藏分中光味仙人說日月星宿推為過去驢脣佉盧蝨吒仙人說二十八宿星宿命運占卜就這樣的成為大乘佛法星宿推算吉凶本是古代的天文學與民間神秘信仰結合的產物有些佛弟子認為也是佛弟子所應該知道的如吳竺律炎共支謙譯的摩登伽經二卷西晉竺法護譯的舍頭諫太子二十八宿經一卷廣說宿曜吉凶與日藏月藏的意義相同天竺三藏若羅嚴在于闐譯出的時非時經一卷說明十二月中那些時日是時是非時這些顯然的還是世俗信仰而附入佛法唐不空所譯的文殊師利菩薩及諸仙所說吉凶時日善惡宿曜經二卷性質相同卻與文殊師利菩薩拉上了關係最希奇的趙宋施護譯的十二緣生祥瑞經二卷竟然以無明老死等十二支配日月論吉凶部分佛弟子不自覺的沈迷於神秘的低級信仰牽強附會佛法時代的理性精神似乎存在的非常有限了護法神群從四大天王四大比丘以來都是分別護持四大部洲的一洲當然佛法流行的現實人間從印度廣義的西域到震旦中國經中是特別重視的日藏經中佛以四洲的二十大支提塔聖人住處有在于闐的也有在震旦的付囑諸大龍王由於龍王貪睡又好淫欲為了免得誤事所以又付囑二十八夜叉大將協助護持月藏經的付囑更多一欲界的空居四天四大天王天仙二十八宿七曜十二童女分別的以一天一天王七宿三曜三天童女護持一洲二四大天王又分別護持南閻浮提洲的十六大國又以閻浮提洲的東南西北分別付囑四大天王與他的眷屬這是不局限於印度的十六國而擴大到閻浮提洲全部了三波羅奈國付囑善髮乾闥婆阿尼羅夜叉須質多羅阿修羅德叉迦龍王大黑天女及他們的眷屬震旦國付囑毘首羯磨天子迦毘羅夜叉法護夜叉堅目夜叉大目夜叉勇健軍夜叉摩尼跋陀夜叉賢滿夜叉持威德夜叉阿荼薄拘夜叉般支迦夜叉婆修吉龍王須摩那果龍王弗沙毘摩龍王呵梨帝鬼子母伊羅婆雌大天女雙瞳目大天女及他們的眷屬震旦就是中國比起其他國家護法神特別多這是值得注意的還有沒有被分配的如娑伽羅等一百八十萬大龍王箭毛等八頻婆羅夜叉大將羅睺羅等六萬那由他阿修羅王歇等六十二百千大天女凡是不得分配者應當容忍也要在所住處護持佛法二十八宿也分別的付囑各國七曜與十二辰也應該攝護國土城邑聚落養育眾生日藏經與月藏經這樣的廣列龍王夜叉等名字付囑護法與梁僧伽婆羅初譯的孔雀王呪經有同樣的情形如說鉤留孫陀夜叉住弗衍文波多利弗國常在阿多盤多城的大力夜叉二十八夜叉大軍主名守護十方國土還有十二大女鬼五大女鬼八大羅剎女七十一大羅剎女佛世尊龍王兩小白龍王辛頭河王毘摩羅河王河神須彌山王摩醯斗山王山神藹沙多哿摩訶里史大仙人阿已里米虜大仙人這都是羅列夜叉等鬼神分布各方能護持佛法的雖然孔雀王呪經屬於密典而羅列鬼神群從鬼神得到護持與日藏經月藏經的精神相符這都應該是西元四世紀集成的論師們正從事於深細嚴密的論究而一分通俗的教化者正加速進行佛法依賴鬼神護持的方向佛法要依賴鬼神護持的理由如大方等大集經一虛空目分大正一三一七二上中說我今以此正法付囑四大天王功德天女四大龍王誠實語天四阿脩羅王具天大自在天八臂天地神女等何以故善男子或有眾生其性弊惡有大勢力多造重業不受是經是人死已受惡鬼身惡龍之身是惡鬼龍欲壞佛法降注惡雨惡風如是惡鬼龍復令如來所有弟子剎利婆羅門毘舍首陀大臣長者悉生惡心惡心既生互相殘賊誰當流布如是經典是故我今不以是經付囑菩薩比丘比丘尼優婆塞優婆夷及諸國主以付四王乃至地神如是天神至心護持大乘佛法要依天鬼神護法才能久住世間這可說是離奇的然從苦難的現實人間來說也是可以理解的這一傾向表示了政治與宗教的相關性也表示了衣食足而後知禮義的意義佛法雖進入大乘時代而傳統佛法聲聞乘與大乘主要還是依出家眾來住持宏通的出家眾的經濟生活以及塔寺的興建都依賴於在家信眾的布施將來彌勒出世成佛當時有輪王的仁慈治世社會和平繁榮與佛法昌明同時是佛弟子理想的現實人間反之如政治衰亂佛法也要蒙受損害佛法在西北印度擴展到現在的巴基斯坦及阿富汗俄屬中亞細亞的一部分並通過山谷到達西域的于闐等地方從西元前三世紀後期起臾那人波斯即安息人賒迦人先後進入西北印度西元一世紀大月氏貴霜王朝又統治西北印度並侵入中印度到西元四世紀中嚈噠人又侵入北印度雖說這些民族漸受佛法的教化特別是被指為釋迦族後裔的賒迦人都信奉大乘佛法但西北印度及以外的西北地區在異民族的不斷興起也就是在不斷的動亂苦難中佛法也受到了傷害所以說將有三惡王由於是之故正法有棄亡在民族複雜政局動亂過程中佛教為了適應生存僧品不免漸漸低落所以有乃至佛滅千歲正法衰滅的預言也就是末法思想的來源依此去理解上面所引的經文惡鬼龍欲壞佛法降注惡雨惡風塵坌為諸修行三業比丘而作重病吹吐惡氣置飲食中故令食者得大重病這是風雨不調疫病流行又說惡鬼令一切人悉生惡心惡心既生互相殘賊弄到國土城邑空荒無人這是不斷戰爭所造成的現象在這種情形下人的力量太小了雖不是沒有少數傑出的修行者但對和合僧伽代表佛教的流布佛法不免有誰當流布如是經典的感慨恰好西元四世紀初笈多王朝在中印度興起梵文學復興傳統的宗教印度教也興盛起來印度群神的信仰在民間也增強起來唯識等論師也是興於中印度的面對這一情勢佛法要在社會安定繁榮下發展北方的佛教人士也就只有付囑鬼神來護持佛法了日藏經說有於惡心諸餓鬼等常仰食噉一切眾生精氣血肉以為生活欲奪於菩薩精氣又以惡氣而欲噓之惡鬼神會奪人的精氣也會以惡氣吹入人體人是會失心疾病而死的反之如禪秘要法經說釋提桓因在左護世諸天在右持天藥灌頂舉身盈滿恒坐安隱快樂倍常觀佛三昧海經說作諸天手持寶瓶想持藥灌想藥入頂時遍入四體及諸脈中這是善天以天精氣來滋益人或作這樣的觀想了這種增損精氣的思想是印度及一般民間宗教所固有的如中國古人說天奪其魄也是這類神祕信仰的一種表示精氣不知原文是什麼意義是相當廣的如大方等大集經一五月藏分大正一三三二二下說不令鬼神數數惱亂眾生以此方便令四天下大地餘味而不速滅精氣安住不復損減以地精氣不損減故眾生精氣不損減眾生精氣不損減故正法甘露精氣不損減正法甘露精氣不損減故眾生心法作善平等增長以是因緣令三寶種得不斷絕如是如是法眼久住閉三惡道開於善趣及涅槃門經上說到三種精氣地精氣眾生精氣正法甘露精氣地精氣從經文的大地餘味想到了劫初時大地的地味充滿因眾生的貪著而漸漸隱沒的傳說地精氣是自然物使五榖花果中富有營養資益的成分眾生精氣是眾生的特別是人類使人身心健康和平安樂的內在因素正法甘露精氣是佛法的清淨而向善向涅槃的力量這三者有相互關係地精氣增減眾生精氣增減正法甘露精氣也就增減佛法的興盛或衰落這與上文所引付囑天神護法的意義是相通的如大方等大集經一五月藏分大正一三三二一下說若彼惡天龍乃至毘舍遮於閻浮提作於一切鬪諍觸惱非時風雨疫病飢饉嚴寒酷熱等事善天龍等各各隨分而遮護之寒熱等事皆悉休息令閻浮提所有華果藥草劫貝財帛五榖甘蔗蒲萄及酪蜜等皆得成熟所有苗稼不令衰壞地精氣不減於閻浮提諸處人中及麞鹿鳥獸隨其所欲皆無乏少眾生精氣不減以無乏故令彼眾生修諸善行修正法行修真實行勤修而住世尊正法則得久住正法甘露精氣不減經文上面是從苦惱衰亂說起的由於惡神的惱亂眾生多有種種飢饉疫病愛別離苦眾惱逼切各各迭相怖懼鬪戰心常恐畏諸王剎利於諸眾生種種因緣而逼惱之晝夜殺害燒煮割截五榖財帛所欲供具身心樂事及諸善行皆悉損減這敘述那三種精氣的依存關係如沒有善良天神的護持惡鬼神就會搗亂引起風雨不調年歲荒歉疫病流行這樣眾生就會互相畏懼不斷鬥爭特別是國土武士們的逼惱一切眾生殺害不已這樣資生的樂具缺乏衣食不足眾生也就難於向善修人間善行及向出世涅槃的佛法了所以惟有付囑天神等護持世間遮止惡鬼神的惱亂才能物資豐盈人情和樂佛法昌盛面對無休止的動亂民生疾苦佛法衰落那些寂定禪為業善誦其文未究深義戒行清潔特閑禁呪傾向於適應民俗的大乘行者也就熱望於天龍等護持佛法了這也許能使佛法延續一些時間但論佛法不從佛弟子的解行著手論動亂不從政治的和平建設去努力佛法終究是天神所護持不了的西北印度的佛教實質上衰落已久再經過嚈噠的侵入破壞也就急劇的衰落下來當然依賴於神祕的念天法門還要創開一新的局面不過對佛法來說距離是越來越遠了天神等護法以上是以大集經的部類來說明的大集經被稱為五大部之一部類不少初由北涼曇無讖譯出名大方等大集經二九卷麗藏本與宋藏本都是六卷這是隋僧就的纂集本六卷本最不妥當的如日密分與日藏分是同本異譯竟編成二分又以古譯的明度校計經說是高齊那連提耶舍所譯編為最後的十方菩薩品曇無讖所譯的二九卷應該是一瓔珞品二陀羅尼自在王菩薩品三寶女品四不眴菩薩品五海慧菩薩品六無言菩薩品七不可說菩薩品八虛空藏品以上都稱為品九寶幢分一虛空目分一一寶髻菩薩品一二日密分從名稱與內容來說寶髻菩薩品稱為品應編在虛空藏品的前後日密分沒有譯全可能是多少遺失了從瓔珞品以下佛都是在佛功德威神力所現的大寶坊宮殿中說法寶幢分以下住處漸變了也有次第可尋如一寶幢分說如來初成正覺住王舍城優波提舍舍利弗拘律多大目犍連二人見馬星比丘而出家二虛空目分說舍利弗與目犍連出家不久三日密分日藏經在王舍城為諸大眾說虛空目安那波那甘露法門四無量已又為了降伏惡龍昇須彌頂又下佉羅坻聖人住處四月藏經佛在佉羅帝山牟尼諸仙所依住處時佛說日藏經已五大乘大集地藏十輪經佛住佉羅帝耶山諸牟尼所依住處說月藏已六大集須彌藏經佛在佉羅帝山依牟尼仙住處佛說如來與功德天吉祥天女過去共同發願功德天願於釋尊在穢土成佛時自己作功德天得受阿耨多羅三藐三菩提記七虛空孕菩薩經佛住佉羅坻迦山世尊授功德天記莂訖已八觀虛空藏菩薩經佛住佉陀羅山先於功德經中說虛空藏孕菩薩摩訶薩名寶幢分以下的幾部經有次第先後著重於降魔降伏惡龍等天龍等護法明國王大臣初學菩薩的罪業懺悔說種種咒語而日藏經以下都是在佉羅帝山牟尼住處列舉現存漢譯經典如下一大乘大方等日藏經一卷隋那連提耶舍再譯曇無讖初譯日密分三卷不全二大方等大集月藏經一卷高齊那提連耶舍譯三大乘大集地藏十輪經一卷唐玄奘再譯初譯大方廣十輪經八卷失譯四大乘大集須彌藏經二卷高齊那連提耶舍譯五虛空藏菩薩經一卷後秦佛陀耶舍譯異譯本有虛空藏菩薩神呪經一卷失譯虛空藏菩薩神呪經一卷劉宋曇摩蜜多譯虛空孕菩薩經二卷隋闍那崛多譯六觀虛空藏菩薩經一卷劉宋曇摩蜜多譯這次第六部經後一部是修行法以五位大菩薩為名日藏菩薩月藏菩薩地藏菩薩須彌藏菩薩虛空藏菩薩菩薩大都是依事依德立名的這五位菩薩所依的是須彌山運行於須彌山腰的是日與月日月所照臨的是四大洲的大地上面是虛空這五位菩薩的類為一聚不正是依須彌山日月地虛空而立名的嗎而且都稱為藏是胎藏孕五位中的虛空藏菩薩是從西方世界來的曇無讖所譯的大集經八虛空藏品異譯有唐不空所譯的大集大虛空藏菩薩所問經這位虛空藏菩薩原語為安此無盡之藏在虛空中是故名為虛空庫藏與胎藏不同而且菩薩是從東方世界來的來處不同法門不同名字不同這兩位虛空藏是不一樣的日月地須彌虛空五位藏菩薩是參照欲界地居天神住處而立名的是地居天神的佛化我在東方淨土發微中指出藥師琉璃光佛是蔚藍色的天空穹蒼日光遍照與月光遍照二大菩薩是日月的光輝八大菩薩乘空而來是八大行星十二藥叉大將是黃道帶內的十二辰每一位有七千眷屬總共八萬四千如無數的小星星大乘佛法的佛與菩薩有取法天界並有類集與有組織的傾向以下沒有寫出
